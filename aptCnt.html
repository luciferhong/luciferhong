<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>[루시퍼홍] 임장지 단지 몇 개지?</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
  :root{
    --accent:#e07b39;
    --accent-light:#fdf0e6;
    --accent-mid:#f59e4f;
    --accent-dark:#b85c1a;
    --bg:#f5f4f2;
    --card:#ffffff;
    --text:#1a1a1a;
    --text-soft:#5a5a5a;
    --border:#e8e4df;
    --border-strong:#d4cec7;
    --pane-h:72vh;
    --right-pager-h:52px;
    --radius:16px;
    --shadow:0 2px 12px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);
    --shadow-hover:0 6px 24px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Pretendard','Apple SD Gothic Neo',ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    overflow:hidden;
  }

  /* ── 전체 레이아웃 ── */
  .wrap{
    display:grid;grid-template-rows:auto 1fr;
    min-height:100vh;gap:16px;padding:18px 20px;
  }

  /* ── 상단 헤더 ── */
  header.top-header{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:var(--card);border-radius:var(--radius);
    padding:14px 20px;box-shadow:var(--shadow);
    border:1px solid var(--border);
  }
  .header-left{display:flex;align-items:center;gap:14px;}
  .header-icon{
    width:40px;height:40px;border-radius:12px;
    background:linear-gradient(135deg,var(--accent) 0%,var(--accent-mid) 100%);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;flex-shrink:0;box-shadow:0 3px 8px rgba(224,123,57,.35);
  }
  header.top-header h1{
    margin:0;font-size:18px;font-weight:700;letter-spacing:-.3px;
    color:var(--text);
  }
  header.top-header .meta{
    font-size:11px;color:var(--text-soft);
    background:#f0ece8;padding:3px 9px;border-radius:99px;
    border:1px solid var(--border-strong);
  }

  /* ── 요약 뱃지 ── */
  .pill{
    background:var(--accent-light);color:var(--accent-dark);
    border:1px solid rgba(224,123,57,.25);
    padding:5px 12px;border-radius:999px;font-size:12px;font-weight:500;
  }

  /* ── 양쪽 패널 ── */
  .panes{
    display:grid;grid-template-columns:310px 1fr;
    gap:16px;min-height:0;height:calc(100vh - 106px);
  }
  .card{
    background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);box-shadow:var(--shadow);
    min-height:0;display:flex;flex-direction:column;overflow:hidden;
  }
  .card-header{
    padding:13px 18px;
    background:linear-gradient(135deg,#fff8f2 0%,#fff4ea 100%);
    border-bottom:1px solid rgba(224,123,57,.15);
    display:flex;align-items:center;gap:10px;flex-shrink:0;
  }
  .card-header-dot{
    width:8px;height:8px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent-mid));
    box-shadow:0 0 0 3px rgba(224,123,57,.18);
    flex-shrink:0;
  }
  .card-header h2{margin:0;font-size:14px;font-weight:700;color:var(--accent-dark);}
  .card .body{padding:12px;min-height:0;display:flex;flex-direction:column;gap:10px;height:100%;}

  /* ── 툴바 / 인풋 ── */
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  input[type="text"],input[type="number"],select{
    background:#faf9f7;color:var(--text);
    border:1px solid var(--border-strong);border-radius:10px;
    padding:7px 11px;outline:none;font-size:13px;
    transition:border-color .18s,box-shadow .18s;
    font-family:inherit;
  }
  input[type="text"]:focus,input[type="number"]:focus,select:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(224,123,57,.15);
    background:#fff;
  }
  input[type="text"]::placeholder{color:#b0a8a0;}

  label.ck{display:flex;gap:6px;align-items:center;font-size:13px;color:var(--text-soft);cursor:pointer;}
  input[type="checkbox"]{
    width:15px;height:15px;accent-color:var(--accent);cursor:pointer;
  }

  /* ── 테이블 ── */
  .table-wrap{
    border:1px solid var(--border);border-radius:12px;
    overflow:auto;background:#fff;
  }
  table{border-collapse:separate;border-spacing:0;width:100%;font-size:13px;}
  thead th{
    position:sticky;top:0;z-index:1;
    background:#f7f4f0;color:#6b5a4e;
    font-weight:600;font-size:12px;letter-spacing:.2px;
    text-align:left;padding:9px 12px;
    border-bottom:2px solid var(--border);
    white-space:nowrap;
  }
  thead th:first-child{border-radius:11px 0 0 0;}
  thead th:last-child{border-radius:0 11px 0 0;}
  tbody td{
    padding:9px 12px;border-bottom:1px solid #f2ede8;
    font-size:12.5px;color:var(--text);
    transition:background .12s;
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:#fdf7f2;}
  tbody tr{cursor:default;transition:background .12s;}

  /* 왼쪽 테이블 열 너비 */
  .left-wrap{height:var(--pane-h);}
  .left-wrap thead th:nth-child(1){width:36%;}
  .left-wrap thead th:nth-child(2){width:44%;}
  .left-wrap thead th:nth-child(3){width:20%;text-align:right;}
  .left-wrap td:last-child{text-align:right;font-weight:600;color:var(--accent-dark);}
  .right-wrap{height:calc(var(--pane-h) - var(--right-pager-h));}

  /* ── 행 선택 강조 ── */
  tbody tr.selected td{background:#fdf0e6!important;}

  /* ── 단지수 정렬 헤더 ── */
  #sortByCount{
    cursor:pointer;user-select:none;
    transition:color .15s;
  }
  #sortByCount:hover{color:var(--accent);}

  /* ── 페이저 ── */
  #pager{
    display:flex;gap:8px;align-items:center;
    margin:2px 0 0;padding:4px 0;height:var(--right-pager-h);
    border-top:1px solid var(--border);
  }
  #pager button,
  .download-btn,.unit-btn{
    border:none;border-radius:9px;padding:7px 14px;
    font-size:12.5px;font-weight:600;cursor:pointer;
    transition:background .18s,transform .1s,box-shadow .18s;
    font-family:inherit;
  }
  #prevBtn,#nextBtn{
    background:#f0ece8;color:var(--text-soft);border:1px solid var(--border-strong);
  }
  #prevBtn:hover:not(:disabled),#nextBtn:hover:not(:disabled){
    background:#e8e2dc;transform:translateY(-1px);
  }
  #prevBtn:disabled,#nextBtn:disabled{opacity:.38;cursor:not-allowed;}

  .download-btn{
    background:linear-gradient(135deg,var(--accent) 0%,var(--accent-mid) 100%);
    color:#fff;box-shadow:0 3px 10px rgba(224,123,57,.4);
    padding:7px 16px;
  }
  .download-btn:hover{
    box-shadow:0 5px 16px rgba(224,123,57,.5);transform:translateY(-1px);
  }
  .unit-btn{
    background:#fff0e4;color:var(--accent-dark);
    border:1px solid rgba(224,123,57,.3)!important;
    padding:7px 11px;
  }
  .unit-btn:hover{background:#ffe4cc;transform:translateY(-1px);}

  #pageSizeSel{
    background:#faf9f7;border:1px solid var(--border-strong);
    border-radius:9px;padding:7px 10px;font-size:12.5px;
    color:var(--text-soft);
  }

  /* ── 필터 뱃지 ── */
  #filterBadge{
    background:#fff0e4;color:var(--accent-dark);
    border-color:rgba(224,123,57,.25);
    font-weight:500;
  }

  /* ── 반응형 ── */
  @media (max-width:1024px){
    html,body{height:auto;}
    body{overflow:auto;}
    .panes{grid-template-columns:1fr;grid-template-rows:auto auto;height:auto;}
    #leftCard{max-height:calc(100dvh - 120px)!important;overflow:hidden;}
    #leftCard .body{display:flex;flex-direction:column;height:100%;min-height:0;}
    #leftCard .left-wrap{flex:1 1 auto;min-height:0;overflow:auto;overscroll-behavior:contain;}
    .right-wrap{margin-top:12px;height:auto;max-height:none;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top-header">
    <div class="header-left">
      <div class="header-icon">🏢</div>
      <div>
        <h1>[루시퍼홍] 임장지 단지 몇 개지?</h1>
      </div>
      <span class="meta">2026-03-23 데이터</span>
    </div>
    <span class="pill" id="summaryMeta">데이터 로딩중…</span>
  </header>


  <div class="panes">
    <!-- LEFT -->
    <section class="card" id="leftCard">
      <div class="card-header"><div class="card-header-dot"></div><h2>시군구별 단지수</h2></div>
      <div class="body">
        <div class="toolbar">
          <input id="leftSearch" type="text" placeholder="검색: 시도명/시군구" />
        </div>
        <div class="toolbar">
          <label class="ck"><input type="checkbox" id="ckSale" />아파트분양권 포함</label>
          <label class="ck">세대수(이상)
            <input id="minUnits" type="number" min="0" step="10" value="200" style="width:60px;text-align:right;" />
            <button type="button" class="unit-btn" data-val="200">200</button>
            <button type="button" class="unit-btn" data-val="300">300</button>
          </label>
        </div>
        <div class="toolbar">
          <label class="ck">전용면적
            <input id="areaFrom" type="number" min="0" step="1" placeholder="from" style="width:70px" /> ~
            <input id="areaTo" type="number" min="0" step="1" placeholder="to" style="width:70px" /> ㎡
          </label>
        </div>
        
        <div class="table-wrap left-wrap">
          <table id="leftTable">
            <thead>
              <tr>
                <th>시도명</th>
                <th>시군구</th>
                <th id="sortByCount" style="cursor:pointer;">단지수</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- RIGHT -->
    <section class="card">
      <div class="card-header"><div class="card-header-dot"></div><h2>상세 데이터</h2></div>
      <div class="body">
        <div class="toolbar">
          <input id="detailSearch" type="text" placeholder="자유 검색 (모든 컬럼 또는 선택 컬럼)" />
          <select id="colSelect">
            <option value="">모든 컬럼에서 검색</option>
            <option>시도명</option><option>시군구</option><option>읍면동</option><option>유형</option>
            <option>단지코드</option><option>단지명</option><option>사용승인일</option><option>총세대수</option><option>전용면적</option>
			<option>구조</option><option>방수</option><option>욕실수</option><option>평형명</option>

          </select>
          <span id="filterBadge" class="pill" style="display:none;"></span>
        </div>

        <div class="table-wrap right-wrap">
          <table id="detailTable">
            <thead><tr>
              <th>시도명</th><th>시군구</th><th>읍면동</th><th>유형</th>
              <th>단지코드</th><th>단지명</th><th>사용승인일</th><th>총세대수</th><th>전용면적</th>
			  <th>구조</th><th>방수</th><th>욕실수</th><th>평형명</th><th>평형별 세대수</th>
            </tr></thead>
            <tbody></tbody>
          </table>
        </div>

        <!-- pager -->
        <div id="pager">
          <button id="prevBtn">이전</button>
          <span id="pageInfo" class="pill">-</span>
          <button id="nextBtn">다음</button>

          <!-- ✅ 한 페이지 표시 행 수 선택 -->
          <select id="pageSizeSel" title="한 페이지 행 수">
            <option value="50">50행</option>
            <option value="100" selected>100행</option>
            <option value="200">200행</option>
            <option value="500">500행</option>
            <option value="1000">1000행</option>
          </select>

          <span style="flex:1"></span>
          <button id="downloadBtn" class="download-btn">엑셀 다운로드</button>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
  // DOM
  const leftTbody   = document.querySelector('#leftTable tbody');
  const detailTbody = document.querySelector('#detailTable tbody');
  const leftSearch  = document.getElementById('leftSearch');
  const detailSearch= document.getElementById('detailSearch');
  const colSelect   = document.getElementById('colSelect');
  const filterBadge = document.getElementById('filterBadge');
  const summaryMeta = document.getElementById('summaryMeta');
  const prevBtn     = document.getElementById('prevBtn');
  const nextBtn     = document.getElementById('nextBtn');
  const pageInfo    = document.getElementById('pageInfo');
  const pageSizeSel = document.getElementById('pageSizeSel');
  const ckSale      = document.getElementById('ckSale');
  const minUnitsInp = document.getElementById('minUnits');
  const areaFromInp = document.getElementById('areaFrom');
  const areaToInp   = document.getElementById('areaTo');
  const sortByCountTh = document.getElementById('sortByCount');
  const downloadBtn = document.getElementById('downloadBtn');

  // STATE
  let apartments = [];
  let complexes  = [];
  let sggCounts  = [];
  let filteredDetail = [];
  let currentPage = 1;
  let pageSize   = 100; // 기본값
  let selectedSido = "", selectedSgg = "";
  let sortDir = null;

  // Utils
  function fmt(n){ try{ return new Intl.NumberFormat('ko-KR').format(n ?? 0); }catch(e){ return n; } }
  function toNum(v){ if(v==null||v==='') return NaN; const n=Number(String(v).replace(/,/g,'')); return Number.isFinite(n)?n:NaN; }

  // Build complexes (dedupe by 단지코드)
  function buildComplexes(rows){
    const map=new Map();
    for(const r of rows){
      const code=r['단지코드']; if(!code) continue;
      const units=toNum(r['총세대수']), area=toNum(r['전용면적']);
      const type=String(r['유형']||'');
      if(!map.has(code)){
        map.set(code,{단지코드:String(code),시도명:r['시도명']||'',시군구:r['시군구']||'',총세대수:Number.isFinite(units)?units:NaN,면적목록:Number.isFinite(area)?[area]:[],분양권:type.includes('아파트분양권')});
      }else{
        const ex=map.get(code);
        if(Number.isFinite(units)) ex.총세대수 = Number.isFinite(ex.총세대수)?Math.max(ex.총세대수,units):units;
        if(Number.isFinite(area)) ex.면적목록.push(area);
        if(type.includes('아파트분양권')) ex.분양권=true;
      }
    }
    complexes=[...map.values()];
  }

  function complexAreaOk(ex, hasMin, min, hasMax, max){
    if(!hasMin && !hasMax) return true;
    if(!ex.면적목록.length) return false;
    return ex.면적목록.some(a => (!hasMin || a>=min) && (!hasMax || a<=max));
  }

  function computeSggCounts(){
    const includeSale=ckSale.checked;
    const minU=toNum(minUnitsInp.value)||0;
    const minA=toNum(areaFromInp.value), maxA=toNum(areaToInp.value);
    const hasMin=Number.isFinite(minA), hasMax=Number.isFinite(maxA);

    const filtered=complexes.filter(c=>{
      if(!includeSale && c.분양권) return false;
      if(!Number.isFinite(c.총세대수) || c.총세대수<minU) return false;
      if(!complexAreaOk(c,hasMin,minA,hasMax,maxA)) return false;
      return true;
    });

    const map=new Map();
    for(const c of filtered){
      const key=(c.시도명||'')+'||'+(c.시군구||'');
      map.set(key,(map.get(key)||0)+1);
    }
    sggCounts=[...map.entries()].map(([k,cnt])=>{const[sido,sgg]=k.split('||');return{시도명:sido,시군구:sgg,단지수:cnt}});

    if(sortDir==='asc') sggCounts.sort((a,b)=>a.단지수-b.단지수);
    else if(sortDir==='desc') sggCounts.sort((a,b)=>b.단지수-a.단지수);
    else sggCounts.sort((a,b)=>a.시도명.localeCompare(b.시도명)||a.시군구.localeCompare(b.시군구));

    const q=(leftSearch.value||'').trim().toLowerCase();
    if(q){
      sggCounts=sggCounts.filter(r =>
        String(r.시도명||'').toLowerCase().includes(q) ||
        String(r.시군구||'').toLowerCase().includes(q)
      );
    }

    if(sortDir==='asc') sortByCountTh.textContent='단지수 ▲';
    else if(sortDir==='desc') sortByCountTh.textContent='단지수 ▼';
    else sortByCountTh.textContent='단지수';
  }

  function renderLeft(){
    leftTbody.innerHTML='';
    for(const r of sggCounts){
      const tr=document.createElement('tr');
      tr.innerHTML=`<td>${r.시도명||''}</td><td>${r.시군구||''}</td><td style="text-align:right">${fmt(r.단지수)}</td>`;
      tr.style.cursor='pointer';
      tr.onclick=()=>{selectedSido=r.시도명||''; selectedSgg=r.시군구||''; applyDetailFilter();};
      leftTbody.appendChild(tr);
    }
  }

  function paginate(rows){
    const total=rows.length;
    const max=Math.max(1,Math.ceil(total / pageSize));
    if(currentPage>max) currentPage=max;
    const start=(currentPage-1)*pageSize;
    const page=rows.slice(start,start+pageSize);
    pageInfo.textContent=`${fmt(currentPage)} / ${fmt(max)} · 총 ${fmt(total)} 행`;
    prevBtn.disabled=currentPage<=1;
    nextBtn.disabled=currentPage>=max;
    return page;
  }

  function renderDetail(rows){
    detailTbody.innerHTML='';
    for(const r of paginate(rows)){
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td>${r['시도명']||''}</td>
        <td>${r['시군구']||''}</td>
        <td>${r['읍면동']||''}</td>
        <td>${r['유형']||''}</td>
        <td>${r['단지코드']||''}</td>
        <td>${r['단지명']||''}</td>
        <td>${r['사용승인일']||''}</td>
        <td style="text-align:right">${fmt(r['총세대수'])}</td>
        <td style="text-align:right">${r['전용면적']||''}</td>
        <td>${r['구조']||''}</td>
        <td style="text-align:right">${r['방수']||''}</td>
<td style="text-align:right">${r['욕실수']||''}</td>
<td>${r['평형명']||''}</td>
<td style="text-align:right">${r['평형별 세대수']||''}</td>


`;

			
      detailTbody.appendChild(tr);
    }
  }

  function applyDetailFilter(){
    const includeSale=ckSale.checked;
    const minU=toNum(minUnitsInp.value)||0;
    const minA=toNum(areaFromInp.value), maxA=toNum(areaToInp.value);
    const hasMin=Number.isFinite(minA), hasMax=Number.isFinite(maxA);

    const ok=new Set();
    for(const c of complexes){
      if(!includeSale && c.분양권) continue;
      if(!Number.isFinite(c.총세대수) || c.총세대수<minU) continue;
      if(!complexAreaOk(c,hasMin,minA,hasMax,maxA)) continue;
      if(selectedSido && (c.시도명||'')!==selectedSido) continue;
      if((selectedSgg??'')!=='' && (c.시군구||'')!==selectedSgg) continue;
      ok.add(c.단지코드);
    }

    filteredDetail=apartments.filter(r=>{
      const inC=ok.has(String(r['단지코드']||'')); if(!inC) return false;
      const a=toNum(r['전용면적']);
      if(!hasMin && !hasMax) return true;
      if(!Number.isFinite(a)) return false;
      if(hasMin && a<minA) return false;
      if(hasMax && a>maxA) return false;
      return true;
    });

    currentPage=1; renderDetail(filteredDetail);
    const sido=selectedSido||'전국'; const sgg=(selectedSgg??'')===''?'':` ${selectedSgg}`;
    filterBadge.textContent=`${sido}${sgg} · 행 ${fmt(filteredDetail.length)}개`;
    filterBadge.style.display='';
  }

  function doDetailSearch(){
    const q=(detailSearch.value||'').trim().toLowerCase();
    const field=colSelect.value;
    const target=filteredDetail.length?filteredDetail:apartments;
    if(!q){ currentPage=1; renderDetail(target); filterBadge.style.display=filteredDetail.length?'':'none'; return; }
    const keys=field?[field]:['시도명','시군구','읍면동','유형','단지코드','단지명','사용승인일','총세대수','전용면적','구조', '방수', '욕실수', '평형명', '평형별 세대수'];
    const out=target.filter(r=>keys.some(k=>String(r[k]??'').toLowerCase().includes(q)));
    currentPage=1; renderDetail(out);
    filterBadge.textContent=`검색 결과: ${fmt(out.length)}행`; filterBadge.style.display='';
  }


// 상세 rows 안에 시군구가 1종류뿐이면 그 이름을 반환
function deriveSggName(rows){
  const set = new Set();
  for(const r of rows){
    const sgg = String(r['시군구'] || '').trim();
    if(sgg) set.add(sgg);
    if(set.size > 1) break; // 두 가지 이상이면 중단
  }
  return set.size === 1 ? Array.from(set)[0] : '';
}

  function downloadExcel(){
  const rows = (filteredDetail.length ? filteredDetail : apartments);
  if(!rows.length){ alert('다운로드할 데이터가 없습니다.'); return; }

  // ▼ 파일명 결정: 1) 선택된 시군구 2) 상세 rows가 단일 시군구면 그 이름 3) 기본값
  let sggName = (selectedSgg || '').trim();
  if(!sggName){
    sggName = deriveSggName(rows);
  }
  const filename = sggName ? `${sggName}.xlsx` : 'apartments_all.xlsx';

  const headers=['시도명','시군구','읍면동','유형','단지코드','단지명','사용승인일','총세대수','전용면적', '구조', '방수', '욕실수', '평형명', '평형별 세대수'];
  const ws = XLSX.utils.json_to_sheet(rows, { header: headers });
  headers.forEach((h,i)=>{ const c = XLSX.utils.encode_col(i)+'1'; if(ws[c]) ws[c].v = h; });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '아파트단지');
  XLSX.writeFile(wb, filename);
}


  // Events
  leftSearch.addEventListener('input', ()=>{ computeSggCounts(); renderLeft(); });
  [ckSale,minUnitsInp,areaFromInp,areaToInp].forEach(el=>{
    el.addEventListener('input', ()=>{ computeSggCounts(); renderLeft(); applyDetailFilter(); });
  });
  // 복구된 200/300 빠른입력 버튼 동작
  document.querySelectorAll('.unit-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      minUnitsInp.value = btn.dataset.val;
      computeSggCounts(); renderLeft(); applyDetailFilter();
    });
  });
  sortByCountTh.addEventListener('click', ()=>{
    if(sortDir===null) sortDir='asc'; else if(sortDir==='asc') sortDir='desc'; else sortDir=null;
    computeSggCounts(); renderLeft();
  });
  prevBtn.addEventListener('click', ()=>{ if(currentPage>1){ currentPage--; renderDetail(filteredDetail.length?filteredDetail:apartments); }});
  nextBtn.addEventListener('click', ()=>{ currentPage++; renderDetail(filteredDetail.length?filteredDetail:apartments); });
  // 페이지 크기 선택
  pageSizeSel.addEventListener('change', ()=>{
    pageSize = parseInt(pageSizeSel.value, 10);
    currentPage = 1;
    renderDetail(filteredDetail.length ? filteredDetail : apartments);
  });
  detailSearch.addEventListener('input', doDetailSearch);
  colSelect.addEventListener('change', doDetailSearch);
  downloadBtn.addEventListener('click', downloadExcel);

  async function init(){
    const res=await fetch('apartments.json');
    const text=await res.text();
    // 숫자 자리에 "-" 단독으로 들어간 값 → null 치환 (잘못된 JSON 방어)
    const cleaned=text.replace(/:\s*-\s*([,\}\]])/g,':null$1');
    apartments=JSON.parse(cleaned);
    apartments=apartments.map(r=>{
      const u=toNum(r['총세대수']); if(Number.isFinite(u)) r['총세대수']=u;
      const a=toNum(r['전용면적']); if(Number.isFinite(a)) r['전용면적']=a;
      return r;
    });
    buildComplexes(apartments);
    computeSggCounts(); renderLeft();
    applyDetailFilter();
    const sggSet=new Set(complexes.map(c=>(c.시도명||'')+'|'+(c.시군구||'')));
    summaryMeta.textContent=`시군구 ${fmt(sggSet.size)}개 · 단지 ${fmt(complexes.length)}개`;
  }
  window.addEventListener('DOMContentLoaded', init);
</script>
