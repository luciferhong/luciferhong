<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포토메모 지도 내보내기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 40px;
      max-width: 480px;
      width: 100%;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #222; }
    .desc { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 28px; }
    .desc ol { padding-left: 18px; margin-top: 8px; }
    .desc li { margin-bottom: 4px; }
    #exportBtn {
      width: 100%;
      padding: 14px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #exportBtn:hover { background: #1558b0; }
    #exportBtn:disabled { background: #aaa; cursor: not-allowed; }
    #status {
      margin-top: 20px;
      font-size: 14px;
      color: #444;
      line-height: 1.7;
      min-height: 24px;
    }
    .progress-bar {
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      margin-top: 12px;
      overflow: hidden;
      display: none;
    }
    .progress-fill {
      height: 100%;
      background: #1a73e8;
      border-radius: 3px;
      transition: width 0.2s;
      width: 0%;
    }
    .done { color: #0a7c3e; font-weight: 600; }
    .error { color: #c0392b; font-weight: 600; }
  </style>
</head>
<body>
<div class="card">
  <h1>📍 포토메모 지도 내보내기</h1>
  <p class="desc">
    로컬에 저장된 포토메모를 GitHub Pages에서 볼 수 있는 파일로 내보냅니다.
    <ol>
      <li>아래 버튼을 눌러 <strong>memoMap.zip</strong> 다운로드</li>
      <li>압축 해제 후 <code>luciferhong/</code> 폴더에 붙여넣기</li>
      <li>git commit &amp; push</li>
      <li>GitHub Pages에서 <code>memoMap.html</code> 접근</li>
    </ol>
  </p>
  <button id="exportBtn">내보내기 시작</button>
  <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
  <div id="status"></div>
</div>

<script>
const DB_NAME = "hongbuMemo";
const DB_VERSION = 5;
const STORE = "photoMemos";
const NAVER_KEY = "9t8y33hyq8";

function setStatus(msg, cls) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = cls || "";
}

function setProgress(n, total) {
  const bar = document.getElementById("progressBar");
  const fill = document.getElementById("progressFill");
  bar.style.display = "block";
  fill.style.width = total > 0 ? Math.round(n / total * 100) + "%" : "0%";
}

function openDb() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onsuccess = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.close();
        reject(new Error("photoMemos store가 없습니다. hongbutest.html을 한 번 열었다가 닫은 후 다시 시도해주세요."));
        return;
      }
      resolve(db);
    };
    req.onerror = (e) => reject(e.target.error);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("apartmentNotes")) {
        db.createObjectStore("apartmentNotes", { keyPath: "id" });
      }
      if (!db.objectStoreNames.contains(STORE)) {
        const store = db.createObjectStore(STORE, { keyPath: "id" });
        store.createIndex("createdAt", "createdAt", { unique: false });
      }
    };
  });
}

function blobToDataUrl(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = (e) => reject(e);
    reader.readAsDataURL(blob);
  });
}

function blobToArrayBuffer(blob) {
  return blob.arrayBuffer ? blob.arrayBuffer() : new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = (e) => res(e.target.result);
    reader.onerror = rej;
    reader.readAsArrayBuffer(blob);
  });
}

async function getAllPhotoMemos(db) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction([STORE], "readonly");
    const store = tx.objectStore(STORE);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = (e) => reject(e.target.error);
  });
}

// 생성할 memoMap.html 뷰어 템플릿
function buildViewerHtml(memoDataJson) {
  return `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>포토메모 지도</title>
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=${NAVER_KEY}"><\/script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
#map { width: 100%; height: 100vh; }
.memo-marker {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  overflow: hidden;
  cursor: pointer;
  background: #ccc;
}
.memo-marker img { width: 100%; height: 100%; object-fit: cover; }
.popup-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 9999;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
.popup-overlay.open { display: flex; }
.popup-box {
  background: #fff;
  border-radius: 14px;
  max-width: 90vw;
  max-height: 88vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  gap: 12px;
  position: relative;
}
.popup-img {
  max-width: 80vw;
  max-height: 60vh;
  border-radius: 8px;
  object-fit: contain;
  display: block;
}
.popup-note {
  font-size: 15px;
  color: #333;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  max-width: 80vw;
  text-align: left;
  width: 100%;
}
.popup-date {
  font-size: 12px;
  color: #999;
  align-self: flex-start;
}
.popup-close {
  position: absolute;
  top: 10px; right: 14px;
  font-size: 22px;
  cursor: pointer;
  color: #666;
  line-height: 1;
  border: none;
  background: none;
}
</style>
</head>
<body>
<div id="map"></div>
<div class="popup-overlay" id="overlay" onclick="closePopup(event)">
  <div class="popup-box" id="popupBox">
    <button class="popup-close" onclick="closePopupDirect()">✕</button>
    <img class="popup-img" id="popupImg" src="" alt=""/>
    <div class="popup-note" id="popupNote"></div>
    <div class="popup-date" id="popupDate"></div>
  </div>
</div>

<script>
const MEMOS = ${memoDataJson};

let map;
window.addEventListener("load", function() {
  // 첫 번째 메모 기준으로 초기 중심 계산
  let centerLat = 37.5665, centerLng = 126.978;
  if (MEMOS.length > 0) {
    const lats = MEMOS.map(m => m.lat);
    const lngs = MEMOS.map(m => m.lng);
    centerLat = (Math.min(...lats) + Math.max(...lats)) / 2;
    centerLng = (Math.min(...lngs) + Math.max(...lngs)) / 2;
  }

  map = new naver.maps.Map("map", {
    center: new naver.maps.LatLng(centerLat, centerLng),
    zoom: MEMOS.length === 1 ? 16 : 12,
    mapTypeId: naver.maps.MapTypeId.NORMAL
  });

  MEMOS.forEach(function(memo) {
    const container = document.createElement("div");
    container.className = "memo-marker";
    const img = document.createElement("img");
    img.src = "images/" + memo.id + "_thumb.jpg";
    img.alt = "";
    img.onerror = function() {
      container.style.background = "#888";
      container.innerHTML = "📍";
      container.style.display = "flex";
      container.style.alignItems = "center";
      container.style.justifyContent = "center";
      container.style.fontSize = "20px";
    };
    container.appendChild(img);

    const marker = new naver.maps.Marker({
      position: new naver.maps.LatLng(memo.lat, memo.lng),
      map: map,
      icon: {
        content: container,
        anchor: new naver.maps.Point(24, 24)
      }
    });

    naver.maps.Event.addListener(marker, "click", function() {
      openPopup(memo);
    });
  });
});

function openPopup(memo) {
  document.getElementById("popupImg").src = "images/" + memo.id + ".jpg";
  document.getElementById("popupNote").textContent = memo.note || "";
  const d = memo.createdAt ? new Date(memo.createdAt) : null;
  document.getElementById("popupDate").textContent = d ? d.toLocaleString("ko-KR") : "";
  document.getElementById("overlay").classList.add("open");
}

function closePopup(e) {
  if (e.target === document.getElementById("overlay")) {
    document.getElementById("overlay").classList.remove("open");
  }
}

function closePopupDirect() {
  document.getElementById("overlay").classList.remove("open");
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") document.getElementById("overlay").classList.remove("open");
});
<\/script>
</body>
</html>`;
}

document.getElementById("exportBtn").addEventListener("click", async function() {
  const btn = document.getElementById("exportBtn");
  btn.disabled = true;
  setProgress(0, 1);

  try {
    setStatus("IndexedDB 열기 중...");
    const db = await openDb();

    setStatus("포토메모 읽는 중...");
    const memos = await getAllPhotoMemos(db);
    db.close();

    if (memos.length === 0) {
      setStatus("저장된 포토메모가 없습니다.", "error");
      btn.disabled = false;
      return;
    }

    setStatus(`총 ${memos.length}개 메모 처리 중...`);

    const zip = new JSZip();
    const imagesFolder = zip.folder("images");

    // 뷰어에 넘길 메타데이터 (Blob 제외)
    const memoData = [];

    for (let i = 0; i < memos.length; i++) {
      const memo = memos[i];
      setStatus(`이미지 변환 중... (${i + 1}/${memos.length})`);
      setProgress(i + 1, memos.length);

      const id = String(memo.id);

      // 메타데이터
      memoData.push({
        id: id,
        lat: memo.lat,
        lng: memo.lng,
        note: memo.note || "",
        createdAt: memo.createdAt || 0,
      });

      // 원본 이미지
      if (memo.imageBlob instanceof Blob) {
        try {
          const buf = await blobToArrayBuffer(memo.imageBlob);
          imagesFolder.file(id + ".jpg", buf);
        } catch (e) {
          console.warn("원본 이미지 변환 실패:", id, e);
        }
      }

      // 썸네일
      if (memo.thumbBlob instanceof Blob) {
        try {
          const buf = await blobToArrayBuffer(memo.thumbBlob);
          imagesFolder.file(id + "_thumb.jpg", buf);
        } catch (e) {
          // 썸네일 없으면 원본으로 대체
          if (memo.imageBlob instanceof Blob) {
            try {
              const buf = await blobToArrayBuffer(memo.imageBlob);
              imagesFolder.file(id + "_thumb.jpg", buf);
            } catch (_) {}
          }
        }
      } else if (memo.imageBlob instanceof Blob) {
        // thumbBlob 없으면 원본으로 대체
        try {
          const buf = await blobToArrayBuffer(memo.imageBlob);
          imagesFolder.file(id + "_thumb.jpg", buf);
        } catch (e) {
          console.warn("썸네일 대체 실패:", id, e);
        }
      }
    }

    // memoData.json
    zip.file("memoData.json", JSON.stringify(memoData, null, 2));

    // memoMap.html
    const viewerHtml = buildViewerHtml(JSON.stringify(memoData));
    zip.file("memoMap.html", viewerHtml);

    setStatus("ZIP 파일 생성 중...");
    setProgress(memos.length, memos.length);

    const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE", compressionOptions: { level: 6 } });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "memoMap.zip";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 3000);

    setStatus(`완료! memoMap.zip (${memos.length}개 메모) 다운로드됨. luciferhong/ 폴더에 압축 해제 후 push하세요.`, "done");

  } catch (e) {
    console.error(e);
    setStatus("오류 발생: " + (e?.message || String(e)), "error");
    btn.disabled = false;
  }
});
</script>
</body>
</html>
