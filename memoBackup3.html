<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>홍부 메모 백업 (모바일 최적화 · 단일 NDJSON)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { --bg:#f7f7f9; --card:#fff; --text:#222; --muted:#666; --brand:#4A90E2; --brand2:#357ABD; }
    html, body { height:100%; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, 'Noto Sans', Arial, sans-serif; margin:0; padding:24px; background:var(--bg); color:var(--text); }
    h1 { margin:0 0 14px; font-size:22px; }
    p  { margin:6px 0 14px; color:var(--muted) }
    .card { background:var(--card); border:1px solid #e9e9ef; border-radius:12px; padding:16px; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
    .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    label { font-size:14px; color:#333; display:flex; flex-direction:column; gap:6px; }
    select, button { font-size:14px; border-radius:8px; border:1px solid #d7d7de; padding:8px 10px; background:#fff; }
    select { min-width: 180px; }
    button { background:var(--brand); color:#fff; border:none; cursor:pointer; padding:10px 16px; font-weight:600; }
    button:hover { background:var(--brand2); }
    button.secondary { background:#fff; color:#333; border:1px solid #d7d7de; }
    .muted { color:var(--muted); font-size:13px; }
    .counter { font-size:13px; color:#333; margin-left:auto; }
    .downloads { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
    .divider { height:1px; background:#eee; margin:12px 0; }

    /* 로딩 모달 */
    .modal {
      position: fixed; inset:0; display:none; align-items:center; justify-content:center;
      background: rgba(0,0,0,.35); z-index: 9999;
    }
    .modal.show { display:flex; }
    .modal-card {
      background:#fff; color:#333; padding:18px 20px; border-radius:12px; min-width: 240px;
      box-shadow: 0 10px 30px rgba(0,0,0,.18); text-align:center; font-size:14px;
    }
    .spinner {
      width:26px; height:26px; border-radius:50%;
      border:3px solid #e5e7eb; border-top-color: var(--brand);
      margin:0 auto 10px; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>📦 홍부 메모 백업</h1>
  <p>시도/시군구를 먼저 선택하세요. <span class="muted">목록에는 “메모 또는 사진이 실제로 존재하는 지역”만 표시됩니다.</span></p>

  <div class="card" id="filters">
    <div class="row" style="gap:12px">
      <label>시도
        <select id="sidoFilter"><option value="">전체</option></select>
      </label>
      <label>시군구
        <select id="sigunguFilter" disabled><option value="">전체</option></select>
      </label>
      <button id="refreshRegions" class="secondary">🔄 지역 새로고침</button>
      <span id="aptStatus" class="muted">(아파트 데이터 자동 로드 대기)</span>
      <span class="counter">선택된 메모: <b id="selCount">0</b>건</span>
    </div>
  </div>

  <div class="card" style="margin-top:14px">
    <div class="row">
      <button id="backupBtn">⬇️ 선택 메모 백업</button>
      <span class="muted">메모와 포토를 하나의 파일로 백업합니다.</span>
    </div>
    <div class="divider"></div>
    <div id="downloadContainer" class="downloads"></div>
  </div>

  <!-- 처리중 모달 -->
  <div id="busyModal" class="modal" role="dialog" aria-modal="true" aria-live="polite">
    <div class="modal-card">
      <div class="spinner" aria-hidden="true"></div>
      <div id="busyText">처리 중입니다…</div>
    </div>
  </div>

  <script>
  // ==========================
  // IndexedDB
  // ==========================
  const DB_NAME = 'hongbuMemo';
  const DB_VERSION = 5;
  const STORE_NOTES = 'apartmentNotes';
  const STORE_PHOTOS = 'photoMemos';

  // hongbutest와 동일 계열의 SIG 파일명 우선 사용, 없으면 대체 세트 시도
  const SIG_GEOJSON_CANDIDATE_SETS = [
    [
      'sig_from_emd_wgs84_utf8_2025-11-01_sggfields_part01.geojson',
      'sig_from_emd_wgs84_utf8_2025-11-01_sggfields_part02.geojson',
    ]
  ];

  const SIDO_CODE_NAME_MAP = {
    '11': '서울특별시',
    '26': '부산광역시',
    '27': '대구광역시',
    '28': '인천광역시',
    '29': '광주광역시',
    '30': '대전광역시',
    '31': '울산광역시',
    '36': '세종특별자치시',
    '41': '경기도',
    '42': '강원특별자치도',
    '43': '충청북도',
    '44': '충청남도',
    '45': '전북특별자치도',
    '46': '전라남도',
    '47': '경상북도',
    '48': '경상남도',
    '50': '제주특별자치도',
    '51': '강원특별자치도',
    '52': '전북특별자치도',
  };

  let SIDO_NAME_CODE_MAP = Object.fromEntries(
    Object.entries(SIDO_CODE_NAME_MAP).map(([code, name]) => [name, code])
  );

  function _normalizeSidoCode(raw) {
    const s = String(raw ?? '').trim();
    if (!s) return '';
    if (/^\d{2}$/.test(s)) return s;
    if (/^\d{5,10}$/.test(s)) return s.slice(0, 2);
    return SIDO_NAME_CODE_MAP[s] || '';
  }

  function _rebuildSidoNameCodeMap() {
    const next = {};
    for (const [code, name] of Object.entries(SIDO_CODE_NAME_MAP)) {
      const nm = String(name || '').trim();
      if (!nm) continue;
      next[nm] = code;

      // apt.json에 시/특별시 표기가 혼재되어도 같은 코드로 매핑되도록 별칭 등록
      if (nm.endsWith('특별시')) next[nm.replace('특별시', '시')] = code;
      if (nm.endsWith('광역시')) next[nm.replace('광역시', '시')] = code;
      if (nm.endsWith('특별자치도')) next[nm.replace('특별자치도', '도')] = code;
    }
    SIDO_NAME_CODE_MAP = next;
  }

  function _registerSidoFromApt(sidoCodeRaw, sidoNameRaw) {
    const code = _normalizeSidoCode(sidoCodeRaw);
    const name = String(sidoNameRaw ?? '').trim();
    if (!code || !name) return;

    // apt.json에서 온 이름을 기준명으로 사용
    SIDO_CODE_NAME_MAP[code] = name;
    _rebuildSidoNameCodeMap();
  }

  _rebuildSidoNameCodeMap();

  // ==========================
  // UI
  // ==========================
  const els = {
    sido: document.getElementById('sidoFilter'),
    sigungu: document.getElementById('sigunguFilter'),
    refresh: document.getElementById('refreshRegions'),
    status: document.getElementById('aptStatus'),
    selCount: document.getElementById('selCount'),
    downloads: document.getElementById('downloadContainer'),
    backup: document.getElementById('backupBtn'),
    modal: document.getElementById('busyModal'),
    busyText: document.getElementById('busyText'),
  };
  const setAptStatus = t => { els.status.textContent = t; };

  // 로딩 모달
  function showBusy(msg='처리 중입니다…') {
    els.busyText.textContent = msg;
    els.modal.classList.add('show');
  }
  function hideBusy() {
    els.modal.classList.remove('show');
  }

  // ==========================
  // 유틸
  // ==========================
  function fillOptions(selectEl, items) {
    const prev = selectEl.value;
    selectEl.innerHTML = '';
    const optAll = document.createElement('option');
    optAll.value = '';
    optAll.textContent = '전체';
    selectEl.appendChild(optAll);
    (items || []).forEach(({ value, label }) => {
      const opt = document.createElement('option');
      opt.value = String(value ?? '');
      opt.textContent = String(label ?? value ?? '');
      selectEl.appendChild(opt);
    });
    if ([...selectEl.options].some(o => o.value === prev)) selectEl.value = prev;
  }

  function stripHtmlAndTrim(s) {
    return String(s ?? '')
      .replace(/<[^>]*>/g, '')
      .replace(/&nbsp;/gi, ' ')
      .trim();
  }

  function hasMemoContent(n) {
    const memoText = stripHtmlAndTrim(n?.memo);
    const imgs = Array.isArray(n?.images) ? n.images : [];
    return memoText.length > 0 || imgs.length > 0;
  }

  function noteIdOf(n) {
    return String(n?.id ?? n?.aptId ?? n?.apartmentId ?? '').trim();
  }

  function photoIdOf(p) {
    return String(p?.id ?? '').trim();
  }

  function makeUnknownRegion() {
    return {
      sidoCode: '__UNKNOWN_SIDO__',
      sidoName: '미분류',
      sigunguCode: '__UNKNOWN_SIGUNGU__',
      sigunguName: '미분류',
    };
  }

  // 디바운스(선택 변경 연타 시 불필요 렌더링 방지)
  function debounce(fn, t=120) {
    let timer;
    return (...args) => {
      clearTimeout(timer);
      timer = setTimeout(() => fn(...args), t);
    };
  }

  // ==========================
  // 유틸
  // ==========================
  function blobToDataUrl(blob) {
    return new Promise((resolve) => {
      if (!(blob instanceof Blob)) return resolve(null);
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => resolve(null);
      reader.readAsDataURL(blob);
    });
  }

  async function serializePhotoForExport(photo) {
    const { imageBlob, thumbBlob, ...rest } = photo;
    const result = { ...rest };
    const imgUrl = await blobToDataUrl(imageBlob);
    const thmUrl = await blobToDataUrl(thumbBlob);
    if (imgUrl) result.imageDataUrl = imgUrl;
    if (thmUrl) result.thumbDataUrl = thmUrl;
    return result;
  }

  // ==========================
  // DB 순회(스트리밍)
  // ==========================
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = () => reject(new Error('DB 열기 실패'));
    });
  }

  async function iterateStore(storeName, visitor) {
    const db = await openDB();
    if (!db.objectStoreNames.contains(storeName)) {
      db.close();
      return;
    }
    const tx = db.transaction([storeName], 'readonly');
    const st = tx.objectStore(storeName);
    await new Promise((resolve, reject) => {
      const req = st.openCursor();
      req.onsuccess = async e => {
        const cur = e.target.result;
        if (cur) {
          try { await visitor(cur.value); } catch (e) { console.error(e); }
          cur.continue();
        } else resolve();
      };
      req.onerror = () => reject(new Error('cursor 실패'));
    });
    db.close();
  }

  async function iterateNotes(visitor) {
    await iterateStore(STORE_NOTES, visitor);
  }

  async function iteratePhotoMemos(visitor) {
    await iterateStore(STORE_PHOTOS, visitor);
  }

  function hasPhotoImage(p) {
    const hasBlob = (p?.imageBlob instanceof Blob) || (p?.thumbBlob instanceof Blob);
    const hasDataUrl =
      (typeof p?.imageDataUrl === 'string' && p.imageDataUrl.startsWith('data:')) ||
      (typeof p?.thumbDataUrl === 'string' && p.thumbDataUrl.startsWith('data:'));
    return !!(hasBlob || hasDataUrl);
  }

  // ==========================
  // apt.json 인덱스(필요한 것만)
  // ==========================
  const aptIndex = new Map(); // aptId -> {sido, sidoNm, sigungu, sigunguNm}
  const sigunguNameByCode = new Map(); // key: `${sidoCode}:${sigunguCode}` -> canonical name
  const sigunguNameByCode5 = new Map(); // key: `${sigunguCode5}` -> canonical name

  function _normalizeSigunguCode(raw) {
    const s = String(raw ?? '').trim();
    if (!s) return '';
    if (/^\d{5}$/.test(s)) return s;
    const m = s.match(/\d{5}/);
    return m ? m[0] : '';
  }

  function _registerSigunguFromApt(sidoCodeRaw, sigunguCodeRaw, sigunguNameRaw) {
    const sidoCode = _normalizeSidoCode(sidoCodeRaw);
    const sigunguCode = _normalizeSigunguCode(sigunguCodeRaw);
    const sigunguName = String(sigunguNameRaw ?? '').trim();
    if (!/^\d{2}$/.test(sidoCode) || !/^\d{5}$/.test(sigunguCode) || !sigunguName) return;

    const key = `${sidoCode}:${sigunguCode}`;
    const prev = sigunguNameByCode.get(key);
    // 더 구체적인 이름(예: "부천시 원미구")을 우선 사용
    if (!prev || sigunguName.length > prev.length) {
      sigunguNameByCode.set(key, sigunguName);
    }

    const prev5 = sigunguNameByCode5.get(sigunguCode);
    if (!prev5 || sigunguName.length > prev5.length) {
      sigunguNameByCode5.set(sigunguCode, sigunguName);
    }
  }

  function _normalizeSigunguName(sidoCode, sigunguCode, sigunguName) {
    const sCode = _normalizeSidoCode(sidoCode);
    const gCode = _normalizeSigunguCode(sigunguCode) || String(sigunguCode ?? '').trim();
    const gName = String(sigunguName ?? '').trim();
    if (/^\d{2}$/.test(sCode) && /^\d{5}$/.test(gCode)) {
      const canonical = sigunguNameByCode.get(`${sCode}:${gCode}`);
      if (canonical) return canonical;
    }
    if (/^\d{5}$/.test(gCode)) {
      const canonical5 = sigunguNameByCode5.get(gCode);
      if (canonical5) return canonical5;
    }
    return gName || gCode; 
  }

  async function collectUsedAptIds() {
    const set = new Set();
    await iterateNotes(n => {
      if (!hasMemoContent(n)) return;
      const id = noteIdOf(n);
      if (id) set.add(id);
    });
    return set;
  }

  function preloadCanonicalRegionMapFromApt(arr) {
    for (const a of arr || []) {
      const rawSidoCode = String(a?.sido ?? a?.sidoCode ?? '').trim();
      const rawSidoName = String(a?.sidoNm ?? a?.sidoName ?? '').trim();
      _registerSidoFromApt(rawSidoCode, rawSidoName);
      _registerSigunguFromApt(
        _normalizeSidoCode(rawSidoCode) || rawSidoCode,
        String(a?.sigungu ?? a?.sigunguCode ?? '').trim(),
        String(a?.sigunguNm ?? a?.sigunguName ?? '').trim()
      );
    }
  }

  async function loadFilteredAptIndexFromSamePath() {
    showBusy('아파트 데이터(apt.json) 불러오는 중…');
    try { 
      const usedIds = await collectUsedAptIds(); // 내용 있는 메모 기준
      const res = await fetch('apt.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      aptIndex.clear();
      sigunguNameByCode.clear();
      sigunguNameByCode5.clear();
      const arr = Array.isArray(data) ? data :
        (Array.isArray(data?.apartments) ? data.apartments :
         Array.isArray(data?.data) ? data.data : []);

      // apt.json 전체를 기준으로 시도/시군구 기준명 맵을 먼저 구성한다.
      preloadCanonicalRegionMapFromApt(arr);

      for (const a of arr) {
        const id = String(a.id ?? a.apartmentId ?? a.aptId ?? '').trim();
        if (!id || !usedIds.has(id)) continue;

        const rawSidoCode = String(a.sido ?? a.sidoCode ?? '').trim();
        const rawSidoName = String(a.sidoNm ?? a.sidoName ?? '').trim();

        aptIndex.set(id, {
          sido: _normalizeSidoCode(rawSidoCode) || rawSidoCode,
          sidoNm: rawSidoName || SIDO_CODE_NAME_MAP[_normalizeSidoCode(rawSidoCode)] || '',
          sigungu: String(a.sigungu ?? a.sigunguCode ?? '').trim(),
          sigunguNm: String(a.sigunguNm ?? a.sigunguName ?? '').trim(),
        });
      }
      setAptStatus(`아파트 ${aptIndex.size}건 로딩됨 (필요 항목 + 기준명 ${sigunguNameByCode.size}개)`);
      hideBusy();
      return true;
    } catch (e) {
      console.warn('apt.json 자동 로드 실패:', e);
      setAptStatus('(아파트 데이터 미로딩: apt.json 파일 위치를 확인하세요)');
      hideBusy();
      return false;
    }
  }

  function regionFromNoteViaApt(note) {
    const id = noteIdOf(note);
    if (!id) return null;
    const a = aptIndex.get(id);
    if (!a) return null;

    let sidoCode = _normalizeSidoCode(a.sido);
    let sidoName = String(a.sidoNm || '').trim();
    let sigunguCode = _normalizeSigunguCode(a.sigungu) || String(a.sigungu || '').trim();
    let sigunguName = String(a.sigunguNm || '').trim();

    // ✅ 시도 코드/이름 정규화: 이름만 있어도 코드로 통일
    if (!/^\d{2}$/.test(sidoCode)) {
      const candidateCode = SIDO_NAME_CODE_MAP[sidoCode] || SIDO_NAME_CODE_MAP[sidoName] || '';
      if (candidateCode) sidoCode = candidateCode;
    }
    if (!sidoName) sidoName = SIDO_CODE_NAME_MAP[sidoCode] || sidoCode;

    // ✅ 시군구 코드/이름 정규화: 이름만 있을 때 SIG 인덱스에서 코드 매칭
    if (!/^\d{5}$/.test(sigunguCode)) {
      const wantedName = sigunguName || sigunguCode;
      const matched = (sigRegionIndex.prepared || []).find(f => {
        const r = f.region || {};
        return String(r.sidoCode || '').trim() === String(sidoCode || '').trim()
          && String(r.sigunguName || '').trim() === String(wantedName || '').trim();
      });
      if (matched?.region?.sigunguCode) {
        sigunguCode = _normalizeSigunguCode(matched.region.sigunguCode) || String(matched.region.sigunguCode).trim();
        if (!sigunguName) sigunguName = String(matched.region.sigunguName || '').trim();
      }
    }
    sigunguName = _normalizeSigunguName(sidoCode, sigunguCode, sigunguName);

    return {
      sidoCode,
      sidoName,
      sigunguCode,
      sigunguName,
    };
  }

  // ==========================
  // SIG 기반 포토메모 지역 판별
  // ==========================
  const SIG_GRID_STEP = 0.1; // 그리드 셀 크기(도): ~11km × ~11km

  const sigRegionIndex = {
    prepared: null, // [{bbox:[minLng,minLat,maxLng,maxLat], geometry, region}]
    grid: null,     // Map<"x,y" -> feature[]>  좌표→시군구 고속 조회용
    loaded: false,
    sourceName: '',
  };

  // SIG 로드 시 1회만 실행: bbox 기반 그리드에 각 폴리곤을 등록
  function _buildSigGridIndex(prepared) {
    const grid = new Map();
    const step = SIG_GRID_STEP;
    for (const f of prepared) {
      const [minLng, minLat, maxLng, maxLat] = f.bbox;
      const x0 = Math.floor(minLng / step);
      const x1 = Math.floor(maxLng / step);
      const y0 = Math.floor(minLat / step);
      const y1 = Math.floor(maxLat / step);
      for (let x = x0; x <= x1; x++) {
        for (let y = y0; y <= y1; y++) {
          const key = `${x},${y}`;
          if (!grid.has(key)) grid.set(key, []);
          grid.get(key).push(f);
        }
      }
    }
    return grid;
  }

  function _bboxContains(b, lng, lat) {
    return !!b && lng >= b[0] && lng <= b[2] && lat >= b[1] && lat <= b[3];
  }

  function _pointInRing(ptLng, ptLat, ring) {
    let inside = false;
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      const xi = ring[i][0], yi = ring[i][1];
      const xj = ring[j][0], yj = ring[j][1];
      const intersect = ((yi > ptLat) !== (yj > ptLat)) &&
        (ptLng < (xj - xi) * (ptLat - yi) / ((yj - yi) || 1e-12) + xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }

  function _pointInPolygon(ptLng, ptLat, polygonCoords) {
    if (!polygonCoords || !polygonCoords.length) return false;
    const outer = polygonCoords[0];
    if (!_pointInRing(ptLng, ptLat, outer)) return false;
    for (let i = 1; i < polygonCoords.length; i++) {
      if (_pointInRing(ptLng, ptLat, polygonCoords[i])) return false; // hole
    }
    return true;
  }

  function _geomContainsPoint(geom, lng, lat) {
    if (!geom || !geom.type) return false;
    if (geom.type === 'Polygon') return _pointInPolygon(lng, lat, geom.coordinates);
    if (geom.type === 'MultiPolygon') {
      return (geom.coordinates || []).some(poly => _pointInPolygon(lng, lat, poly));
    }
    return false;
  }

  function _computeBBox(geom) {
    let minLng = Infinity, minLat = Infinity, maxLng = -Infinity, maxLat = -Infinity;
    const walk = (arr) => {
      for (const it of arr || []) {
        if (Array.isArray(it) && typeof it[0] === 'number' && typeof it[1] === 'number') {
          const lng = it[0], lat = it[1];
          if (lng < minLng) minLng = lng;
          if (lng > maxLng) maxLng = lng;
          if (lat < minLat) minLat = lat;
          if (lat > maxLat) maxLat = lat;
        } else if (Array.isArray(it)) {
          walk(it);
        }
      }
    };
    walk(geom?.coordinates || []);
    if (!isFinite(minLng)) return null;
    return [minLng, minLat, maxLng, maxLat];
  }

  function _pickRegionFromSigProps(props = {}) {
    const sigunguCodeRaw = props.sgg_cd ?? props.sig_cd ?? props.SIG_CD ?? props.code ?? props.sggCode ?? '';
    const sigunguNameRaw = props.sgg_nm ?? props.sig_kor_nm ?? props.SIG_KOR_NM ?? props.NAME ?? props.name ?? props.A2 ?? '';
    const sidoCodeRaw = props.sido_cd ?? props.sd_cd ?? props.SIDO_CD ?? props.A1_CD ?? '';
    const sidoNameRaw = props.sido_nm ?? props.sdo_nm ?? props.sd_nm ?? props.A1 ?? '';

    const sigunguCode = _normalizeSigunguCode(sigunguCodeRaw) || String(sigunguCodeRaw || '').trim() || String(sigunguNameRaw || '').trim();
    let sigunguName = String(sigunguNameRaw || '').trim() || sigunguCode;

    let sidoCode = _normalizeSidoCode(sidoCodeRaw);
    if (!sidoCode && /^\d{5}$/.test(sigunguCode)) sidoCode = sigunguCode.slice(0, 2);
    if (!sidoCode) sidoCode = String(sidoNameRaw || '').trim();

    const sidoName = String(sidoNameRaw || '').trim() || SIDO_CODE_NAME_MAP[sidoCode] || sidoCode;
    sigunguName = _normalizeSigunguName(sidoCode, sigunguCode, sigunguName);

    if (!sidoCode) return null;
    return { sidoCode, sidoName, sigunguCode, sigunguName };
  }

  function _prepareSigFeatures(fc) {
    const out = [];
    for (const f of (fc?.features || [])) {
      const geom = f?.geometry;
      if (!geom) continue;
      const bbox = _computeBBox(geom);
      if (!bbox) continue;
      const region = _pickRegionFromSigProps(f?.properties || {});
      if (!region || !region.sidoCode) continue;
      out.push({ bbox, geometry: geom, region });
    }
    return out;
  }

  async function _fetchMergedFeatureCollection(parts) {
    const results = await Promise.all(parts.map(async p => {
      const res = await fetch(p, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${p}`);
      return res.json();
    }));
    const merged = { type: 'FeatureCollection', features: [] };
    for (const fc of results) {
      if (fc?.type === 'FeatureCollection' && Array.isArray(fc.features)) merged.features.push(...fc.features);
    }
    return merged;
  }

  async function ensureSigRegionIndex() {
    if (sigRegionIndex.loaded) return true;

    for (const set of SIG_GEOJSON_CANDIDATE_SETS) {
      try {
        const fc = await _fetchMergedFeatureCollection(set);
        const prepared = _prepareSigFeatures(fc);
        if (prepared.length > 0) {
          sigRegionIndex.prepared = prepared;
          sigRegionIndex.grid = _buildSigGridIndex(prepared);
          sigRegionIndex.loaded = true;
          sigRegionIndex.sourceName = set.join(', ');
          return true;
        }
      } catch (e) {
        // 다음 후보 세트 시도
      }
    }
    sigRegionIndex.prepared = [];
    sigRegionIndex.loaded = true;
    return false;
  }

  function regionFromPhotoBySig(photo) {
    const lat = Number.parseFloat(String(photo?.lat ?? '').replace(',', '.'));
    const lng = Number.parseFloat(String(photo?.lng ?? '').replace(',', '.'));
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) return makeUnknownRegion();

    const step = SIG_GRID_STEP;
    const gx = Math.floor(lng / step);
    const gy = Math.floor(lat / step);

    // ① 그리드 조회: 해당 셀 후보만 point-in-polygon 검사 (평균 2~3건)
    if (sigRegionIndex.grid) {
      const candidates = sigRegionIndex.grid.get(`${gx},${gy}`) || [];
      for (const f of candidates) {
        if (!_bboxContains(f.bbox, lng, lat)) continue;
        if (_geomContainsPoint(f.geometry, lng, lat)) return f.region;
      }

      // ② 경계 오차 보정: 인접 3×3 셀까지 확인
      const EPS = 0.00015;
      const seen = new Set();
      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          if (dx === 0 && dy === 0) continue; // 이미 위에서 확인
          const cell = sigRegionIndex.grid.get(`${gx + dx},${gy + dy}`) || [];
          for (const f of cell) {
            if (seen.has(f)) continue;
            seen.add(f);
            const b = f.bbox;
            if (!b) continue;
            if (lng < b[0] - EPS || lng > b[2] + EPS || lat < b[1] - EPS || lat > b[3] + EPS) continue;
            if (_geomContainsPoint(f.geometry, lng, lat)) return f.region;
          }
        }
      }
      // 인접 셀에서도 못 찾으면 완화 bbox 반환
      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          const cell = sigRegionIndex.grid.get(`${gx + dx},${gy + dy}`) || [];
          for (const f of cell) {
            const b = f.bbox;
            if (!b) continue;
            if (lng < b[0] - EPS || lng > b[2] + EPS || lat < b[1] - EPS || lat > b[3] + EPS) continue;
            return f.region;
          }
        }
      }
      return makeUnknownRegion();
    }

    // ③ 그리드 없을 때 폴백: 전체 선형 스캔
    const prepared = sigRegionIndex.prepared || [];
    for (const f of prepared) {
      if (!_bboxContains(f.bbox, lng, lat)) continue;
      if (_geomContainsPoint(f.geometry, lng, lat)) return f.region;
    }
    const EPS2 = 0.00015;
    for (const f of prepared) {
      const b = f.bbox;
      if (!b) continue;
      if (lng < b[0] - EPS2 || lng > b[2] + EPS2 || lat < b[1] - EPS2 || lat > b[3] + EPS2) continue;
      return f.region;
    }

    return makeUnknownRegion();
  }

  // ==========================
  // ✅ 속도개선 핵심: 지역 캐시(1회 생성)
  // ==========================
  const regionCache = {
    bySido: new Map(),     // sido -> { name, sigungu: Map(sig -> {name,count}), count }
    itemRegion: new Map(), // key(note:ID/photo:ID) -> {sidoCode, sigunguCode, ...}
    itemMeta: new Map(),   // key -> { kind, id }
  };

  function addRegionToCache(region) {
    if (!region || !region.sidoCode) return;
    if (!regionCache.bySido.has(region.sidoCode)) {
      regionCache.bySido.set(region.sidoCode, {
        name: region.sidoName || region.sidoCode,
        sigungu: new Map(),
        count: 0,
      });
    }
    const s = regionCache.bySido.get(region.sidoCode);
    s.count++;

    if (region.sigunguCode) {
      const cur = s.sigungu.get(region.sigunguCode) || {
        name: region.sigunguName || region.sigunguCode,
        count: 0,
      };
      cur.count++;
      s.sigungu.set(region.sigunguCode, cur);
    }
  }

  async function buildRegionCacheOnce() {
    regionCache.bySido.clear();
    regionCache.itemRegion.clear();
    regionCache.itemMeta.clear();

    // 메모/포토가 동일한 지역 키를 쓰도록 SIG 인덱스를 먼저 준비
    await ensureSigRegionIndex();

    // 1) apartmentNotes: aptIndex 매핑으로 지역 판별
    if (aptIndex.size > 0) {
      await iterateNotes(n => {
        if (!hasMemoContent(n)) return;
        const r = regionFromNoteViaApt(n);
        if (!r || !r.sidoCode) return;

        const id = noteIdOf(n);
        if (!id) return;
        const key = `note:${id}`;

        regionCache.itemRegion.set(key, r);
        regionCache.itemMeta.set(key, { kind: 'note', id });
        addRegionToCache(r);
      });
    }

    // 2) photoMemos: SIG 경계로 지역 판별
    await iteratePhotoMemos(p => {
      const id = photoIdOf(p);
      if (!id) return;
      const hasImage = hasPhotoImage(p);
      if (!hasImage) return;

      const r = regionFromPhotoBySig(p);
      const key = `photo:${id}`;

      regionCache.itemRegion.set(key, r);
      regionCache.itemMeta.set(key, { kind: 'photo', id });
      addRegionToCache(r);
    });
  }

  function renderSidoOptionsFromCache() {
    const sidoItems = Array.from(regionCache.bySido.entries())
      .map(([code, obj]) => ({ value: code, label: `${obj.name} (${obj.count}건)` }))
      .sort((a, b) => a.label.localeCompare(b.label, 'ko'));
    fillOptions(els.sido, sidoItems);
  }

  function renderSigunguOptionsFromCache() {
    const selSido = (els.sido.value || '').trim();
    if (selSido && regionCache.bySido.has(selSido)) {
      const sigMap = regionCache.bySido.get(selSido).sigungu;
      const sigItems = Array.from(sigMap.entries())
        .map(([code, obj]) => ({ value: code, label: `${obj.name} (${obj.count}건)` }))
        .sort((a, b) => a.label.localeCompare(b.label, 'ko'));
      fillOptions(els.sigungu, sigItems);
      els.sigungu.disabled = false;
    } else {
      fillOptions(els.sigungu, []);
      els.sigungu.disabled = true;
    }
  }

  function updateSelectedCountFast() {
    const sSel = (els.sido.value || '').trim();
    const gSel = (els.sigungu.value || '').trim();
    let cnt = 0;

    for (const r of regionCache.itemRegion.values()) {
      if (sSel && String(r.sidoCode || '').trim() !== sSel) continue;
      if (gSel && String(r.sigunguCode || '').trim() !== gSel) continue;
      cnt++;
    }
    els.selCount.textContent = String(cnt);
    return cnt;
  }

  async function rebuildFiltersFromCache(showModal=true) {
    if (showModal) showBusy('지역 목록을 구성하는 중…');

    if (regionCache.bySido.size === 0) {
      els.sigungu.disabled = true;
      fillOptions(els.sido, []);
      fillOptions(els.sigungu, []);
      els.selCount.textContent = '0';
      if (showModal) hideBusy();
      return;
    }

    renderSidoOptionsFromCache();
    renderSigunguOptionsFromCache();
    updateSelectedCountFast();

    if (showModal) hideBusy();
  }

  // ==========================
  // 백업 (단일 NDJSON · Blob 즉시 변환으로 JS 힙 최소화)
  // 각 레코드를 문자열 → Blob으로 즉시 변환하여 JS 힙에서 문자열 참조 해제
  // blobParts는 Blob 참조 배열 → new Blob(blobParts)는 복사 없이 연결
  // ==========================
  async function backupSelectedNotes() {
    showBusy('선택된 메모/포토메모를 수집하는 중…');
    els.downloads.innerHTML = '';

    const sSel = (els.sido.value || '').trim();
    const gSel = (els.sigungu.value || '').trim();
    const noteRefs = [], photoRefs = [];

    for (const [key, r] of regionCache.itemRegion.entries()) {
      if (sSel && String(r.sidoCode || '').trim() !== sSel) continue;
      if (gSel && String(r.sigunguCode || '').trim() !== gSel) continue;
      const meta = regionCache.itemMeta.get(key);
      if (!meta) continue;
      if (meta.kind === 'photo') photoRefs.push(meta);
      else noteRefs.push(meta);
    }

    if (noteRefs.length + photoRefs.length === 0) {
      hideBusy();
      alert('선택한 지역에 해당하는 메모/포토메모가 없습니다.');
      return;
    }

    const now = new Date();
    const koreaTime = new Date(now.getTime() + 9 * 60 * 60 * 1000);
    const ts = koreaTime.toISOString().replace(/T/, '_').replace(/:/g, '-').replace(/\..+/, '');

    showBusy('백업 파일 생성 중…');

    // Blob 참조 배열: 문자열을 즉시 Blob으로 변환하여 JS 힙에서 문자열 해제
    const blobParts = [];

    function pushLine(line) {
      blobParts.push(new Blob([line])); // 문자열 → Blob 즉시 변환, 원본 문자열 GC 가능
    }

    // meta 라인
    pushLine(JSON.stringify({
      type: 'meta',
      version: 2,
      exportedAt: new Date().toISOString(),
      totalNotes: noteRefs.length,
      totalPhotos: photoRefs.length,
      selectedSido: sSel || null,
      selectedSigungu: gSel || null,
    }) + '\n');

    const db = await openDB();

    // 단지 메모: 1개씩 처리 (images 배열에 base64가 포함될 수 있어 배치 불가)
    for (let i = 0; i < noteRefs.length; i++) {
      if (i % 20 === 0) showBusy(`메모 처리 중… (${i + 1} / ${noteRefs.length})`);

      const tx = db.transaction([STORE_NOTES], 'readonly');
      const store = tx.objectStore(STORE_NOTES);
      const key = String(noteRefs[i].id);

      const rec = await new Promise(res => {
        const r1 = store.get(key);
        r1.onsuccess = () => {
          if (r1.result) return res(r1.result);
          const n = Number(key);
          if (Number.isFinite(n) && String(n) === key) {
            const r2 = store.get(n);
            r2.onsuccess = () => res(r2.result || null);
            r2.onerror = () => res(null);
          } else res(null);
        };
        r1.onerror = () => res(null);
      });

      if (rec) {
        pushLine(JSON.stringify({ type: 'note', ...rec }) + '\n');
        // rec, JSON 문자열 모두 스코프 벗어나 GC 대상
      }
      await new Promise(r => setTimeout(r, 10)); // GC 기회
    }

    // 포토메모: 1장씩 처리 후 즉시 참조 해제
    for (let i = 0; i < photoRefs.length; i++) {
      showBusy(`사진 처리 중… (${i + 1} / ${photoRefs.length})`);

      const tx = db.transaction([STORE_PHOTOS], 'readonly');
      const store = tx.objectStore(STORE_PHOTOS);
      const key = String(photoRefs[i].id);

      const raw = await new Promise(res => {
        const r1 = store.get(key);
        r1.onsuccess = () => {
          if (r1.result) return res(r1.result);
          const n = Number(key);
          if (Number.isFinite(n) && String(n) === key) {
            const r2 = store.get(n);
            r2.onsuccess = () => res(r2.result || null);
            r2.onerror = () => res(null);
          } else res(null);
        };
        r1.onerror = () => res(null);
      });

      if (raw) {
        const serialized = await serializePhotoForExport(raw);
        pushLine(JSON.stringify({ type: 'photo', ...serialized }) + '\n');
        // base64 문자열 참조 즉시 해제
        serialized.imageDataUrl = null;
        serialized.thumbDataUrl = null;
      }
      await new Promise(r => setTimeout(r, 30)); // GC 기회
    }

    db.close();

    // 모든 Blob을 복사 없이 연결하여 최종 파일 생성
    const blob = new Blob(blobParts, { type: 'application/x-ndjson' });
    const url = URL.createObjectURL(blob);
    const fileName = `홍부_메모백업_${ts}_메모${noteRefs.length}_포토${photoRefs.length}.ndjson`;

    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 800);

    els.downloads.innerHTML = `<div style="padding:12px; color:#333; font-size:14px">✅ 백업 완료: <b>${fileName}</b><br><span style="color:#999; font-size:12px">메모 ${noteRefs.length}건 · 포토 ${photoRefs.length}건</span></div>`;
    hideBusy();
  }

  // ==========================
  // 이벤트 & 초기화
  // ==========================
  els.refresh.addEventListener('click', async () => {
    await loadFilteredAptIndexFromSamePath();
    showBusy('메모 인덱스를 구성하는 중…');
    await buildRegionCacheOnce();
    hideBusy();
    await rebuildFiltersFromCache(true);
  });

  els.sido.addEventListener('change', debounce(() => {
    // ✅ 시도 변경: 캐시 기반으로 시군구 옵션/카운트만 갱신(초고속)
    renderSigunguOptionsFromCache();
    updateSelectedCountFast();
  }, 80));

  els.sigungu.addEventListener('change', debounce(() => {
    updateSelectedCountFast();
  }, 80));

  els.backup.addEventListener('click', backupSelectedNotes);

  (async function init() {
    await loadFilteredAptIndexFromSamePath(); // apt.json 자동 로드(필요 항목만)
    showBusy('메모 인덱스를 구성하는 중…');
    await buildRegionCacheOnce();             // ✅ DB는 여기서 1번만 훑음
    hideBusy();
    await rebuildFiltersFromCache(true);      // ✅ 이후 UI는 캐시만 사용
  })();
</script>
</body>
</html>
