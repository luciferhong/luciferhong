      async function __blobToDataUrl(blob) {
        return new Promise((resolve) => {
          if (!(blob instanceof Blob)) return resolve("");
          try {
            const reader = new FileReader();
            reader.onload = () => resolve(typeof reader.result === "string" ? reader.result : "");
            reader.onerror = () => resolve("");
            reader.readAsDataURL(blob);
          } catch (e) {
            resolve("");
          }
        });
      }

      function __dataUrlToBlob(dataUrl) {
        try {
          if (typeof dataUrl !== "string" || !dataUrl.startsWith("data:")) return null;
          const parts = dataUrl.split(",");
          if (parts.length < 2) return null;
          const header = parts[0];
          const body = parts[1];
          const mime = header.match(/data:([^;]+)/)?.[1] || "application/octet-stream";
          const byteString = atob(body);
          const ab = new ArrayBuffer(byteString.length);
          const ia = new Uint8Array(ab);
          for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
          return new Blob([ab], { type: mime });
        } catch (_) {
          return null;
        }
      }

      function __bindPhotoMemoMarkerImage(img, memo, id) {
        const key = String(id);

        const applyBlob = (blob) => {
          if (!(blob instanceof Blob)) return false;
          try {
            __revokePhotoMemoUrl(key);
          } catch (_) {}
          const url = URL.createObjectURL(blob);
          window.__photoMemoObjectUrls.set(key, url);
          img.src = url;
          return true;
        };

        const applyDataUrl = (dataUrl) => {
          if (typeof dataUrl !== "string" || !dataUrl.startsWith("data:")) return false;
          try {
            __revokePhotoMemoUrl(key);
          } catch (_) {}
          img.src = dataUrl;
          return true;
        };

        img.dataset.pmErrStep = "0";
        img.onerror = async () => {
          const step = Number(img.dataset.pmErrStep || "0");

          // 1차 복구: thumbDataUrl 실패 시 legacy thumbBlob 또는 원본 이미지로 대체
          if (step === 0) {
            img.dataset.pmErrStep = "1";
            if (applyBlob(memo.thumbBlob) || applyBlob(memo.imageBlob)) return;
          }

          // 2차 복구: DB에서 최신 레코드 재조회 후 재시도
          if (step <= 1) {
            img.dataset.pmErrStep = "2";
            try {
              const fresh = await __photoMemoGetById(key);
              if (fresh) {
                memo.thumbDataUrl = fresh.thumbDataUrl;
                memo.thumbBlob = fresh.thumbBlob;
                memo.imageBlob = fresh.imageBlob;
                if (applyDataUrl(fresh.thumbDataUrl) || applyBlob(fresh.thumbBlob) || applyBlob(fresh.imageBlob))
                  return;
              }
            } catch (_) {}
          }

          // 더 이상 재시도하지 않음
          img.onerror = null;
        };

        // 기본: data URL 썸네일 우선, legacy thumbBlob fallback, 마지막으로 원본 이미지
        if (!applyDataUrl(memo.thumbDataUrl) && !applyBlob(memo.thumbBlob)) {
          applyBlob(memo.imageBlob);
        }
      }

      async function __fileToThumbBlob(file, size = 96, quality = 0.82) {
        return new Promise((resolve) => {
          try {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
              try {
                const canvas = document.createElement("canvas");
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext("2d");
                // center-crop
                const sw = img.naturalWidth || img.width;
                const sh = img.naturalHeight || img.height;
                const s = Math.min(sw, sh);
                const sx = (sw - s) / 2;
                const sy = (sh - s) / 2;
                ctx.drawImage(img, sx, sy, s, s, 0, 0, size, size);
                canvas.toBlob(
                  (blob) => {
                    try {
                      URL.revokeObjectURL(url);
                    } catch (e) {}
                    resolve(blob || file);
                  },
                  "image/jpeg",
                  quality,
                );
              } catch (e) {
                try {
                  URL.revokeObjectURL(url);
                } catch (_) {}
                resolve(file);
              }
            };
            img.onerror = () => {
              try {
                URL.revokeObjectURL(url);
              } catch (_) {}
              resolve(file);
            };
            img.src = url;
          } catch (e) {
            resolve(file);
          }
        });
      }

      function __revokePhotoMemoUrl(id) {
        try {
          const u = window.__photoMemoObjectUrls.get(String(id));
          if (u) URL.revokeObjectURL(u);
        } catch (e) {}
        window.__photoMemoObjectUrls.delete(String(id));
      }

      function __removePhotoMemoMarker(id) {
        const key = String(id);
        const marker = window.__photoMemoMarkers.get(key);
        if (marker) {
          try {
            marker.setMap(null);
          } catch (e) {}
        }
        window.__photoMemoMarkers.delete(key);
        __revokePhotoMemoUrl(key);
      }

      function __createPhotoMemoMarker(memo) {
        if (!window.map || !(window.map instanceof naver.maps.Map)) return null;
        const id = String(memo.id);
        if (window.__photoMemoMarkers.has(id)) return window.__photoMemoMarkers.get(id);

        const markerElement = document.createElement("div");
        markerElement.className = "photo-memo-marker";

        const img = document.createElement("img");
        __bindPhotoMemoMarkerImage(img, memo, id);
        markerElement.appendChild(img);

        const marker = new naver.maps.Marker({
          position: new naver.maps.LatLng(memo.lat, memo.lng),
          map: window.map,
          zIndex: 999999,
          icon: { content: markerElement, anchor: new naver.maps.Point(19, 19) },
        });

        const openPhotoMemoModal = async () => {
          try {
            // 모바일 브라우저별 click/touch/pointer 중복 신호를 안전하게 흡수
            if (window.__photoMemoModalOpening) return;
            window.__photoMemoModalOpening = true;

            const modal = document.getElementById("imageModal");
            const modalCanvas = document.getElementById("modalCanvas");
            const modalCtx = modalCanvas?.getContext?.("2d");
            if (!modal || !modalCanvas || !modalCtx) {
              window.__photoMemoModalOpening = false;
              return;
            }
            try {
              __clearModalCanvas();
            } catch (e) {}

            let workingMemo = memo;
            let fullBlob = workingMemo.imageBlob instanceof Blob ? workingMemo.imageBlob : null;
            let fullDataUrl =
              typeof workingMemo.imageDataUrl === "string" && workingMemo.imageDataUrl.startsWith("data:")
                ? workingMemo.imageDataUrl
                : "";
            let fallbackBlob = workingMemo.thumbBlob instanceof Blob ? workingMemo.thumbBlob : null;
            let fallbackDataUrl =
              typeof workingMemo.thumbDataUrl === "string" && workingMemo.thumbDataUrl.startsWith("data:")
                ? workingMemo.thumbDataUrl
                : "";

            // 저장 직후 stale closure 문제를 피하기 위해 클릭 시 DB 최신본을 항상 우선 사용
            try {
              const fresh = await __photoMemoGetById(id);
              if (fresh) {
                workingMemo = fresh;
                fullBlob = fresh.imageBlob instanceof Blob ? fresh.imageBlob : null;
                fullDataUrl =
                  typeof fresh.imageDataUrl === "string" && fresh.imageDataUrl.startsWith("data:")
                    ? fresh.imageDataUrl
                    : "";
                fallbackBlob = fresh.thumbBlob instanceof Blob ? fresh.thumbBlob : null;
                fallbackDataUrl =
                  typeof fresh.thumbDataUrl === "string" && fresh.thumbDataUrl.startsWith("data:")
                    ? fresh.thumbDataUrl
                    : "";
              }
            } catch (e) {}

            if (!(fullBlob instanceof Blob) && !fullDataUrl) {
              fullBlob = fallbackBlob;
              fullDataUrl = fallbackDataUrl;
            }

            if (!(fullBlob instanceof Blob) && !fullDataUrl) {
              window.__photoMemoModalOpening = false;
              return;
            }

            const useDataUrl = !!(fullDataUrl && fullDataUrl.startsWith("data:"));
            const useBlobUrl = !useDataUrl && fullBlob instanceof Blob;
            const fullUrl = useDataUrl ? fullDataUrl : useBlobUrl ? URL.createObjectURL(fullBlob) : "";
            const previewImg = new Image();
            let didBlobFallback = false;
            previewImg.onload = () => {
              __setPhotoMemoModalRecord(workingMemo);
              modalCanvas.width = previewImg.width;
              modalCanvas.height = previewImg.height;
              modalCtx.drawImage(previewImg, 0, 0);
              try {
                if (typeof fullDataUrl === "string" && fullDataUrl.startsWith("data:")) {
                  window.lastOpenedBase64 = fullDataUrl;
                } else if (typeof modalCanvas.toDataURL === "function") {
                  window.lastOpenedBase64 = modalCanvas.toDataURL("image/jpeg", 0.92);
                }
              } catch (_) {}
              window.__imageModalScrollY = window.scrollY || window.pageYOffset || 0;
              modal.style.display = "flex";
              window.imageModalShowYn = true;
              window.__photoMemoModalOpening = false;
              if (useBlobUrl) {
                setTimeout(() => {
                  try {
                    URL.revokeObjectURL(fullUrl);
                  } catch (e) {}
                }, 1500);
              }
            };
            previewImg.onerror = async () => {
              if (useBlobUrl && !didBlobFallback) {
                didBlobFallback = true;
                try {
                  const fallbackDataUrl = await __blobToDataUrl(fullBlob);
                  if (fallbackDataUrl && fallbackDataUrl.startsWith("data:")) {
                    previewImg.src = fallbackDataUrl;
                    return;
                  }
                } catch (_) {}
              }

              if (useDataUrl && fullBlob instanceof Blob && !didBlobFallback) {
                didBlobFallback = true;
                try {
                  previewImg.src = URL.createObjectURL(fullBlob);
                  return;
                } catch (_) {}
              }

              window.__photoMemoModalOpening = false;
              if (useBlobUrl) {
                try {
                  URL.revokeObjectURL(fullUrl);
                } catch (e) {}
              }
            };
            previewImg.src = fullUrl;
          } catch (e) {
            window.__photoMemoModalOpening = false;
          }
        };

        // 클릭: 큰 사진 보기(기존 imageModal 재사용)
        naver.maps.Event.addListener(marker, "click", openPhotoMemoModal);

        // 모바일에서 click 누락되는 케이스 보강: 썸네일 DOM의 touchend도 직접 처리
        markerElement.addEventListener("pointerup", (ev) => {
          try {
            ev.preventDefault();
            ev.stopPropagation();
          } catch (_) {}
          openPhotoMemoModal();
        });

        markerElement.addEventListener("touchend", (ev) => {
          try {
            ev.preventDefault();
            ev.stopPropagation();
          } catch (_) {}
          openPhotoMemoModal();
        });

        // 우클릭(PC): 삭제
        naver.maps.Event.addListener(marker, "rightclick", async () => {
          if (!confirm("이 사진 메모를 삭제할까요?")) return;
          try {
            await __photoMemoDelete(id);
            window.__photoMemoIndex = window.__photoMemoIndex.filter((x) => String(x.id) !== id);
            __removePhotoMemoMarker(id);
          } catch (e) {
            alert("삭제 실패");
          }
        });

        window.__photoMemoMarkers.set(id, marker);
        return marker;
      }

      function updatePhotoMemoMarkersByBounds() {
        if (!window.map || !(window.map instanceof naver.maps.Map)) return;
        if (!window.__photoMemoVisible) return; // 체크박스 OFF면 아무것도 안 함
        if (!window.__photoMemoIndexLoaded) return; // 인덱스가 아직 로드 안 됨

        const bounds = window.map.getBounds?.();
        if (!bounds) return;

        const inView = new Set();
        for (const entry of window.__photoMemoIndex) {
          try {
            if (typeof entry.lat !== "number" || typeof entry.lng !== "number") continue;
            if (bounds.hasLatLng(new naver.maps.LatLng(entry.lat, entry.lng))) {
              const id = String(entry.id);
              inView.add(id);
              // 마커 없고 아직 로딩 중이 아닐 때만 DB에서 full record 불러와 마커 생성
              if (!window.__photoMemoMarkers.has(id) && !window.__photoMemoLoadingIds.has(id)) {
                __loadAndCreatePhotoMemoMarker(entry);
              }
            }
          } catch (e) {}
        }

        // 범위 밖이거나 체크박스 OFF 시 마커 제거
        for (const id of Array.from(window.__photoMemoMarkers.keys())) {
          if (!inView.has(id)) __removePhotoMemoMarker(id);
        }
      }

      // 지정 항목의 전체 record를 DB에서 읽어와 마커 생성 (Blob을 lazy-load)
      async function __loadAndCreatePhotoMemoMarker(entry) {
        const id = String(entry.id);
        if (window.__photoMemoLoadingIds.has(id)) return;
        window.__photoMemoLoadingIds.add(id);
        try {
          const db = await __openHongbuMemoDb();
          const full = await new Promise((res) => {
            try {
              const tx = db.transaction(["photoMemos"], "readonly");
              const req = tx.objectStore("photoMemos").get(id);
              req.onsuccess = () => {
                try {
                  db.close();
                } catch (_) {}
                res(req.result || null);
              };
              req.onerror = () => {
                try {
                  db.close();
                } catch (_) {}
                res(null);
              };
            } catch (e) {
              try {
                db.close();
              } catch (_) {}
              res(null);
            }
          });
          if (full && window.__photoMemoVisible) __createPhotoMemoMarker(full);
        } catch (e) {
        } finally {
          window.__photoMemoLoadingIds.delete(id);
        }
      }

      // 지도 이동으로 마커가 다시 나타나는 경로와 동일하게 현재 화면 마커를 재로드
      async function __reloadVisiblePhotoMemoMarkersLikeMapMove() {
        if (!window.__photoMemoVisible || !window.map || !(window.map instanceof naver.maps.Map)) return;

        // 0) 인덱스가 로드되어 있지 않으면 먼저 로드
        if (!window.__photoMemoIndexLoaded) {
          try {
            await loadPhotoMemoIndexOnce();
          } catch (_) {}
        }

        const bounds = window.map.getBounds?.();
        if (!bounds) return;

        // 1) 현재 화면에 보이는 마커를 제거 (영역 이탈 시 제거되는 동작과 동일)
        const visibleIds = [];
        for (const entry of window.__photoMemoIndex || []) {
          const latNum = Number.parseFloat(entry?.lat);
          const lngNum = Number.parseFloat(entry?.lng);
          if (!Number.isFinite(latNum) || !Number.isFinite(lngNum)) continue;
          if (bounds.hasLatLng(new naver.maps.LatLng(latNum, lngNum))) {
            visibleIds.push(String(entry.id));
          }
        }
        visibleIds.forEach((id) => {
          try {
            __removePhotoMemoMarker(id);
          } catch (_) {}
        });

        // 2) 실제 지도 이동과 동일한 idle 사이클을 강제로 한 번 발생
        const mapRef = window.map;
        const waitIdleOnce = () =>
          new Promise((resolve) => {
            let listener = null;
            try {
              listener = naver.maps.Event.addListener(mapRef, "idle", () => {
                try {
                  if (listener) naver.maps.Event.removeListener(listener);
                } catch (_) {}
                resolve(true);
              });
            } catch (_) {
              resolve(false);
            }
            setTimeout(() => {
              try {
                if (listener) naver.maps.Event.removeListener(listener);
              } catch (_) {}
              resolve(false);
            }, 700);
          });

        try {
          const center = mapRef.getCenter?.();
          if (!center) {
            try {
              updatePhotoMemoMarkersByBounds();
            } catch (_) {}
            return;
          }

          // iOS에서 동일 경로를 타기 위해 실제 panBy -> idle -> setCenter -> idle 순서를 강제
          const firstIdle = waitIdleOnce();
          try {
            mapRef.panBy(new naver.maps.Point(2, 0));
          } catch (_) {}
          await firstIdle;

          const secondIdle = waitIdleOnce();
          try {
            mapRef.setCenter(center);
          } catch (_) {}
          await secondIdle;
        } catch (_) {
          try {
            updatePhotoMemoMarkersByBounds();
          } catch (_) {}
        }
      }

      // 경량 인덱스만 로드 (Blob 없음) — 화면 로드 시 전체 Blob 로드 대신 좌표/ID만
      async function loadPhotoMemoIndexOnce() {
        if (window.__photoMemoIndexLoaded) return window.__photoMemoIndex;
        try {
          await initMemoIndexedDB();
          const db = await __openHongbuMemoDb();
          const index = await new Promise((resolve) => {
            const results = [];
            try {
              const tx = db.transaction(["photoMemos"], "readonly");
              const store = tx.objectStore("photoMemos");
              const req = store.openCursor();
              req.onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                  const v = cursor.value;
                  // Blob 필드를 제외한 경량 항목만 추출
                  results.push({
                    id: v.id,
                    lat: Number(v.lat),
                    lng: Number(v.lng),
                    createdAt: v.createdAt || 0,
                    note: v.note || "",
                  });
                  cursor.continue();
                } else {
                  try {
                    db.close();
                  } catch (_) {}
                  resolve(results);
                }
              };
              req.onerror = () => {
                try {
                  db.close();
                } catch (_) {}
                resolve([]);
              };
            } catch (e) {
              try {
                db.close();
              } catch (_) {}
              resolve([]);
            }
          });
          window.__photoMemoIndex = index;
          window.__photoMemoIndexLoaded = true;
          return window.__photoMemoIndex;
        } catch (e) {
          window.__photoMemoIndex = [];
          window.__photoMemoIndexLoaded = true;
          return window.__photoMemoIndex;
        }
      }

      // 하위 호환 — 기존 호출 코드가 있는 경우를 대비
      async function loadPhotoMemosOnce() {
        return loadPhotoMemoIndexOnce();
      }

      function setupPhotoMemoInputHandlerOnce() {
        // 카메라/파일 2개 input 모두를 같은 핸들러로 처리
        const cameraInput = document.getElementById("photoMemoCameraInput");
        const fileInput = document.getElementById("photoMemoFileInput");
        const inputs = [cameraInput, fileInput].filter(Boolean);
        if (inputs.length === 0) return;
        if (window.__photoMemoInputsBound) return;
        window.__photoMemoInputsBound = true;

        const onPicked = async (e) => {
          try {
            const file = e.target.files?.[0];
            const p = window.__photoMemoPendingCoord;
            if (!file || !p || typeof p.lat !== "number" || typeof p.lng !== "number") return;

            // 아파트 메모와 동일하게 원본을 1600px / JPEG 0.82로 압축 저장
            const originalDataUrl = await __blobToDataUrl(file);
            let compressedDataUrl = originalDataUrl;
            try {
              compressedDataUrl = await compressImage(originalDataUrl, 1600, 0.82);
            } catch (_) {
              compressedDataUrl = originalDataUrl;
            }
            const compressedBlob = __dataUrlToBlob(compressedDataUrl) || file;
            const thumbBlob = await __fileToThumbBlob(compressedBlob, 96, 0.82);
            const thumbDataUrl = await __blobToDataUrl(thumbBlob);

            // 썸네일 미리보기 표시 후 메모 입력 모달 열기
            const note = await __showPhotoMemoNoteModal(thumbDataUrl || thumbBlob);
            if (note === null) {
              // 취소: pending 좌표 유지 (사용자가 다시 시도할 수 있도록)
              return;
            }

            const id = __uuidv4();
            const rec = {
              id,
              lat: p.lat,
              lng: p.lng,
              createdAt: Date.now(),
              note: note.trim(),
              imageDataUrl: compressedDataUrl,
              thumbDataUrl,
            };

            await __photoMemoPut(rec);
            // 경량 인덱스에 추가 (Blob 없이)
            window.__photoMemoIndex.push({
              id: rec.id,
              lat: rec.lat,
              lng: rec.lng,
              createdAt: rec.createdAt,
              note: rec.note,
            });
            window.__photoMemoPendingCoord = null;

            // 포토메모 체크박스 ON일 때만 즉시 마커 생성
            if (window.__photoMemoVisible) __createPhotoMemoMarker(rec);
          } catch (err) {
            alert("사진 저장 실패");
          } finally {
            try {
              e.target.value = "";
            } catch (_) {}
          }
        };

        inputs.forEach((inp) => inp.addEventListener("change", onPicked));
      }

      // 메모 입력 모달: Promise<string>(저장) | null(취소)
      function __showPhotoMemoNoteModal(thumbPreviewSource) {
        return new Promise((resolve) => {
          const modal = document.getElementById("photoMemoNoteModal");
          const preview = document.getElementById("photoMemoNotePreview");
          const textarea = document.getElementById("photoMemoNoteInput");
          const btnSave = document.getElementById("photoMemoNoteSave");
          const btnCancel = document.getElementById("photoMemoNoteCancel");
          if (!modal || !preview || !textarea || !btnSave || !btnCancel) {
            resolve("");
            return;
          }

          let previewUrl = null;
          if (typeof thumbPreviewSource === "string" && thumbPreviewSource.startsWith("data:")) {
            preview.src = thumbPreviewSource;
          } else if (thumbPreviewSource instanceof Blob) {
            previewUrl = URL.createObjectURL(thumbPreviewSource);
            preview.src = previewUrl;
          } else {
            preview.src = "";
          }
          textarea.value = "";
          modal.classList.add("show");
          setTimeout(() => textarea.focus(), 100);

          function cleanup(note) {
            modal.classList.remove("show");
            if (previewUrl) {
              try {
                URL.revokeObjectURL(previewUrl);
              } catch (_) {}
              previewUrl = null;
            }
            preview.src = "";
            textarea.value = "";
            btnSave.removeEventListener("click", onSave);
            btnCancel.removeEventListener("click", onCancel);
            resolve(note);
          }
          function onSave() {
            cleanup(textarea.value);
          }
          function onCancel() {
            cleanup(null);
          }
          btnSave.addEventListener("click", onSave);
          btnCancel.addEventListener("click", onCancel);
        });
      }

      window.__photoMemoAddMode = window.__photoMemoAddMode || false; // 카메라 버튼으로 켜는 "위치 선택 모드"

      function __ensurePhotoMemoMenu() {
        const mapEl = document.getElementById("map");
        if (!mapEl) return null;
        let menu = document.getElementById("photoMemoActionMenu");
        if (menu) return menu;

        menu = document.createElement("div");
        menu.id = "photoMemoActionMenu";
        menu.className = "photo-memo-menu";
        menu.innerHTML = `
    <button type="button" data-action="camera">📷 촬영</button>
    <button type="button" data-action="file">🖼️ 파일</button>
    <button type="button" data-action="cancel">취소</button>
  `;
        mapEl.appendChild(menu);

        menu.addEventListener("click", (ev) => {
          const btn = ev.target?.closest?.("button");
          const act = btn?.getAttribute?.("data-action");
          if (!act) return;
          if (act === "cancel") return __hidePhotoMemoMenu();

          if (act === "camera") {
            const input = document.getElementById("photoMemoCameraInput");
            if (input) input.click();
          } else if (act === "file") {
            const input = document.getElementById("photoMemoFileInput");
            if (input) input.click();
          }
          __hidePhotoMemoMenu();
          // 1회성: 메뉴에서 선택하면 모드 OFF
          // 단, 파일 선택 change 이벤트 전에 pending 좌표를 지우면 저장이 중단되므로 유지한다.
          setPhotoMemoAddMode(false, { clearPending: false });
        });

        return menu;
      }

      function __hidePhotoMemoMenu() {
        const menu = document.getElementById("photoMemoActionMenu");
        if (menu) menu.style.display = "none";
      }

      function __extractClientPointFromMapEvent(e) {
        try {
          const de = e?.domEvent || e;
          const touch =
            de?.changedTouches?.[0] ||
            de?.touches?.[0] ||
            de?.originalEvent?.changedTouches?.[0] ||
            de?.originalEvent?.touches?.[0] ||
            null;

          const clientX = typeof de?.clientX === "number" ? de.clientX : touch?.clientX;
          const clientY = typeof de?.clientY === "number" ? de.clientY : touch?.clientY;
          if (typeof clientX === "number" && typeof clientY === "number") {
            return { clientX, clientY, isTouch: !!touch };
          }
        } catch (e) {}
        return null;
      }

      function __showPhotoMemoMenuAtClientXY(clientX, clientY, opts = {}) {
        const menu = __ensurePhotoMemoMenu();
        const mapEl = document.getElementById("map");
        if (!menu || !mapEl) return;

        const rect = mapEl.getBoundingClientRect();
        menu.style.display = "inline-flex";
        menu.style.visibility = "hidden";
        menu.style.transform = "translate(0, 0)";

        const menuWidth = menu.offsetWidth || 140;
        const menuHeight = menu.offsetHeight || 44;
        const rawX = clientX - rect.left;
        const rawY = clientY - rect.top;
        const preferBelow = !!opts.preferBelow;
        const x = Math.max(8, Math.min(rect.width - menuWidth - 8, rawX - menuWidth * 0.1));
        const y = preferBelow
          ? Math.max(8, Math.min(rect.height - menuHeight - 8, rawY + 10))
          : Math.max(8, Math.min(rect.height - menuHeight - 8, rawY - menuHeight - 10));

        menu.style.left = `${x}px`;
        menu.style.top = `${y}px`;
        menu.style.visibility = "visible";
        menu.style.display = "inline-flex";
      }

      function __showPhotoMemoMenuAtCoord(coord) {
        try {
          const menu = __ensurePhotoMemoMenu();
          const mapEl = document.getElementById("map");
          if (!menu || !mapEl || !coord || !window.map) return;

          const rect = mapEl.getBoundingClientRect();
          const proj = window.map.getProjection?.();
          if (!proj) return;

          let pt = null;
          if (typeof proj.fromCoordToPoint === "function") {
            pt = proj.fromCoordToPoint(coord);
          } else if (typeof proj.fromCoordToOffset === "function") {
            pt = proj.fromCoordToOffset(coord);
          }
          if (!pt) return;

          const clientX = rect.left + pt.x;
          const clientY = rect.top + pt.y;
          __showPhotoMemoMenuAtClientXY(clientX, clientY);
        } catch (e) {}
      }

      function __coordFromClientXY(clientX, clientY) {
        try {
          const mapEl = document.getElementById("map");
          if (!mapEl || typeof clientX !== "number" || typeof clientY !== "number") return null;

          const rect = mapEl.getBoundingClientRect();
          const offsetX = clientX - rect.left;
          const offsetY = clientY - rect.top;

          // 갤럭시/Android에서 projection 변환 편차를 피하기 위해
          // 터치 픽셀을 현재 bounds에 직접 매핑해 좌표를 계산한다.
          const bounds = window.map?.getBounds?.();
          if (bounds && rect.width > 0 && rect.height > 0) {
            const sw = bounds.getSW?.();
            const ne = bounds.getNE?.();
            if (sw && ne) {
              const rx = Math.max(0, Math.min(1, offsetX / rect.width));
              const ry = Math.max(0, Math.min(1, offsetY / rect.height));
              const lng = sw.lng() + (ne.lng() - sw.lng()) * rx;

              // 위도는 Web Mercator y로 보간해야 화면상의 세로 비율과 맞는다.
              const clampLat = (v) => Math.max(-85.05112878, Math.min(85.05112878, v));
              const latToMercY = (lat) => {
                const r = (clampLat(lat) * Math.PI) / 180;
                return Math.log(Math.tan(Math.PI / 4 + r / 2));
              };
              const mercYToLat = (my) => ((2 * Math.atan(Math.exp(my)) - Math.PI / 2) * 180) / Math.PI;

              const yTop = latToMercY(ne.lat());
              const yBottom = latToMercY(sw.lat());
              const y = yTop + (yBottom - yTop) * ry;
              const lat = mercYToLat(y);

              return new naver.maps.LatLng(lat, lng);
            }
          }
        } catch (e) {}
        return null;
      }

      async function __handlePhotoMemoMapTap(point, opts = {}) {
        try {
          if (!window.__photoMemoAddMode) return;
          if (!point || (point.clientX === 0 && point.clientY === 0)) return;

          // 모바일(iPhone/Android)은 터치 픽셀 기준 좌표를 우선 사용해 일관성 확보
          const touchCoord = point?.isTouch ? __coordFromClientXY(point.clientX, point.clientY) : null;
          const coord = touchCoord || opts.coord || __coordFromClientXY(point.clientX, point.clientY);
          if (!coord) return;
          if (!window.__photoMemoIndexLoaded) await loadPhotoMemoIndexOnce();

          const lat = typeof coord.lat === "function" ? coord.lat() : coord.y;
          const lng = typeof coord.lng === "function" ? coord.lng() : coord.x;
          if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

          window.__photoMemoPendingCoord = { lat, lng };
          try {
            showToast("📷 위치 선택됨: 촬영/파일 선택하세요", 1200);
          } catch (_) {}
          window.__photoMemoMenuJustOpenedAt = Date.now();
          __showPhotoMemoMenuAtClientXY(point.clientX, point.clientY, { preferBelow: !!point.isTouch });
          setPhotoMemoAddMode(false, { clearPending: false, hideMenu: false });
        } catch (_) {}
      }

      function __cancelPhotoMemoAddFlow() {
        try {
          const mapEl = document.getElementById("map");
          if (mapEl?.__photoMemoFallbackTimer) {
            clearTimeout(mapEl.__photoMemoFallbackTimer);
            mapEl.__photoMemoFallbackTimer = null;
          }
        } catch (_) {}

        try {
          const cameraInput = document.getElementById("photoMemoCameraInput");
          const fileInput = document.getElementById("photoMemoFileInput");
          if (cameraInput) cameraInput.value = "";
          if (fileInput) fileInput.value = "";
        } catch (_) {}

        window.__photoMemoMenuJustOpenedAt = 0;
        setPhotoMemoAddMode(false, { clearPending: true, hideMenu: true });
      }

      function __isPhotoMemoActionMenuOpen() {
        const menu = document.getElementById("photoMemoActionMenu");
        return !!(menu && menu.style.display && menu.style.display !== "none");
      }

      function __shouldCancelPhotoMemoAddFlow() {
        return !!(window.__photoMemoAddMode || window.__photoMemoPendingCoord || __isPhotoMemoActionMenuOpen());
      }

      function setPhotoMemoAddMode(on, opts = {}) {
        const clearPending =
          opts && Object.prototype.hasOwnProperty.call(opts, "clearPending") ? !!opts.clearPending : true;
        const hideMenu = opts && Object.prototype.hasOwnProperty.call(opts, "hideMenu") ? !!opts.hideMenu : true;
        window.__photoMemoAddMode = !!on;
        const btn = document.getElementById("mapPhotoBtn");
        if (btn) btn.classList.toggle("active", window.__photoMemoAddMode);
        if (!window.__photoMemoAddMode) {
          if (clearPending) window.__photoMemoPendingCoord = null;
          if (hideMenu) __hidePhotoMemoMenu();
        }
      }

      function setupPhotoMemoAddMode(map) {
        if (!map) return;
        setupPhotoMemoInputHandlerOnce();
        const mapEl = document.getElementById("map");

        // 기존 리스너 제거
        try {
          if (map.__photoMemoListeners && Array.isArray(map.__photoMemoListeners)) {
            map.__photoMemoListeners.forEach((l) => {
              try {
                naver.maps.Event.removeListener(l);
              } catch (e) {}
            });
          }
        } catch (e) {}
        map.__photoMemoListeners = [];

        // idle: bounds 기반 렌더
        try {
          map.__photoMemoListeners.push(
            naver.maps.Event.addListener(map, "idle", () => updatePhotoMemoMarkersByBounds()),
          );
        } catch (e) {}

        // 지도 클릭: "위치 선택 모드"일 때만 메뉴 표시
        try {
          map.__photoMemoListeners.push(
            naver.maps.Event.addListener(map, "click", async (e) => {
              try {
                // DOM fallback 예약이 있으면 취소하고, 지도 SDK 좌표를 우선 사용
                try {
                  if (mapEl && mapEl.__photoMemoFallbackTimer) {
                    clearTimeout(mapEl.__photoMemoFallbackTimer);
                    mapEl.__photoMemoFallbackTimer = null;
                  }
                } catch (_) {}

                // ✅ document click handler가 메뉴를 즉시 닫는 것 방지
                try {
                  e?.domEvent?.stopPropagation?.();
                } catch (_) {}

                const point = __extractClientPointFromMapEvent(e);
                await __handlePhotoMemoMapTap(point, { coord: e?.coord });
              } catch (_) {}
            }),
          );
        } catch (e) {}

        // Android/Galaxy fallback: 지도 DOM의 touch/pointer를 직접 받아 메뉴 표시
        try {
          if (mapEl) {
            const prevTouch = mapEl.__photoMemoTouchEndHandler;
            const prevPointer = mapEl.__photoMemoPointerUpHandler;
            if (prevTouch) mapEl.removeEventListener("touchend", prevTouch, true);
            if (prevPointer) mapEl.removeEventListener("pointerup", prevPointer, true);

            mapEl.__photoMemoTouchEndHandler = async (ev) => {
              try {
                if (!window.__photoMemoAddMode) return;
                const target = ev.target;
                const menu = document.getElementById("photoMemoActionMenu");
                const btn = document.getElementById("mapPhotoBtn");
                if (menu?.contains?.(target) || btn?.contains?.(target)) return;
                try {
                  ev.preventDefault();
                  ev.stopPropagation();
                } catch (_) {}

                const now = Date.now();
                if (window.__photoMemoMapDomTapAt && now - window.__photoMemoMapDomTapAt < 250) return;
                window.__photoMemoMapDomTapAt = now;

                const point = __extractClientPointFromMapEvent(ev);
                if (mapEl.__photoMemoFallbackTimer) clearTimeout(mapEl.__photoMemoFallbackTimer);
                mapEl.__photoMemoFallbackTimer = setTimeout(async () => {
                  try {
                    if (!window.__photoMemoAddMode) return;
                    await __handlePhotoMemoMapTap(point || null);
                  } catch (_) {}
                }, 90);
              } catch (_) {}
            };

            mapEl.__photoMemoPointerUpHandler = async (ev) => {
              try {
                if (!window.__photoMemoAddMode) return;
                if (ev.pointerType !== "touch") return;
                const target = ev.target;
                const menu = document.getElementById("photoMemoActionMenu");
                const btn = document.getElementById("mapPhotoBtn");
                if (menu?.contains?.(target) || btn?.contains?.(target)) return;
                try {
                  ev.preventDefault();
                  ev.stopPropagation();
                } catch (_) {}

                const now = Date.now();
                if (window.__photoMemoMapDomTapAt && now - window.__photoMemoMapDomTapAt < 250) return;
                window.__photoMemoMapDomTapAt = now;

                const point = __extractClientPointFromMapEvent(ev);
                if (mapEl.__photoMemoFallbackTimer) clearTimeout(mapEl.__photoMemoFallbackTimer);
                mapEl.__photoMemoFallbackTimer = setTimeout(async () => {
                  try {
                    if (!window.__photoMemoAddMode) return;
                    await __handlePhotoMemoMapTap(point || null);
                  } catch (_) {}
                }, 90);
              } catch (_) {}
            };

            mapEl.addEventListener("touchend", mapEl.__photoMemoTouchEndHandler, true);
            mapEl.addEventListener("pointerup", mapEl.__photoMemoPointerUpHandler, true);
          }
        } catch (e) {}

        // 메뉴 바깥 클릭 시 닫기
        if (!window.__photoMemoMenuOutsideBound) {
          window.__photoMemoMenuOutsideBound = true;
          document.addEventListener("click", (ev) => {
            const menu = document.getElementById("photoMemoActionMenu");
            const btn = document.getElementById("mapPhotoBtn");
            const mapEl = document.getElementById("map");
            if (!menu) return;
            if (menu.contains(ev.target) || btn?.contains?.(ev.target)) return;
            if (window.__photoMemoMenuJustOpenedAt && Date.now() - window.__photoMemoMenuJustOpenedAt < 500) return;
            // ✅ 사진 메모 추가 모드 중 지도 내부 클릭은 naver maps click handler가 처리하므로 여기서 닫지 않음
            if (window.__photoMemoAddMode && mapEl?.contains?.(ev.target)) return;
            __hidePhotoMemoMenu();
          });
        }
      }

      // ✅ hongbu.settings 저장
      function setHongbuSetting(key, value) {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open("hongbu", HONGBU_DB_VERSION);
          request.onsuccess = (event) => {
            const db = event.target.result;
            const tx = db.transaction(["settings"], "readwrite");
            const store = tx.objectStore("settings");
            store.put(value, key);
            tx.oncomplete = () => {
              db.close();
              resolve();
            };
            tx.onerror = (e) => {
              db.close();
              reject(e);
            };
          };
          request.onerror = (e) => reject(e);
        });
      }

      // ✅ hongbu.settings 읽기
      function getHongbuSetting(key) {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open("hongbu", HONGBU_DB_VERSION);
          request.onsuccess = (event) => {
            const db = event.target.result;
            const tx = db.transaction(["settings"], "readonly");
            const store = tx.objectStore("settings");
            const getReq = store.get(key);
            getReq.onsuccess = () => {
              db.close(); // ✅ DB 연결 정리
              resolve(getReq.result);
            };
            getReq.onerror = (e) => {
              db.close(); // ✅ DB 연결 정리
              reject(e);
            };
          };
          request.onerror = (e) => {
            try {
              /* db가 열리지 않아 이미 닫힘 */
            } catch (e) {}
            reject(e);
          };
        });
      }

      // ✅ hongbu.settings 삭제
      function deleteHongbuSetting(key) {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open("hongbu", HONGBU_DB_VERSION);
          request.onsuccess = (event) => {
            const db = event.target.result;
            const tx = db.transaction(["settings"], "readwrite");
            const store = tx.objectStore("settings");
            store.delete(key);
            tx.oncomplete = () => {
              db.close();
              resolve();
            };
            tx.onerror = (e) => {
              db.close();
              reject(e);
            };
          };
          request.onerror = (e) => {
            try {
              /* db가 열리지 않아 이미 닫힘 */
            } catch (e) {}
            reject(e);
          };
        });
      }

      // ================================
      // ✅ UI 옵션(체크박스/필터 등) 저장/복원 (IndexedDB settings)
      // - 새로고침/앱전환(리로드)에도 현재 옵션 상태 유지
      // ================================
      const UI_STATE_KEY = "uiState_v1";
      const MAP_FULLSCREEN_KEY = "mapPseudoFullscreen_v1";

      // file input은 상태 저장 제외
      function _isSkippableUiEl(el) {
        if (!el || !el.id) return true;
        const type = (el.getAttribute("type") || "").toLowerCase();
        // ✅ apartmentSearchInput(검색어) 제외
        return (
          type === "file" ||
          el.id === "gpxFileInput" ||
          el.id === "memoRestoreInput" ||
          el.id === "apartmentSearchInput"
        );
      }

      // DOM에서 현재 UI 상태 수집
      function collectUIState() {
        const state = {};
        const nodes = document.querySelectorAll("input[id], select[id], textarea[id]");
        nodes.forEach((el) => {
          if (_isSkippableUiEl(el)) return;
          const tag = el.tagName.toLowerCase();
          if (tag === "input") {
            const type = (el.getAttribute("type") || "text").toLowerCase();
            if (type === "checkbox") state[el.id] = !!el.checked;
            else if (type === "radio") {
              if (el.checked) state[el.name || el.id] = el.value;
            } else state[el.id] = el.value;
          } else {
            state[el.id] = el.value;
          }
        });
        // 시군구 다중 선택 저장 (Set → Array)
        try {
          state["sigunguSelectedCodes"] = [...(selectedSigunguSet || [])];
        } catch (e) {}
        return state;
      }

      // UI 상태를 DOM에 반영
      function applyUIState(state) {
        if (!state || typeof state !== "object") return;

        Object.entries(state).forEach(([id, val]) => {
          const el = document.getElementById(id);
          if (!el || _isSkippableUiEl(el)) return;

          const tag = el.tagName.toLowerCase();
          if (tag === "input") {
            const type = (el.getAttribute("type") || "text").toLowerCase();
            if (type === "checkbox") {
              el.checked = !!val;
              // 포토메모 체크박스: JS 상태도 동기화 (이벤트는 나중에 refreshByUIState가 처리)
              if (el.id === "togglePhotoMemo") window.__photoMemoVisible = !!val;
            } else if (type === "radio") {
              // name 기준으로 복원
              const group = document.querySelectorAll(`input[type="radio"][name="${CSS.escape(el.name)}"]`);
              group.forEach((r) => {
                r.checked = r.value === val;
              });
            } else {
              el.value = val;
            }
          } else {
            // select/textarea
            try {
              el.value = val;
            } catch (e) {}
          }
        });
      }

      // IndexedDB에 UI 상태 저장
      let _uiSaveTimer = null;
      function saveUIStateDebounced(delayMs = 250) {
        if (_uiSaveTimer) clearTimeout(_uiSaveTimer);
        _uiSaveTimer = setTimeout(() => {
          const state = collectUIState();
          setHongbuSetting(UI_STATE_KEY, state).catch(console.warn);
        }, delayMs);
      }

      // IndexedDB에서 UI 상태 불러오기 + 적용
      async function restoreUIStateFromDB() {
        try {
          const saved = await getHongbuSetting(UI_STATE_KEY);
          if (saved && typeof saved === "object") {
            applyUIState(saved);
          }
        } catch (e) {
          console.warn("UI 상태 복원 실패:", e);
        }
      }

      // UI 변경 자동 저장 (이벤트 위임)
      function initUIStateAutoSave() {
        // input/textarea/select 변경을 모두 캐치
        document.addEventListener(
          "change",
          (e) => {
            const el = e.target;
            if (!el || !el.id || _isSkippableUiEl(el)) return;
            saveUIStateDebounced();
          },
          true,
        );

        document.addEventListener(
          "input",
          (e) => {
            const el = e.target;
            if (!el || !el.id || _isSkippableUiEl(el)) return;
            saveUIStateDebounced();
          },
          true,
        );
      }

      // 지도/마커 등이 준비된 뒤, 현재 UI 상태에 맞게 즉시 화면 반영
      function refreshByUIState() {

        try {
          updateSchoolMarkers();
        } catch (e) {}
        try {

        } catch (e) {}
        try {
          updateFacilityMarkers?.();
        } catch (e) {}
        try {
          updateStarbucksMarkers?.();
        } catch (e) {}
        try {
          scheduleEmdRedraw?.();
        } catch (e) {}
        try {
          scheduleAdmRedraw?.();
        } catch (e) {}
        // 포토메모: 체크 ON이면 인덱스 로드 후 표시
        try {
          if (window.__photoMemoVisible) {
            loadPhotoMemoIndexOnce()
              .then(() => updatePhotoMemoMarkersByBounds())
              .catch(() => {});
          }
        } catch (e) {}
      }

      // ✅ IndexedDB 저장 함수
      function saveToIndexedDB(id, type, text, color, textColor, fontSize) {
        const request = indexedDB.open("hongbu", HONGBU_DB_VERSION);
        request.onsuccess = function (event) {
          const db = event.target.result;
          const transaction = db.transaction(["apartments"], "readwrite");
          const store = transaction.objectStore("apartments");

          store.put({ idType: `${id}-${type}`, text, color, textColor, fontSize });

          transaction.oncomplete = () => {
            console.log(`✅ IndexedDB 저장 완료: ${id}`);
            db.close(); // ✅ DB 연결 정리
          };
          transaction.onerror = (e) => {
            console.error(`❌ IndexedDB 저장 오류: ${e.target.error}`);
            db.close(); // ✅ DB 연결 정리
          };
        };
        request.onerror = function (event) {
          console.error(`❌ IndexedDB 열기 실패: ${event.target.error}`);
        };
        markerElement = document.querySelector(`[data-apartment-id='${id}']`);
        //markerElement.style.maxWidth = '160px';
      }

      // ✅ IndexedDB에서 데이터 가져오기
      function getFromIndexedDB(id, type) {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open("hongbu", HONGBU_DB_VERSION);

          request.onerror = (event) => {
            reject("❌ IndexedDB 열기 오류: " + event.target.errorCode);
          };

          request.onsuccess = (event) => {
            const db = event.target.result;
            const transaction = db.transaction(["apartments"], "readonly");
            const store = transaction.objectStore("apartments");

            const idType = `${id}-${type}`;
            const getRequest = store.get(idType);

            getRequest.onsuccess = () => {
              db.close(); // ✅ DB 연결 정리
              if (getRequest.result) {
                resolve(getRequest.result);
              } else {
                resolve({ text: "", color: "#9F9F9F", textColor: "#ffffff", fontSize: "12px" });
              }
            };

            getRequest.onerror = () => {
              db.close(); // ✅ DB 연결 정리
              reject("❌ IndexedDB 데이터 가져오기 실패");
            };
          };
        });
      }

            // ✅ IndexedDB에서 가져온 값 디버깅 출력
            //console.log(`🎨 IndexedDB 불러온 데이터 (ID: ${id}):`, data);
            //console.log(`🔹 적용할 색상: 배경색=${bgColor}, 글자색=${textColor}, 글자 크기=${fontSize}`);

            markerElement.style.backgroundColor = bgColor;
            markerElement.style.color = textColor;

            // ✅ 강제 적용 후 확인
            //console.log(`🟢 적용된 markerElement.style.color: ${markerElement.style.color}`);

            // ✅ 만약 color가 빈 값이면 기본값 강제 적용
            if (
              !markerElement.style.color ||
              markerElement.style.color === "" ||
              markerElement.style.color === "undefined"
            ) {
              markerElement.style.color = "#FFFFFF";
              //console.log(`⚠️ 강제 적용 후 markerElement.style.color: ${markerElement.style.color}`);
            }

            // ✅ tableData 값을 검사해서 값이 있으면 → 160px, 없으면 → 120px
            let maxWidth = 120;

            markerElement.style.maxWidth = `${maxWidth}px`;

      }

      // ✅ 기본 3x4 테이블 생성
      function generateDefaultTable() {
        let defaultTable = [];
        for (let i = 0; i < 3; i++) {
          let row = [];
          for (let j = 0; j < 4; j++) {
            row.push(""); // 기본값 설정

      }

      function createEditableTableHTML(id, textData) {
        let rows = textData.split("\n").map((row) => row.split("\t"));
        const table = document.createElement("table");
        table.style.borderCollapse = "collapse";
        table.style.width = "100%";
        table.style.tableLayout = "auto";
        table.style.color = "black";

        rows.forEach((row, rowIndex) => {
          const tr = document.createElement("tr");

          for (let colIndex = 0; colIndex < 4; colIndex++) {
            // 열 4개 고정
            const td = document.createElement("td");
            td.dataset.id = id;
            td.dataset.row = rowIndex;
            td.dataset.col = colIndex;
            td.contentEditable = "true";
            td.textContent = row[colIndex]?.trim() || "";

            // ✅ 셀 스타일
            td.style = `
                border: 1px solid black;
                padding: 2px 4px;
                text-align: center;
                height: 24px;
                vertical-align: middle;
                white-space: normal;
                word-break: break-word;
            `;

            // ✅ Tab 키 이동 이벤트 추가 위치 (여기!)
            td.addEventListener("keydown", (event) => {
              if (event.key === "Tab") {
                event.preventDefault();

                const currentRow = parseInt(td.dataset.row, 10);
                const currentCol = parseInt(td.dataset.col, 10);
                const table = td.closest("table"); // ✅ 현재 마커 내부의 이 테이블 안에서만

                let nextCell = table.querySelector(`td[data-row='${currentRow}'][data-col='${currentCol + 1}']`);

                // 다음 열이 없으면 다음 행의 첫 번째 열
                if (!nextCell) {
                  nextCell = table.querySelector(`td[data-row='${currentRow + 1}'][data-col='0']`);
                }

                // ✅ 해당 테이블 안에 존재하는 셀만 focus
                if (nextCell) {
                  nextCell.focus();
                }
              }
            });

            tr.appendChild(td);
          }

          table.appendChild(tr);
        });

        return table.outerHTML;
      }

      // ✅ IndexedDB에 테이블 데이터 저장 (tableContainer가 없을 경우 복구)
      function saveTableToIndexedDB(id, tableContainer) {
        if (!tableContainer) {
          console.warn(`⚠️ [saveTableToIndexedDB] tableContainer가 없습니다. ID: ${id || "undefined"}`);
          return;
        }

        // ✅ 이미 저장 중인지 체크하여 중복 실행 방지
        if (window.isSaving) {
          console.warn("⚠️ IndexedDB 저장 중, 중복 호출 방지");
          return;
        }
        window.isSaving = true; // ✅ 저장 중 상태 플래그 설정

        let tableData = [];
        tableContainer.querySelectorAll("tr").forEach((row) => {
          let rowData = [];
          row.querySelectorAll("td").forEach((td) => {
            rowData.push(td.textContent.trim());
          });
          tableData.push(rowData.join("\t"));
        });

        // ✅ IndexedDB에서 기존 색상 데이터를 불러와 유지
        getFromIndexedDB(id, "시세1")
          .then((existingData) => {
            let existingColor = existingData?.color || "#9F9F9F"; // ✅ 기존 배경색 유지
            let existingTextColor = existingData?.textColor || "#ffffff"; // ✅ 기존 글자색 유지
            let existingFontSize = existingData?.fontSize || "12px"; // ✅ 기존 폰트 크기 유지

            saveToIndexedDB(id, "시세1", tableData.join("\n"), existingColor, existingTextColor, existingFontSize);
          })
          .catch((error) => {
            console.error("❌ IndexedDB 불러오기 실패:", error);
          })
          .finally(() => {
            setTimeout(() => {
              window.isSaving = false; // ✅ 일정 시간 후 다시 저장 가능하게 설정
            }, 100);
          });
      }

      // ✅ 셀 삭제 함수 수정 (삭제 후 오류 방지)
      function deleteSelectedCells() {
        if (!selectedCells || selectedCells.size === 0) {
          console.warn("⚠️ 선택된 셀이 없음");
          return;
        }

        selectedCells.forEach((td) => {
          if (td && td instanceof HTMLElement) {
            td.textContent = ""; // ✅ 내용만 삭제
          }
        });

        // ❗ activeMarkerElement가 없을 경우 복구 시도
        if (!activeMarkerElement && selectedCells.size > 0) {
          let firstCell = Array.from(selectedCells)[0];
          activeMarkerElement = firstCell.closest(".siseMapMarker");
        }

        if (activeMarkerElement) {
          let tableContainer = activeMarkerElement.querySelector(".tableContainer");
          let id = activeMarkerElement.dataset.apartmentId;

          if (!id || id === "undefined") {
            console.warn("⚠️ 삭제 후 저장할 ID가 없음.");
            return;
          }

          if (tableContainer) {
            // ✅ 불필요한 setTimeout 제거 (즉시 저장)
            saveTableToIndexedDB(id, tableContainer);
          } else {
            console.warn("⚠️ tableContainer 찾을 수 없음");
          }
        } else {
          console.warn("⚠️ activeMarkerElement가 없음");
        }
      }

      // ✅ 셀을 수정 가능하도록 설정 + IME 한글 입력 처리 (중복 방지)
      function makeTableEditable(tableContainer) {
        let isComposing = false; // ✅ 한글 입력 중인지 확인
        let lastFocusedTd = null; // ✅ 마지막으로 포커스된 셀 저장

        tableContainer.querySelectorAll("td").forEach((td) => {
          // ✅ 기존 이벤트 제거 (중복 방지)
          td.removeEventListener("click", handleTdClick);
          td.removeEventListener("compositionstart", handleCompositionStart);
          td.removeEventListener("compositionend", handleCompositionEnd);
          //td.removeEventListener("keydown", handleKeyDown);
          td.removeEventListener("blur", handleTdBlur);
          td.removeEventListener("paste", handlePaste);

          // ✅ 새로운 이벤트 추가
          td.addEventListener("click", handleTdClick);
          td.addEventListener("compositionstart", handleCompositionStart);
          td.addEventListener("compositionend", handleCompositionEnd);
          //td.addEventListener("keydown", handleKeyDown);
          td.addEventListener("blur", handleTdBlur);
          td.addEventListener("paste", handlePaste);
        });

        // ✅ 클릭 이벤트 핸들러 (셀을 클릭하면 편집 가능)
        function handleTdClick(event) {
          const td = event.target;
          td.setAttribute("contenteditable", "true");
          td.focus();
          lastFocusedTd = td;

          // ✅ 커서를 제일 오른쪽으로 이동시키기
          const range = document.createRange();
          const selection = window.getSelection();

          range.selectNodeContents(td);
          range.collapse(false); // false → 커서를 끝으로 보냄
          selection.removeAllRanges();
          selection.addRange(range);
        }

        // ✅ 한글 입력 시작 (IME 입력 감지)
        function handleCompositionStart() {
          isComposing = true;
        }

        // ✅ 한글 입력 완료 (포커스 유지 중이면 저장 안 함)
        function handleCompositionEnd(event) {
          isComposing = false; // ✅ 조합 종료 플래그
          setTimeout(() => {
            saveTableToIndexedDB(event.target.dataset.id, event.target.closest(".tableContainer"));
          }, 50);
        }

        // ✅ 포커스 아웃 시 저장 (IME 입력 중이면 저장 방지)
        function handleTdBlur(event) {
          setTimeout(() => {
            if (isComposing) return; // ✅ IME 입력 중이면 blur 저장 방지
            isComposing = false; // ✅ 포커스가 아웃되었을 때 입력 종료
            saveTableToIndexedDB(event.target.dataset.id, event.target.closest(".tableContainer"));
          }, 50);
        }

        // ✅ 붙여넣기 이벤트 (붙여넣기 후 즉시 저장)
        function handlePaste(event) {
          event.preventDefault();
          let clipboardData = event.clipboardData || window.clipboardData;
          let pastedText = clipboardData.getData("text");

          if (!pastedText.includes("\t") && !pastedText.includes("\n")) {
            // ✅ 일반 텍스트 붙여넣기
            document.execCommand("insertText", false, pastedText);
            return;
          }

          // ✅ 엑셀에서 복사한 데이터를 테이블에 맞춰 삽입
          let rows = pastedText.split("\n").map((row) => row.split("\t"));
          let startRow = parseInt(lastFocusedTd.dataset.row, 10);
          let startCol = parseInt(lastFocusedTd.dataset.col, 10);
          let table = lastFocusedTd.closest("table");

          rows.forEach((row, rowIndex) => {
            row.forEach((cellText, colIndex) => {
              let targetRow = startRow + rowIndex;
              let targetCol = startCol + colIndex;
              let targetCell = table.querySelector(`td[data-row="${targetRow}"][data-col="${targetCol}"]`);

              if (targetCell) {
                targetCell.textContent = cellText.trim();
              }
            });
          });

          // ✅ 저장
          saveTableToIndexedDB(lastFocusedTd.dataset.id, lastFocusedTd.closest(".tableContainer"));
        }

        /*
    // ✅ 테이블 너비 조정
    setTimeout(() => {
        adjustTableColumnWidths(tableContainer.querySelector("table"));
    }, 100);
*/
        //enableArrowKeyNavigation(tableContainer);
        enableMultiCellSelection(tableContainer);
      }

      // ✅ 테이블을 수정 가능하도록 이벤트 추가 (방향키 이동 포함)
      // ✅ 테이블 셀의 너비를 동적으로 조정하는 함수
      // ✅ 테이블의 각 열 너비를 동적으로 조정하는 함수
      // ✅ 테이블의 각 열 너비를 데이터 길이에 맞게 조정하는 함수
      function adjustTableColumnWidths(table) {
        let colWidths = [];
        let totalWidth = 190; // ✅ 테이블 전체 너비 (기본값)
        let minWidth = 30; // ✅ 최소 열 너비
        let maxWidth = 100; // ✅ 최대 열 너비

        // 1️⃣ 각 열의 최대 텍스트 길이 계산
        table.querySelectorAll("tr").forEach((row) => {
          row.querySelectorAll("td").forEach((cell, colIndex) => {
            let contentWidth = getTextWidth(cell.textContent.trim(), window.getComputedStyle(cell).font);
            colWidths[colIndex] = Math.max(colWidths[colIndex] || minWidth, contentWidth + 10); // 🔹 패딩 추가
          });
        });

        // 2️⃣ 가장 긴 열 찾기
        let totalContentWidth = colWidths.reduce((sum, w) => sum + w, 0);
        let scaleFactor = totalWidth / totalContentWidth;

        // 3️⃣ 비율에 맞춰 열 너비 조정 (최대 너비 제한)
        colWidths = colWidths.map((w) => Math.min(maxWidth, Math.max(minWidth, Math.floor(w * scaleFactor))));

        // 4️⃣ 각 열에 계산된 너비 적용
        table.querySelectorAll("tr").forEach((row) => {
          row.querySelectorAll("td").forEach((cell, colIndex) => {
            cell.style.minWidth = colWidths[colIndex] + "px"; // ✅ 최소 너비 적용
            cell.style.maxWidth = colWidths[colIndex] + "px"; // ✅ 최대 너비 적용
            cell.style.wordBreak = "break-word"; // ✅ 텍스트가 길면 자동 줄바꿈
          });
        });
      }

      // ✅ 텍스트의 실제 픽셀 너비를 계산하는 함수
      function getTextWidth(text, font) {
        let canvas = getTextWidth.canvas || (getTextWidth.canvas = document.createElement("canvas"));
        let context = canvas.getContext("2d");
        context.font = font || "12px Arial";
        return context.measureText(text).width;
      }

      // ✅ 현재 선택된 셀 목록
      let selectedCells = new Set();
      let lastSelectedCell = null;

      // ✅ 셀 선택 기능 (Shift 키 지원)
      function enableMultiCellSelection(tableContainer) {
        let isMouseDown = false;

        // ✅ 기존 이벤트 제거 (중복 방지)
        document.removeEventListener("mouseup", handleMouseUp);
        //document.removeEventListener("keydown", handleKeyDown);
        document.removeEventListener("click", handleOutsideClick);

        // ✅ 이벤트 핸들러 재등록
        document.addEventListener("mouseup", handleMouseUp);
        //document.addEventListener("keydown", handleKeyDown);
        document.addEventListener("click", handleOutsideClick);

        tableContainer.querySelectorAll("td").forEach((td) => {
          td.addEventListener("mousedown", function (event) {
            event.preventDefault();
            isMouseDown = true;

            if (event.shiftKey && lastSelectedCell) {
              selectRangeCells(lastSelectedCell, td, tableContainer);
            } else {
              clearSelectedCells();
              toggleCellSelection(td);
              lastSelectedCell = td;
            }
          });

          td.addEventListener("mouseover", function (event) {
            if (isMouseDown) {
              if (event.shiftKey && lastSelectedCell) {
                selectRangeCells(lastSelectedCell, td, tableContainer);
              } else {
                clearSelectedCells();
                toggleCellSelection(td);
              }
            }
          });

          td.addEventListener("mouseup", function () {
            isMouseDown = false;
          });

          td.addEventListener("click", function (event) {
            event.stopPropagation();
          });
        });
      }

      // ✅ 마우스 업 이벤트 핸들러 (중복 방지)
      function handleMouseUp() {
        isMouseDown = false;
      }
      function handleKeyDown(event) {
        const activeElement = document.activeElement;
        //console.log("activeMarker :")
        //console.log(activeMarker)

        // ✅ case 2: 지도 마커 이동용 WASD

        if (activeMarker) {
          let position = activeMarker.getPosition();
          let lat = position.lat();
          let lng = position.lng();
          let step = 0.0004;

          switch (event.key) {
            case "w":
            case "ㅈ":
              lat += step;
              break;
            case "s":
            case "ㄴ":
              lat -= step;
              break;
            case "a":
            case "ㅁ":
              lng -= step;
              break;
            case "d":
            case "ㅇ":
              lng += step;
              break;
            case "Escape":
              updateMarkerSelection(activeMarkerElement, false);
              activeMarker = null;
              activeMarkerElement = null;
              return;
            default:
              return;
          }

          let newPosition = new naver.maps.LatLng(lat, lng);
          console.log(newPosition);
          activeMarker.setPosition(newPosition);
        }

        // ✅ case 1: 테이블 셀 안에서 키보드 이벤트
        if (activeElement && activeElement.tagName === "TD") {
          // IME 한글 입력 중이면 무시
          if (window.isComposing) return;

          const tableContainer = activeElement.closest(".tableContainer");
          const currentRow = parseInt(activeElement.dataset.row, 10);
          const currentCol = parseInt(activeElement.dataset.col, 10);
          const table = tableContainer.querySelector("table");

          switch (event.key) {
            case "ArrowUp":
              event.preventDefault();
              moveToCell(table, currentRow - 1, currentCol);
              return;
            case "ArrowDown":
              event.preventDefault();
              moveToCell(table, currentRow + 1, currentCol);
              return;
            case "ArrowLeft":
              event.preventDefault();
              moveToCell(table, currentRow, currentCol - 1);
              console.log("왼쪽");
              return;
            case "ArrowRight":
              event.preventDefault();
              moveToCell(table, currentRow, currentCol + 1);
              console.log("오른쪽");
              return;
            case "Delete":
            case "Backspace":
              if (selectedCells.size > 1) {
                event.preventDefault();
                deleteSelectedCells();
              }
              return;
          }

          // ✅ Ctrl+C 또는 Cmd+C 복사 처리
          if ((event.ctrlKey || event.metaKey) && event.key === "c") {
            if (selectedCells.size > 0) {
              event.preventDefault();

              const cellsArray = Array.from(selectedCells);
              cellsArray.sort((a, b) => {
                const rowA = parseInt(a.dataset.row, 10);
                const rowB = parseInt(b.dataset.row, 10);
                if (rowA !== rowB) return rowA - rowB;
                return parseInt(a.dataset.col, 10) - parseInt(b.dataset.col, 10);
              });

              const maxRow = Math.max(...cellsArray.map((td) => parseInt(td.dataset.row)));
              const minRow = Math.min(...cellsArray.map((td) => parseInt(td.dataset.row)));
              const maxCol = Math.max(...cellsArray.map((td) => parseInt(td.dataset.col)));
              const minCol = Math.min(...cellsArray.map((td) => parseInt(td.dataset.col)));

              const rowCount = maxRow - minRow + 1;
              const colCount = maxCol - minCol + 1;
              const grid = Array.from({ length: rowCount }, () => Array(colCount).fill(""));

              cellsArray.forEach((td) => {
                const r = parseInt(td.dataset.row) - minRow;
                const c = parseInt(td.dataset.col) - minCol;
                grid[r][c] = td.textContent.trim();
              });

              const tsv = grid.map((row) => row.join("\t")).join("\n");

              navigator.clipboard
                .writeText(tsv)
                .then(() => {
                  console.log("✅ 셀 복사 완료");
                })
                .catch((err) => {
                  console.error("❌ 클립보드 복사 실패:", err);
                });
            }
          }
        }
      }

      // ✅ 마커 외부 클릭 시 블록 해제 (중복 방지)
      function handleOutsideClick(event) {
        if (!event.target.closest(".siseMapMarker")) {
          clearSelectedCells();
        }
      }

      function clearSelectedCells() {
        if (!selectedCells) return;
        selectedCells.forEach((cell) => {
          cell.style.backgroundColor = ""; // ✅ 기존 선택 해제
        });
        selectedCells.clear(); // ✅ Set 초기화
      }

      // ✅ 범위 선택 기능 (Shift 키 사용)
      function selectRangeCells(startCell, endCell, tableContainer) {
        let table = tableContainer.querySelector("table");
        let startRow = parseInt(startCell.dataset.row);
        let startCol = parseInt(startCell.dataset.col);
        let endRow = parseInt(endCell.dataset.row);
        let endCol = parseInt(endCell.dataset.col);

        let minRow = Math.min(startRow, endRow);
        let maxRow = Math.max(startRow, endRow);
        let minCol = Math.min(startCol, endCol);
        let maxCol = Math.max(startCol, endCol);

        selectedCells.clear();

        for (let row = minRow; row <= maxRow; row++) {
          for (let col = minCol; col <= maxCol; col++) {
            let targetCell = table.querySelector(`td[data-row="${row}"][data-col="${col}"]`);
            if (targetCell) {
              selectedCells.add(targetCell);
              targetCell.style.backgroundColor = "#FFD700"; // ✅ 노란색 블록 표시
            }
          }
        }
      }

      function enableArrowKeyNavigation(tableContainer) {
        const table = tableContainer.querySelector("table");
        if (!table) return;

        // ✅ 기존 td 이벤트 제거
        table.querySelectorAll("td").forEach((td) => {
          td.removeEventListener("keydown", handleArrowKey); // 중복 제거
          td.addEventListener("keydown", handleArrowKey); // 새로 등록
        });
      }

      function handleArrowKey(event) {
        const td = event.currentTarget;
        const currentRow = parseInt(td.dataset.row, 10);
        const currentCol = parseInt(td.dataset.col, 10);
        const table = td.closest("table");

        switch (event.key) {
          case "ArrowUp":
            event.preventDefault();
            moveToCell(table, currentRow - 1, currentCol);
            break;
          case "ArrowDown":
            event.preventDefault();
            moveToCell(table, currentRow + 1, currentCol);
            break;
          case "ArrowLeft":
            event.preventDefault();
            moveToCell(table, currentRow, currentCol - 1);
            console.log("왼쪽");
            break;
          case "ArrowRight":
            event.preventDefault();
            moveToCell(table, currentRow, currentCol + 1);
            console.log("오른쪽");
            break;
          case "Delete":
          case "Backspace":
            if (selectedCells && selectedCells.size > 1) {
              event.preventDefault();
              deleteSelectedCells();
            }
            break;
        }
      }
      function moveToCell(table, row, col) {
        console.log("➡ moveToCell 호출:", row, col);

        let maxRows = table.rows.length;
        let maxCols = table.rows[0].cells.length;

        if (row < 0 || row >= maxRows || col < 0 || col >= maxCols) {
          console.warn(`⚠️ 유효하지 않은 이동 위치: row=${row}, col=${col}`);
          return;
        }

        let targetCell = table.querySelector(`td[data-row="${row}"][data-col="${col}"]`);
        console.log("🎯 targetCell:", targetCell);

        if (targetCell) {
          targetCell.setAttribute("contenteditable", "true");
          setTimeout(() => {
            targetCell.focus();

            // ✅ 커서를 텍스트 끝으로 이동
            const range = document.createRange();
            const selection = window.getSelection();
            range.selectNodeContents(targetCell);
            range.collapse(false); // 끝으로 이동
            selection.removeAllRanges();
            selection.addRange(range);
          }, 10);
        }
      }

      function rgbToHex(rgb) {
        let rgbArray = rgb.match(/\d+/g);
        if (!rgbArray || rgbArray.length < 3) return "#000000"; // 기본값

        return `#${rgbArray
          .slice(0, 3)
          .map((x) => parseInt(x).toString(16).padStart(2, "0"))
          .join("")}`.toUpperCase();
      }

      function parseTextToTable(text) {
        return text
          .trim()
          .split("\n")
          .map((row) => row.split("\t"));
      }

      function convertTableToText(tableArray) {
        return tableArray.map((row) => row.join("\t")).join("\n");
      }

      function addRowToTable(apartmentId) {
        const tableContainer = document.querySelector(`[data-apartment-id='${apartmentId}'] .tableContainer`);
        if (tableContainer) {
          const table = tableContainer.querySelector("table");

          if (table) {
            const newRow = table.insertRow();
            const rowIndex = table.rows.length - 1;

            for (let colIndex = 0; colIndex < 4; colIndex++) {
              // 열 수 고정
              const newCell = newRow.insertCell();
              newCell.className = "sise-cell"; // ✅ 스타일 클래스만 적용
              newCell.contentEditable = "true";
              newCell.dataset.row = rowIndex;
              newCell.dataset.col = colIndex;
              newCell.dataset.id = apartmentId;

              // 이벤트 바인딩
              newCell.addEventListener("input", () => {
                newCell.style.backgroundColor = "#ffe"; // 변경 감지용 임시 스타일
              });

              newCell.addEventListener("blur", () => {
                const value = newCell.innerText.trim();
                const row = parseInt(newCell.dataset.row, 10);
                const col = parseInt(newCell.dataset.col, 10);

                getFromIndexedDB(apartmentId, "시세1").then((existing) => {
                  const text = existing?.text || "";
                  const parsed = parseTextToTable(text);

                  while (parsed.length <= row) parsed.push(["", "", "", ""]);
                  while (parsed[row].length < 4) parsed[row].push("");

                  parsed[row][col] = value;

                  const newText = convertTableToText(parsed);
                  saveToIndexedDB(
                    apartmentId,
                    "시세1",
                    newText,
                    existing?.color,
                    existing?.textColor,
                    existing?.fontSize,
                  );
                });
              });
            }

            saveTableToIndexedDB(apartmentId, tableContainer);
          }
        }
      }

      function removeRowFromTable(apartmentId) {
        // 해당 apartmentId의 테이블을 찾아서 선택된 행 제거
        const tableContainer = document.querySelector(`[data-apartment-id='${apartmentId}'] .tableContainer`);
        if (tableContainer) {
          const table = tableContainer.querySelector("table");

          if (table && table.rows.length > 1) {
            // 마지막 행을 삭제 (최소 1개 행이 남아야 하므로)
            table.deleteRow(table.rows.length - 1);
            // ✅ 삭제 후 바로 IndexedDB에 저장
            saveTableToIndexedDB(apartmentId, tableContainer);
          }
        }
      }

      function parsePriceDataFromTable(tableContainer) {
        const rows = tableContainer.querySelectorAll("tr");
        const parsed = [];

        rows.forEach((row) => {
          const cells = row.querySelectorAll("td");
          if (cells.length >= 3) {
            const 평형 = cells[0].textContent.trim();
            const 매매 = parseFloat(cells[1].textContent.trim());
            const 전세 = parseFloat(cells[2].textContent.trim());

            if (!isNaN(매매) && !isNaN(전세)) {
              parsed.push({ 평형, 매매, 전세 });
            }
          }
        });

        return parsed;
      }

      function renderPriceChart(container, data) {
        const canvas = document.createElement("canvas");
        canvas.width = 200;
        canvas.height = data.length * 25 + 20; // 평형 수에 따라 높이 조정
        canvas.style.margin = "5px";

        const ctx = canvas.getContext("2d");

        const maxPrice = Math.max(...data.flatMap((d) => [d.매매, d.전세]));
        const barMaxWidth = 80;

        data.forEach((d, i) => {
          const y = i * 25 + 20;
          const label = d.평형;
          ctx.fillStyle = "#000";
          ctx.font = "12px sans-serif";
          ctx.fillText(label, 0, y);

          const saleWidth = (d.매매 / maxPrice) * barMaxWidth;
          const leaseWidth = (d.전세 / maxPrice) * barMaxWidth;

          ctx.fillStyle = "#ff4d4d"; // 빨간색 매매
          ctx.fillRect(40, y - 10, saleWidth, 8);

          ctx.fillStyle = "#4d79ff"; // 파란색 전세
          ctx.fillRect(40, y, leaseWidth, 8);
        });

        container.appendChild(canvas);
      }

      async function exportToJSON() {
        try {
          const db = await initIndexedDB();
          const transaction = db.transaction(["apartments"], "readonly");
          const store = transaction.objectStore("apartments");
          const request = store.getAll();

          request.onsuccess = async function (event) {
            const data = event.target.result;
            const jsonData = JSON.stringify(data, null, 2);

            // 💾 저장할 파일 이름
            const now = new Date();
            const formattedDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
            const formattedTime = `${String(now.getHours()).padStart(2, "0")}${String(now.getMinutes()).padStart(2, "0")}${String(now.getSeconds()).padStart(2, "0")}`;
            const defaultFilename = `홍부_시세지도_백업_${formattedDate}_${formattedTime}.json`;

            // ✅ showSaveFilePicker로 저장 위치 선택
            const handle = await window.showSaveFilePicker({
              suggestedName: defaultFilename,
              types: [
                {
                  description: "JSON Files",
                  accept: { "application/json": [".json"] },
                },
              ],
            });

            const writable = await handle.createWritable();
            await writable.write(jsonData);
            await writable.close();

            console.log("✅ 저장 완료:", handle.name);
            db.close(); // ✅ DB 연결 정리
          };

          request.onerror = function (event) {
            console.error("❌ Export transaction error: ", event.target.errorCode);
            db.close(); // ✅ DB 연결 정리
          };
        } catch (error) {
          console.error("❌ 오류 발생:", error);
        }
      }

      function importFromJSON(file) {
        const reader = new FileReader();
        reader.onload = function (event) {
          const data = JSON.parse(event.target.result);

          initIndexedDB()
            .then((db) => {
              const transaction = db.transaction(["apartments"], "readwrite");
              const store = transaction.objectStore("apartments");

              data.forEach((item) => {
                // ✅ 누락된 필드 보완
                if (!item.type) item.type = "시세1";
                if (!item.idType) item.idType = `${item.id}-${item.type}`;
                store.put(item);
              });

              transaction.oncomplete = function () {
                alert("✅ 시세 데이터를 성공적으로 가져왔습니다.");
                db.close(); // ✅ DB 연결 정리

                // ❗ 시세지도 활성화 상태일 경우, 마커 다시 그리기
                if (document.getElementById("toggleSiseMap").checked && window.map) {
                  prevSiseMapState = "초기화";
                  updateMarkers(window.map.getBounds());
                }
              };

              transaction.onerror = function (event) {
                console.error("❌ Import transaction error:", event.target.errorCode);
                db.close(); // ✅ DB 연결 정리
              };
            })
            .catch((error) => {
              console.error("❌ Failed to initialize hongbu DB:", error);
            });
        };

        reader.readAsText(file);
      }

      function importFromSiseVer2JSON(file) {
        const reader = new FileReader();
        reader.onload = function (event) {
          const json = JSON.parse(event.target.result);
          const data = Array.isArray(json) ? json : json.apartments;

          if (!Array.isArray(data)) {
            alert("❌ 유효한 시세지도Ver2 데이터가 아닙니다.");
            return;
          }

          initIndexedDB()
            .then((db) => {
              if (!db.objectStoreNames.contains("importSiseVer2")) {
                alert("❌ 'importSiseVer2' 스토어가 존재하지 않습니다. DB 버전을 올려 스토어를 생성하세요.");
                db.close();
                return;
              }

              const transaction = db.transaction(["importSiseVer2"], "readwrite");
              const store = transaction.objectStore("importSiseVer2");

              data.forEach((item) => {
                // ✅ 누락된 필드 보완
                if (!item.type && item.idType?.includes("-")) {
                  item.type = item.idType.split("-")[1];
                }
                if (!item.id && item.idType?.includes("-")) {
                  item.id = item.idType.split("-")[0];
                }
                if (!item.type) item.type = "시세1";
                if (!item.idType) item.idType = `${item.id}-${item.type}`;
                store.put(item);
              });

              transaction.oncomplete = function () {
                alert("✅ 시세 데이터를 성공적으로 가져왔습니다.");
                db.close(); // ✅ DB 연결 정리
                // ❗ 시세지도 활성화 상태일 경우, 마커 다시 그리기
              };

              transaction.onerror = function (event) {
                console.error("❌ Import transaction error:", event.target.error);
                db.close(); // ✅ DB 연결 정리
              };
            })
            .catch((error) => {
              console.error("❌ Failed to initialize hongbu DB:", error);
            });
        };

        reader.readAsText(file);
      }
