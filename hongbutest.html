      // ===== 아파트 검색 함수 =====
      function searchApartments(query) {
        if (!apartmentData || apartmentData.length === 0) return [];

        const lowerQuery = query.toLowerCase();

        // 검색어를 공백으로 분리 (예: "동대문구 두산" -> ["동대문구", "두산"])
        const searchTerms = lowerQuery.split(/\s+/).filter((term) => term.length > 0);

        // 모든 검색어가 포함되는 아파트 찾기
        let results = apartmentData.filter((apt) => {
          const lowerName = apt.name.toLowerCase();
          const lowerSido = apt.sidoNm.toLowerCase();
          const lowerSigungu = apt.sigunguNm.toLowerCase();
          const combinedText = `${lowerName} ${lowerSido} ${lowerSigungu}`;

          // 모든 검색 단어가 아파트명, 시도명, 시군구명 중 어디든 포함되어야 함
          return searchTerms.every((term) => combinedText.includes(term));
        });

        // 지도의 현재 중심 좌표 기준으로 거리순 정렬
        if (window.map) {
          const mapCenter = window.map.getCenter();
          const centerLat = mapCenter.lat();
          const centerLng = mapCenter.lng();

          // 각 아파트까지의 거리 계산 (하버사인 공식)
          results = results.map((apt) => {
            const distance = calculateDistance(centerLat, centerLng, apt.lat, apt.lng);
            return { ...apt, distance };
          });

          // 거리에 따라 정렬 (가까운 순)
          results.sort((a, b) => a.distance - b.distance);
        }

        return results;
      }

      // ===== 두 지점 사이의 거리 계산 (하버사인 공식, 단위: km) =====
      function calculateDistance(lat1, lng1, lat2, lng2) {
        const R = 6371; // 지구 반지름 (km)
        const dLat = ((lat2 - lat1) * Math.PI) / 180;
        const dLng = ((lng2 - lng1) * Math.PI) / 180;
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) * Math.sin(dLng / 2) * Math.sin(dLng / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
      }

      // ===== 검색 쿼리와 매칭된 부분 하이라이트 =====
      function highlightMatches(text, query) {
        const lowerText = text.toLowerCase();
        const lowerQuery = query.toLowerCase();

        if (!lowerText.includes(lowerQuery)) {
          return text;
        }

        const index = lowerText.indexOf(lowerQuery);
        if (index === -1) return text;

        return (
          text.substring(0, index) +
          '<mark style="background-color: #ffeb3b; font-weight: 600;">' +
          text.substring(index, index + query.length) +
          "</mark>" +
          text.substring(index + query.length)
        );
      }

      function makeModalDraggable(modal) {
        let isDragging = false;
        let offsetX, offsetY;

        const header = document.createElement("div");
        header.className = "draggable";
        header.style.padding = "10px";
        header.style.cursor = "move";
        header.style.backgroundColor = "#f1f1f1";
        header.style.borderBottom = "1px solid #ccc";
        header.textContent = "Drag me";

        modal.insertBefore(header, modal.firstChild);

        header.addEventListener("mousedown", (e) => {
          isDragging = true;
          offsetX = e.clientX - modal.offsetLeft;
          offsetY = e.clientY - modal.offsetTop;
          document.addEventListener("mousemove", moveModal);
          document.addEventListener("mouseup", stopDragging);
        });

        function moveModal(e) {
          if (isDragging) {
            modal.style.left = `${e.clientX - offsetX}px`;
            modal.style.top = `${e.clientY - offsetY}px`;
          }
        }

        function stopDragging() {
          isDragging = false;
          document.removeEventListener("mousemove", moveModal);
          document.removeEventListener("mouseup", stopDragging);
        }
      }

      // ================================
      // ✅ 메모 아이콘 '표기'만 지연 조회(내용은 클릭 시에만 로드)
      // - 초기 로딩에서 메모를 미리 읽지 않음
      // - 마커가 생성/갱신될 때 해당 id의 메모 존재 여부만 IndexedDB에서 확인(getKey/get)
      // - 결과는 캐시(Map)하여 반복 조회 방지
      // ================================
      const HONGBU_DB_VERSION = 5;
      const HONGBU_MEMO_DB_VERSION = 5;

      window.__memoPresenceCache = window.__memoPresenceCache || new Map();
      window.__memoPresencePending = window.__memoPresencePending || new Map();
      window.__memoDbPromise = window.__memoDbPromise || null;
      function openHongbuMemoDBOnce() {
        if (window.__memoDbPromise) return window.__memoDbPromise;

        window.__memoDbPromise = new Promise((resolve, reject) => {
          const req = indexedDB.open("hongbuMemo", HONGBU_MEMO_DB_VERSION);

          // ✅ 추가: 첫 생성/업그레이드시 스토어 보장
          req.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains("apartmentNotes")) {
              db.createObjectStore("apartmentNotes", { keyPath: "id" });
            }
          };

          req.onsuccess = (e) => {
            const db = e.target.result;

            // ✅ iOS blocked/업그레이드 대비: 다른 탭에서 버전 변경 시 자동 close
            db.onversionchange = () => {
              try {
                db.close();
              } catch (e) {}
            };

            resolve(db);
          };

          req.onerror = (e) => reject(e.target.error);
        });

        return window.__memoDbPromise;
      }

      async function memoExistsLazy(id) {
        id = String(id);
        // ✅ 캐시된 경우라도 Promise로 래핑해서 반환 (항상 Promise 반환 보장)
        if (window.__memoPresenceCache.has(id)) {
          return Promise.resolve(window.__memoPresenceCache.get(id));
        }

        // 💾 캐시 크기 제한 (500개 초과 시 가장 오래된 항목 제거)
        if (window.__memoPresenceCache.size >= 500) {
          const firstKey = window.__memoPresenceCache.keys().next().value;
          window.__memoPresenceCache.delete(firstKey);
        }

        if (window.__memoPresencePending.has(id)) return window.__memoPresencePending.get(id);

        const p = (async () => {
          try {
            await initMemoIndexedDB();
            // ✅ 매번 새로운 DB 연결 열기 (캐시된 연결이 아닌 독립적인 연결)
            return await new Promise((resolve) => {
              const req = indexedDB.open("hongbuMemo", HONGBU_MEMO_DB_VERSION);
              req.onsuccess = (e) => {
                const db = e.target.result;
                try {
                  const tx = db.transaction(["apartmentNotes"], "readonly");
                  const store = tx.objectStore("apartmentNotes");

                  const getReq = store.getKey ? store.getKey(id) : store.get(id);
                  getReq.onsuccess = () => {
                    const exists = store.getKey
                      ? getReq.result !== undefined && getReq.result !== null
                      : !!getReq.result;
                    window.__memoPresenceCache.set(id, exists);
                    try {
                      db.close();
                    } catch (e) {} // ✅ 새로운 DB 연결 닫기
                    resolve(exists);
                  };
                  getReq.onerror = () => {
                    // 에러면 없는 것으로 처리(표기만)
                    window.__memoPresenceCache.set(id, false);
                    try {
                      db.close();
                    } catch (e) {} // ✅ 새로운 DB 연결 닫기
                    resolve(false);
                  };
                } catch (e) {
                  window.__memoPresenceCache.set(id, false);
                  try {
                    db.close();
                  } catch (e) {}
                  resolve(false);
                }
              };
              req.onerror = () => {
                window.__memoPresenceCache.set(id, false);
                resolve(false);
              };
            });
          } catch (e) {
            window.__memoPresenceCache.set(id, false);
            return false;
          } finally {
            window.__memoPresencePending.delete(id);
          }
        })();

        window.__memoPresencePending.set(id, p);
        return p;
      }

        // (의도적으로 텍스트/정보는 표시하지 않음)
        markerElement.textContent = "";

        const marker = new naver.maps.Marker({
          position: new naver.maps.LatLng(apartment.lat, apartment.lng),
          map: window.map,
          icon: {
            content: markerElement,
            anchor: new naver.maps.Point(10, 30),
          },
        });
        marker.apartmentId = apartment.id; // ✅ 마커 객체에 직접 ID 저장

        naver.maps.Event.addListener(marker, "click", function (e) {
          showApartmentInfo(apartment.id, {
            x: e.offset.x,
            y: e.offset.y,
          });
        });

        addMarkerRightClickEvent(marker, markerElement); // ✅ 마커 선택 이벤트 등록

        return marker;
      }

      // ✅ 기본 마커 생성 (시세지도 체크 해제 시)
      function createDefaultMarker(apartment) {
        const useBlankMap = document.getElementById("toggleBlankMap")?.checked;
        //console.log("useBlankMap : "+useBlankMap);
        if (!useBlankMap) {
          //백지도 아닐 때
          return createDefaultMapMarker(apartment);
        } else {
          return createWhiteMapMarker(apartment);
        }
      }

      let prevSiseMapState = null; // 🔹 전역 변수로 이전 시세지도 상태 저장

      function removeLinesOutsideBounds(bounds) {
        Object.entries(apartmentMarkers).forEach(([id, marker]) => {
          const position = marker.getPosition();
          const line = marker.lineToOrigin;

          const isMarkerInside = bounds.hasLatLng(position);

          // 마커가 bounds 바깥이면
          if (!isMarkerInside) {
            //console.log(`❌ 마커 제거됨: ${id}`);
            if (marker.movementLine) {
              marker.movementLine.setMap(null);
              marker.movementLine = null;
            }
            marker.setMap(null);
            delete apartmentMarkers[id];

            // 선도 같이 제거
            if (line) {
              //console.log(`❌ 선도 같이 제거됨: ${id}`);
              line.setMap(null);
              delete marker.lineToOrigin;
            }
          }
        });
      }

      function removeAllLines() {
        Object.entries(apartmentMarkers).forEach(([id, marker]) => {
          const position = marker.getPosition();
          const isMarkerInside = window.map.getBounds().hasLatLng(position);

          if (isMarkerInside) {
            // 🔥 범위 안의 마커에 연결된 이동선 제거
            if (marker.movementLine) {
              marker.movementLine.setMap(null);
              marker.movementLine = null;
              //console.log(`🧹 ${id}의 이동선 제거됨`);
            }
          }
        });
      }

      // ✅ 3. 지도 이동할 때마다 범위 내 아파트만 마커로 표시
      function _hongbuExtractBuiltYear(apartment) {
        // 가능한 필드들에서 연도 추출: 4자리(19xx/20xx) 우선, 그 다음 2자리(00.10 등)
        const candidates = [
          apartment?.builtYear,
          apartment?.buildYear,
          apartment?.year,
          apartment?.completionYear,
          apartment?.title,
          apartment?.name,
        ].filter((v) => v !== undefined && v !== null);

        const str = String(candidates.find((v) => String(v).trim() !== "") ?? "");

        // 4자리 연도 우선
        const m4 = str.match(/\b(19\d{2}|20\d{2})\b/);
        if (m4) return parseInt(m4[1], 10);

        // 2자리(예: 00.10, 22.03) 형태
        const m2 = str.match(/\b(\d{2})\s*[\.\-\/]/);
        if (m2) {
          const yy = parseInt(m2[1], 10);
          // 70~99 => 19xx, 00~69 => 20xx (필요하면 기준값 조정)
          return yy >= 70 ? 1900 + yy : 2000 + yy;
        }

        return null;
      }

      function updateMarkers(bounds) {
        const showApartments = document.getElementById("toggleApartments").checked;
        if (!showApartments) {
          Object.values(apartmentMarkers).forEach((marker) => {
            if (marker instanceof naver.maps.Marker) {
              /* ✅ 마커 엘리먼트의 호버 리스너도 제거 */
              const markerElement = marker.getIcon?.()?.content;
              if (markerElement && markerElement.__hoverHandlers) {
                markerElement.removeEventListener("mouseenter", markerElement.__hoverHandlers.enter);
                markerElement.removeEventListener("mouseleave", markerElement.__hoverHandlers.leave);
                delete markerElement.__hoverHandlers;
              }

              marker.setMap(null);
            }
          });
          apartmentMarkers = {}; // 캐시 초기화
          return; // ✅ 마커 제거 후 더 이상 작업하지 않음
        }

        // ▼ 추가: 현재 선택된 시도/시군구 읽기
        const { sidoSel } = getFilterEls();
        const selectedSido = (sidoSel?.value || "").trim(); // '' => 전체

        //범위 벗어나면 마커 삭제
        removeLinesOutsideBounds(bounds);

        const minUnits = parseInt(document.getElementById("unitFilter").value, 10) || 0;
        const fromYear = parseInt(document.getElementById("yearFromFilter")?.value, 10) || null;
        const toYear = parseInt(document.getElementById("yearToFilter")?.value, 10) || null;
        //const showApartments = document.getElementById("toggleApartments").checked;
        const isSiseMapActive = document.getElementById("toggleSiseMap").checked;

        if (!showApartments || window.map.getZoom() < 14) return;

        // ▼ 여기서 시도/시군구 필터까지 적용
        const filtered = apartmentData.filter((apartment) => {
          const inBounds = bounds.hasLatLng(new naver.maps.LatLng(apartment.lat, apartment.lng));
          const unitOK = apartment.units >= minUnits;

          const sidoOK = !selectedSido || (apartment.sido || "").trim() === selectedSido;
          const sigunguOK = selectedSigunguSet.size === 0 || selectedSigunguSet.has((apartment.sigungu || "").trim());
          const builtYear = _hongbuExtractBuiltYear(apartment);
          const yearOK =
            (!fromYear || (builtYear && builtYear >= fromYear)) && (!toYear || (builtYear && builtYear <= toYear));
          //console.log("apartment.sido : "+apartment.sido)
          //console.log("apartment.sigungu : "+apartment.sigungu)
          const includeLarge = document.getElementById("over85Filter")?.checked;
          let areaOK = true;
          if (!includeLarge) {
            // 미체크 시: 최소 전용면적이 85 초과인 단지(대형 단지) 제외
            const types = (apartmentDetailData[String(apartment.id)] || {}).타입정보 || [];
            if (types.length > 0) {
              const minArea = Math.min(...types.map((t) => Number(t["전용면적"]) || 0).filter((a) => a > 0));
              areaOK = minArea <= 85;
            }
            // 상세 데이터 없으면 제외하지 않음 (areaOK = true 유지)
          }
          return inBounds && unitOK && sidoOK && sigunguOK && yearOK && areaOK;
        });

        // ✅ 필터 결과에 없는 기존 마커는 즉시 제거(연도/세대수/지역/범위 변경 시 즉시 반영)
        const keepIds = new Set(filtered.map((a) => String(a.id)));

        // 💾 범위 밖의 메모 캐시도 자동 삭제 (메모리 최적화)
        try {
          const outOfBoundsIds = Array.from(window.__memoPresenceCache.keys()).filter((id) => !keepIds.has(String(id)));
          outOfBoundsIds.forEach((id) => window.__memoPresenceCache.delete(id));
          if (outOfBoundsIds.length > 0) {
            hongbuDebugLog("INFO", `🧹 메모 캐시 정리: ${outOfBoundsIds.length}개 제거 (범위 밖)`);
          }
        } catch (e) {}

        Object.keys(apartmentMarkers).forEach((id) => {
          if (!keepIds.has(String(id))) {
            const m = apartmentMarkers[id];
            try {
              if (m && typeof m.setMap === "function") {
                naver.maps.Event &&
                  naver.maps.Event.clearInstanceListeners &&
                  naver.maps.Event.clearInstanceListeners(m);

                /* ✅ 마커 엘리먼트의 호버 리스너도 제거 */
                const markerElement = m.getIcon?.()?.content;
                if (markerElement && markerElement.__hoverHandlers) {
                  markerElement.removeEventListener("mouseenter", markerElement.__hoverHandlers.enter);
                  markerElement.removeEventListener("mouseleave", markerElement.__hoverHandlers.leave);
                  delete markerElement.__hoverHandlers;
                }

                m.setMap(null);
              }
            } catch (e) {}
            delete apartmentMarkers[id];
          }
        });

        /*
			const filtered = apartmentData.filter(apartment =>
				bounds.hasLatLng(new naver.maps.LatLng(apartment.lat, apartment.lng)) &&
				apartment.units >= minUnits
			);
 */
        const newMarkers = [];

        // ✅ 시세지도 체크 상태가 바뀐 경우 → 모든 마커 제거
        if (prevSiseMapState !== isSiseMapActive) {
          Object.values(apartmentMarkers).forEach((marker) => {
            if (marker instanceof naver.maps.Marker) {
              naver.maps.Event.clearInstanceListeners(marker);

              /* ✅ 마커 엘리먼트의 호버 리스너도 제거 */
              const markerElement = marker.getIcon?.()?.content;
              if (markerElement && markerElement.__hoverHandlers) {
                markerElement.removeEventListener("mouseenter", markerElement.__hoverHandlers.enter);
                markerElement.removeEventListener("mouseleave", markerElement.__hoverHandlers.leave);
                delete markerElement.__hoverHandlers;
              }

              marker.setMap(null);
            }
          });
          apartmentMarkers = {}; // 캐시 초기화
          prevSiseMapState = isSiseMapActive; // 상태 갱신
        }

        // ✅ 새 마커 생성 or 재사용
        filtered.forEach((apartment) => {
          if (apartment.name.includes("도시형") || apartment.name.includes("생활형")) return;
          let marker = apartmentMarkers[apartment.id];

          if (!marker) {
            marker = isSiseMapActive ? renderSiseMapMarker(apartment) : createDefaultMarker(apartment);

            marker.__siseMap = isSiseMapActive;
            apartmentMarkers[apartment.id] = marker;
          }

          newMarkers.push(marker);
        });

        if (markerCluster) {
          markerCluster.setMarkers(newMarkers);
        }
      }

      let schoolMarkers = []; // ✅ 지도에 표시된 학교 마커 저장

      // ================================
      // ✅ 학교 배정범위(폴리곤) 토글 표시 (eliSchools.json에 미리 포함된 schoolVertexLists 사용)
      // ================================
      let activeSchoolZoneId = null;
      let activeSchoolZonePolygons = [];
      let activeSchoolInfoWindow = null;
      let activeSchoolDetailButtonEl = null;
      let activeSchoolDetailButtonId = null;

      function clearActiveSchoolZone() {
        activeSchoolZonePolygons.forEach((p) => {
          try {
            p.setMap(null);
          } catch (e) {}
        });
        activeSchoolZonePolygons = [];
        activeSchoolZoneId = null;
      }

      function closeActiveSchoolInfoWindow() {
        if (!activeSchoolInfoWindow) return;
        try {
          activeSchoolInfoWindow.close();

        activeSchoolInfoWindow = null;
      }

      function clearActiveSchoolDetailButton() {
        if (activeSchoolDetailButtonEl) {
          activeSchoolDetailButtonEl.style.display = "none";
        }
        activeSchoolDetailButtonEl = null;
        activeSchoolDetailButtonId = null;
      }

      function setActiveSchoolDetailButton(buttonEl, schoolId) {
        if (activeSchoolDetailButtonEl && activeSchoolDetailButtonEl !== buttonEl) {
          activeSchoolDetailButtonEl.style.display = "none";

        activeSchoolDetailButtonEl = buttonEl;

      function _getSchoolZoneId(school) {
        // 데이터에 따라 키가 다를 수 있어 최대한 안전하게 처리
        return String(school?.schoolCode ?? school?.markerId ?? school?.id ?? school?.schoolName ?? "");
      }

      function drawSchoolZoneById(schoolId) {
        const id = String(schoolId);
        const vertexLists = window.schoolZoneMap?.get(id);

        if (!vertexLists || !vertexLists.length) {
          //alert("이 학교는 배정범위 데이터가 없습니다. (eliSchools.json에 schoolVertexLists가 있어야 합니다)");
          return;
        }

        clearActiveSchoolZone();
        activeSchoolZoneId = id;

        const bounds = new naver.maps.LatLngBounds();

        // vertexLists: [ [ [lat,lng], ... ], ... ] (조각이 여러 개일 수 있음)
        vertexLists.forEach((ring) => {
          const path = (ring || []).map(([lat, lng]) => {
            const ll = new naver.maps.LatLng(lat, lng);
            bounds.extend(ll);
            return ll;
          });

          const poly = new naver.maps.Polygon({
            map: window.map,
            paths: path,
            strokeColor: "#00BC38",
            strokeOpacity: 0.9,
            strokeWeight: 2,
            fillColor: "#00BC38",
            fillOpacity: 0.15,
            clickable: false,
            zIndex: 999999,
          });

          activeSchoolZonePolygons.push(poly);
        });

        // ✅ 범위가 화면에 잘 보이도록 맞추기 (원치 않으면 주석 처리)
        //window.map.fitBounds(bounds);
      }

      function toggleSchoolZoneBySchool(school) {
        const id = _getSchoolZoneId(school);
        if (!id) return;

        // 같은 학교 다시 클릭하면 제거
        if (activeSchoolZoneId === id) {
          clearActiveSchoolZone();
          return;
        }

        // 다른 학교면 교체
        drawSchoolZoneById(id);
      }

      function _fmtSchoolNum(v) {
        return Number.isFinite(Number(v)) ? Number(v) : "-";
      }

      function _toSchoolNumOrZero(v) {
        const n = Number(v);
        return Number.isFinite(n) ? n : 0;
      }

      function _fmtStudentsPerClass(studentCount, classroomCount) {
        const students = Number(studentCount);
        const classrooms = Number(classroomCount);
        if (!Number.isFinite(students) || !Number.isFinite(classrooms) || classrooms <= 0) return "-";
        return Math.round(students / classrooms);
      }

      function _fmtEstablishmentYmd(v) {
        if (v == null) return "-";
        const raw = String(v).replace(/\D/g, "");
        if (raw.length === 8) {
          return `${raw.slice(0, 4)}.${raw.slice(4, 6)}.${raw.slice(6, 8)}`;
        }
        return String(v);
      }

      function renderSchoolDetailContent(school) {
        const schoolName = school?.schoolName || school?.name || "-";
        const establishmentYmd = _fmtEstablishmentYmd(school?.establishmentYmd);

        const rows = [
          ["1학년", _fmtSchoolNum(school?.firstYearClassroomCount), _fmtSchoolNum(school?.firstYearStudentCount)],
          ["2학년", _fmtSchoolNum(school?.secondYearClassroomCount), _fmtSchoolNum(school?.secondYearStudentCount)],
          ["3학년", _fmtSchoolNum(school?.thirdYearClassroomCount), _fmtSchoolNum(school?.thirdYearStudentCount)],
          ["4학년", _fmtSchoolNum(school?.fourthYearClassroomCount), _fmtSchoolNum(school?.fourthYearStudentCount)],
          ["5학년", _fmtSchoolNum(school?.fifthYearClassroomCount), _fmtSchoolNum(school?.fifthYearStudentCount)],
          ["6학년", _fmtSchoolNum(school?.sixthYearClassroomCount), _fmtSchoolNum(school?.sixthYearStudentCount)],
          [
            "특수학급",
            _fmtSchoolNum(school?.specialClassroomCount),
            _fmtSchoolNum(school?.specialClassroomStudentCount),
          ],
        ];

        const totalClassrooms =
          _toSchoolNumOrZero(school?.firstYearClassroomCount) +
          _toSchoolNumOrZero(school?.secondYearClassroomCount) +
          _toSchoolNumOrZero(school?.thirdYearClassroomCount) +
          _toSchoolNumOrZero(school?.fourthYearClassroomCount) +
          _toSchoolNumOrZero(school?.fifthYearClassroomCount) +
          _toSchoolNumOrZero(school?.sixthYearClassroomCount) +
          _toSchoolNumOrZero(school?.specialClassroomCount);

        const totalStudents =
          _toSchoolNumOrZero(school?.firstYearStudentCount) +
          _toSchoolNumOrZero(school?.secondYearStudentCount) +
          _toSchoolNumOrZero(school?.thirdYearStudentCount) +
          _toSchoolNumOrZero(school?.fourthYearStudentCount) +
          _toSchoolNumOrZero(school?.fifthYearStudentCount) +
          _toSchoolNumOrZero(school?.sixthYearStudentCount) +
          _toSchoolNumOrZero(school?.specialClassroomStudentCount);

        rows.push([
          "합계",
          _fmtSchoolNum(totalClassrooms),
          _fmtSchoolNum(totalStudents),
          _fmtStudentsPerClass(totalStudents, totalClassrooms),
        ]);

        const rowsWithPerClass = rows.map((r) => [r[0], r[1], r[2], _fmtStudentsPerClass(r[2], r[1])]);
        rowsWithPerClass[rowsWithPerClass.length - 1] = rows[rows.length - 1];

        const detailTable = `
      <div style="margin-top:0;">
        <div style="margin:0 0 14px 2px; line-height:1.25; color:#1f2937; font-size:16px;">
          <div style="font-weight:700;">🏫 ${schoolName}</div>
          <div style="margin-top:4px; font-size:16px; color:#374151;">📅 설립일자 : ${establishmentYmd}</div>
        </div>
        <table style="width:100%; border-collapse:collapse; font-size:16px;">
          <thead>
            <tr>
              <th style="padding:6px; border:1px solid #d9d9d9; background:#f6f7fb;">학년</th>
              <th style="padding:6px; border:1px solid #d9d9d9; background:#f6f7fb;">학급수</th>
              <th style="padding:6px; border:1px solid #d9d9d9; background:#f6f7fb;">학생수</th>
              <th style="padding:6px; border:1px solid #d9d9d9; background:#f6f7fb;">학급당학생수</th>
            </tr>
          </thead>
          <tbody>
            ${rowsWithPerClass
              .map(
                (r, idx) => `
              <tr>
                <td style="padding:6px; border:1px solid #d9d9d9; text-align:center;${idx === rowsWithPerClass.length - 1 ? " font-weight:700; background:#f6f7fb;" : ""}">${r[0]}</td>
                <td style="padding:6px; border:1px solid #d9d9d9; text-align:center;${idx === rowsWithPerClass.length - 1 ? " font-weight:700; background:#f6f7fb;" : ""}">${r[1]}</td>
                <td style="padding:6px; border:1px solid #d9d9d9; text-align:center;${idx === rowsWithPerClass.length - 1 ? " font-weight:700; background:#f6f7fb;" : ""}">${r[2]}</td>
                <td style="padding:6px; border:1px solid #d9d9d9; text-align:center;${idx === rowsWithPerClass.length - 1 ? " font-weight:700; background:#f6f7fb;" : ""}">${r[3]}</td>
              </tr>
            `,
              )
              .join("")}
          </tbody>
        </table>
      </div>
    `;

        return `
      <div style="min-width:280px; max-width:320px; padding:10px 12px; background:#fff; border:1px solid #90a9cf; border-radius:10px; box-shadow:0 4px 14px rgba(0,0,0,.15);">
        ${detailTable}
      </div>
    `;
      }

      function openSchoolDetailPopup(school, marker) {
        if (!school || !marker || !window.map) return;

        closeActiveSchoolInfoWindow();

        const infoWindow = new naver.maps.InfoWindow({
          content: renderSchoolDetailContent(school),
          borderWidth: 0,
          backgroundColor: "transparent",
          disableAnchor: true,
          pixelOffset: new naver.maps.Point(0, 0),
        });

        infoWindow.open(window.map, window.map.getCenter());
        activeSchoolInfoWindow = infoWindow;
      }

      function normalizeVertexLists(v) {
        // 이미 배열이면 그대로
        if (Array.isArray(v)) return v;

        // 문자열이면 JSON 파싱 시도
        if (typeof v === "string") {
          try {
            const parsed = JSON.parse(v);
            return Array.isArray(parsed) ? parsed : [];
          } catch (e) {
            console.warn("⚠️ schoolVertexLists JSON.parse 실패", e);
            return [];
          }
        }

        return [];
      }

      async function loadSchools() {
        try {
          // ✅ 분할 파일 4개 로드 (GitHub Pages 같은 정적호스팅 기준)
          const PARTS = ["eliSchools_1.json", "eliSchools_2.json", "eliSchools_3.json", "eliSchools_4.json"];

          // ✅ 파일 하나를 "배열 or 래퍼({schools:[]})" 모두 지원해서 배열로 통일
          async function fetchAsArray(url) {
            const res = await fetch(url, { cache: "no-store" });
            if (!res.ok) throw new Error(`학교 파일 로드 실패: ${url} (HTTP ${res.status})`);
            const data = await res.json().catch(() => null);

            if (Array.isArray(data)) return data;
            if (Array.isArray(data?.schools)) return data.schools;
            if (Array.isArray(data?.schoolList)) return data.schoolList;
            return [];
          }

          // ✅ 4개 파일 병합 (네트워크 부담 줄이려면 순차 로드)
          const merged = [];
          for (const f of PARTS) {
            const arr = await fetchAsArray(f);
            console.log(`✅ loaded ${f}: ${arr.length}`);
            merged.push(...arr);
          }

          // ✅ 중복 제거 (schoolCode/markerId 우선)
          const uniqMap = new Map();
          for (const s of merged) {
            const id = String(s?.schoolCode ?? s?.markerId ?? s?.id ?? s?.schoolName ?? "");
            if (!id) continue;
            if (!uniqMap.has(id)) uniqMap.set(id, s);
          }
          const schools = Array.from(uniqMap.values());

          console.log(`🎯 schools merged: ${merged.length} → unique: ${schools.length}`);

          // ✅ 전체 학교 데이터 저장
          window.schoolData = schools;

          // ✅ 배정범위(폴리곤) 빠른 조회용 Map: id -> schoolVertexLists
          window.schoolZoneMap = new Map(
            schools.map((s) => [
              String(s.schoolCode ?? s.markerId ?? s.id ?? s.schoolName ?? ""),
              normalizeVertexLists(s.schoolVertexLists),
            ]),
          );

          // ✅ 초기 마커 업데이트
          updateSchoolMarkers(window.map.getBounds());

          // ✅ 지도 이동 시 현재 범위 내 학교 마커 업데이트
          naver.maps.Event.addListener(window.map, "idle", function () {
            updateSchoolMarkers(window.map.getBounds());
          });

          // ✅ 지도 빈 곳 클릭하면 배정범위(폴리곤) 제거
          naver.maps.Event.addListener(window.map, "click", function () {

      function setupMapPositionAutoSave(map) {
        if (!map || !window.naver || !naver.maps || !naver.maps.Event) return;

        // ✅ 기존에 이 함수가 붙인 리스너만 제거 (다른 idle 리스너는 건드리지 않음)

          if (map.__hongbuMapPosListeners && Array.isArray(map.__hongbuMapPosListeners)) {
            map.__hongbuMapPosListeners.forEach((l) => {
              try {
                naver.maps.Event.removeListener(l);
              } catch (e) {}
            });
          }
        } catch (e) {}
        map.__hongbuMapPosListeners = [];

        let __saveMapPosTimer = null;

        const __saveToLocalStorage = () => {
          try {
            const c = map.getCenter();
            const z = map.getZoom();
            localStorage.setItem(
              "hongbu_mapPosition_fallback_v1",
              JSON.stringify({
                lat: c.lat(),
                lng: c.lng(),
                zoom: z,
                t: Date.now(),
              }),
            );
          } catch (e) {}
        };

        const __save = (delayMs = 150) => {
          if (__saveMapPosTimer) clearTimeout(__saveMapPosTimer);
          __saveMapPosTimer = setTimeout(() => {
            try {
              const c = map.getCenter();
              const z = map.getZoom();
              setHongbuSetting("mapPosition", { lat: c.lat(), lng: c.lng(), zoom: z }).catch(console.warn);
              __saveToLocalStorage();
            } catch (e) {}
          }, delayMs);
        };

        // ✅ map 이벤트(새 map 인스턴스마다 재바인딩)
        map.__hongbuMapPosListeners.push(naver.maps.Event.addListener(map, "idle", () => __save(150)));
        map.__hongbuMapPosListeners.push(naver.maps.Event.addListener(map, "zoom_changed", () => __save(0)));
        map.__hongbuMapPosListeners.push(naver.maps.Event.addListener(map, "dragend", () => __save(0)));

        // ✅ 탭이 죽기 직전/백그라운드 전환 직전 한 번 더 저장(전역 1회만 바인딩)
        if (!window.__hongbuPageSaveHooksBound) {
          window.__hongbuPageSaveHooksBound = true;
          const saveCurrentNow = () => {
            try {
              const m = window.map;
              if (!m) return;
              const c = m.getCenter();
              const z = m.getZoom();
              setHongbuSetting("mapPosition", { lat: c.lat(), lng: c.lng(), zoom: z }).catch(console.warn);

          });
          window.addEventListener("pagehide", saveCurrentNow);

        }

      async function compressImage(base64, maxSize = 600, quality = 0.8) {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement("canvas");
            let [w, h] = [img.width, img.height];
            if (w > h && w > maxSize) {
              h *= maxSize / w;
              w = maxSize;
            } else if (h >= w && h > maxSize) {
              w *= maxSize / h;
              h = maxSize;
            }
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, w, h);
            const compressedBase64 = canvas.toDataURL("image/jpeg", quality);
            resolve(compressedBase64);
          };
          img.src = base64;
        });
      }

          if (infoDiv.scrollHeight > infoDiv.clientHeight) {
            let startY = parseFloat(infoDiv.dataset.startY);
            let startScrollTop = parseFloat(infoDiv.dataset.startScrollTop);
            let currentY = event.touches[0].clientY;
            let scrollDiff = startScrollTop + (startY - currentY);

            // ✅ 최상단에서 아래로 당기려고 할 때
            if (infoDiv.scrollTop <= 0 && scrollDiff < 0) {

      async function loadMiddleSchools() {
        try {
          const response = await fetch("middleSchools.json");
          let middleSchools = await response.json();
          // ✅ 중복 제거: 학교 ID를 기준으로 첫 번째 값만 유지
          const uniqueSchools = [];
          const seenIds = new Set();

          middleSchools.forEach((school) => {
            if (!seenIds.has(school["학교 ID"])) {
              seenIds.add(school["학교 ID"]);
              uniqueSchools.push(school);
            }
          });

          //console.log("✅ 중복 제거 완료: 총", uniqueSchools.length, "개 학교 로드됨");

          console.log(`✅ loaded middleSchools.json: ${uniqueSchools.length}`);
          window.middleSchoolData = uniqueSchools; // ✅ 중복 제거된 데이터 저장

          // ✅ 마커 업데이트
          updateMiddleSchoolMarkers();

          // ✅ 지도 이동 시 현재 범위 내 중학교 마커 업데이트
          naver.maps.Event.addListener(window.map, "idle", function () {
            updateMiddleSchoolMarkers();
          });
        } catch (error) {
          console.error("❌ 중학교 데이터 로드 실패:", error);
        }
      }

      function updateMiddleSchoolMarkers() {
        const showMiddleSchools = document.getElementById("toggleMiddleSchools").checked;

        // ✅ 기존 중학교 마커 제거
        middleSchoolMarkers.forEach((marker) => marker.setMap(null));
        middleSchoolMarkers = [];

        if (!showMiddleSchools) return; // 중학교 표시 체크 해제 시 종료

      function initMemoIndexedDB() {
        return new Promise((resolve, reject) => {

          request.onupgradeneeded = function (event) {
            const db = event.target.result;
            if (!db.objectStoreNames.contains("apartmentNotes")) {

              const store = db.createObjectStore("photoMemos", { keyPath: "id" });
              store.createIndex("createdAt", "createdAt", { unique: false });
            }

          request.onsuccess = function (event) {

            // ✅ iOS 꼬임 복구: 이미 v4인데 store가 없으면 DB를 지우고 재생성 유도
            if (!db.objectStoreNames.contains("apartmentNotes") || !db.objectStoreNames.contains("photoMemos")) {
              db.close();
              const del = indexedDB.deleteDatabase("hongbuMemo");
              del.onsuccess = () => resolve(initMemoIndexedDB());
              del.onerror = (e) => reject(e.target.error);
              del.onblocked = () => reject(new Error("hongbuMemo delete blocked (다른 탭 닫기 필요)"));
              return;
            }

            db.close();
            resolve(true);
          };

          request.onerror = (e) => reject(e.target.error);
        });

          req.onsuccess = (event) => {

              } else {
                // fallback: cursor
                const s = new Set();
                const cur = store.openCursor();
                cur.onsuccess = (e) => {
                  const cursor = e.target.result;
                  if (cursor) {
                    s.add(String(cursor.key));
                    cursor.continue();
                  } else {
                    window.__hongbuMemoKeySet = s;
                    window.__hongbuMemoKeySetReady = true;
                    try {
                      db.close();
                    } catch (e) {}
                    resolve(window.__hongbuMemoKeySet);

      async function __photoMemoPut(rec) {
        await initMemoIndexedDB();
        const db = await __openHongbuMemoDb();
        return new Promise((resolve, reject) => {
          try {
            const tx = db.transaction(["photoMemos"], "readwrite");
            const store = tx.objectStore("photoMemos");
            const normalizedRec = {
              ...(rec || {}),
              id: String(rec?.id || ""),
            };
            if (!normalizedRec.id) {
              try {
                db.close();
              } catch (_) {}
              reject(new Error("photoMemo id is required"));
              return;
            }
            tx.oncomplete = () => {
              try {
                db.close();
              } catch (e) {}
              resolve(true);
            };
            tx.onerror = (e) => {
              try {
                db.close();
              } catch (_) {}
              reject(e?.target?.error || tx.error);
            };
            tx.onabort = (e) => {
              try {
                db.close();
              } catch (_) {}
              reject(e?.target?.error || tx.error || new Error("photoMemo tx aborted"));
            };
            const req = store.put(normalizedRec);
            req.onerror = (e) => {
              try {
                db.close();
              } catch (_) {}
              reject(e.target.error);
            };
          } catch (e) {
            try {

            reject(e);
