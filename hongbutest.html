      function base64ToBlobUrl(base64) {
        const byteString = atob(base64.split(",")[1]);
        const mimeString = base64.split(",")[0].split(":")[1].split(";")[0];
        const ab = new ArrayBuffer(byteString.length);
        const ia = new Uint8Array(ab);
        for (let i = 0; i < byteString.length; i++) {
          ia[i] = byteString.charCodeAt(i);
        }
        const blob = new Blob([ab], { type: mimeString });
        return URL.createObjectURL(blob);
      }

      async function backupMemoDB() {
        const request = indexedDB.open("hongbuMemo", HONGBU_MEMO_DB_VERSION);

        request.onsuccess = function (event) {
          const db = event.target.result;
          const transaction = db.transaction(["apartmentNotes"], "readonly");
          const store = transaction.objectStore("apartmentNotes");

          const chunkList = [];
          const chunkSize = 10;

          const now = new Date();
          const koreaTime = new Date(now.getTime() + 9 * 60 * 60 * 1000);
          const timestamp = koreaTime.toISOString().replace(/T/, "_").replace(/:/g, "-").replace(/\..+/, "");

          const cursorRequest = store.openCursor();
          cursorRequest.onsuccess = async function (event) {
            const cursor = event.target.result;
            if (cursor) {
              chunkList.push(cursor.value);
              cursor.continue();
            } else {
              const totalChunks = Math.ceil(chunkList.length / chunkSize);

              for (let i = 0; i < totalChunks; i++) {
                const chunk = chunkList.slice(i * chunkSize, (i + 1) * chunkSize);
                const json = JSON.stringify(chunk, null, 2);
                const blob = new Blob([json], { type: "application/json" });
                const url = URL.createObjectURL(blob);

                await new Promise((resolve) => {
                  const a = document.createElement("a");
                  a.href = url;
                  a.download = `홍부_메모백업_${timestamp}_part${i + 1}.json`;
                  document.body.appendChild(a); // iOS용 필요
                  a.click();

                  setTimeout(() => {
                    URL.revokeObjectURL(url);
                    a.remove();
                    resolve();
                  }, 1000); // 다운로드 완료 대기 시간
                });
              }

              db.close();
              alert("✅ 백업이 완료되었습니다.");
            }
          };

          cursorRequest.onerror = function () {
            alert("❌ 백업 중 오류 발생 (cursor 실패)");
            db.close();
          };
        };

        request.onerror = function () {
          alert("❌ DB 열기 실패");
        };
      }

      // ✅ 메모 복원 (정상 동작 버전)
      function restoreMemoDB() {
        const input = document.getElementById("memoRestoreInput");
        input.accept = ".json";
        input.multiple = true;

        input.onchange = async function (event) {
          const files = Array.from(event.target.files || []);
          if (!files.length) return;

          // 같은 파일 다시 선택 가능하게 초기화
          input.value = "";

          try {
            hongbuDebugLog("INFO", `📂 메모 복원 시작: ${files.length}개 파일`);
            hongbuDebugToast("⏳ 메모 복원 중입니다...", 100000); // 오래 표시

            const noteRecords = [];
            const photoRecords = [];

            function dataUrlToBlob(dataUrl) {
              try {
                if (typeof dataUrl !== "string" || !dataUrl.startsWith("data:")) return null;
                const parts = dataUrl.split(",");
                if (parts.length < 2) return null;
                const header = parts[0];
                const body = parts[1];
                const mime = header.match(/data:([^;]+)/)?.[1] || "application/octet-stream";
                const byteString = atob(body);
                const ab = new ArrayBuffer(byteString.length);
                const ia = new Uint8Array(ab);
                for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                return new Blob([ab], { type: mime });
              } catch (e) {
                return null;
              }
            }

            // 1) 파일들 읽어서 전부 flatten (FileReader 사용 - iOS 호환성)
            for (const file of files) {
              hongbuDebugLog("INFO", `파일 읽는 중: ${file.name}`);

              // ✅ file.text() 대신 FileReader 사용 (iOS Safari 호환성 향상)
              const text = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(new Error(`파일 읽기 실패: ${file.name}`));
                reader.readAsText(file, "UTF-8");
              });

              try {
                const parsed = JSON.parse(text);
                if (Array.isArray(parsed)) {
                  noteRecords.push(...parsed);
                } else if (parsed && typeof parsed === "object") {
                  if (Array.isArray(parsed.apartmentNotes) || Array.isArray(parsed.photoMemos)) {
                    if (Array.isArray(parsed.apartmentNotes)) noteRecords.push(...parsed.apartmentNotes);
                    if (Array.isArray(parsed.photoMemos)) photoRecords.push(...parsed.photoMemos);
                  } else {
                    noteRecords.push(parsed);
                  }
                }
                hongbuDebugLog("INFO", `✅ ${file.name} 파싱 완료`);
              } catch (parseErr) {
                hongbuDebugLog("WARN", `파일 파싱 실패 (${file.name})`, parseErr.message);
                continue;
              }
            }

            // 2) 메모 레코드 정규화 (keyPath=id라서 id 필수)
            const normalizedNotes = noteRecords
              .filter((r) => r && typeof r === "object")
              .map((r) => {
                if (r.id === undefined || r.id === null) return null;
                return {
                  id: String(r.id),
                  memo: r.memo ? String(r.memo) : "",
                  images: Array.isArray(r.images) ? r.images : [],
                };
              })
              .filter(Boolean);

            // 3) 포토메모 정규화
            // 현재 백업 포맷에서 Blob은 JSON 직렬화 시 손실될 수 있으므로,
            // 실제 Blob 또는 data URL로 표현된 경우에만 복원 대상으로 인정한다.
            let skippedPhotoCount = 0;
            const normalizedPhotos = photoRecords
              .filter((r) => r && typeof r === "object")
              .map((r) => {
                if (r.id === undefined || r.id === null) return null;

                const lat = Number(r.lat);
                const lng = Number(r.lng);
                if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;

                const imageBlob =
                  r.imageBlob instanceof Blob ? r.imageBlob : dataUrlToBlob(r.imageDataUrl || r.imageBase64 || r.image);
                const thumbBlob =
                  r.thumbBlob instanceof Blob
                    ? r.thumbBlob
                    : dataUrlToBlob(r.thumbDataUrl || r.thumbBase64 || r.thumbnail);

                if (!(imageBlob instanceof Blob) && !(thumbBlob instanceof Blob)) {
                  skippedPhotoCount++;
                  return null;
                }

                return {
                  id: String(r.id),
                  lat,
                  lng,
                  createdAt: Number(r.createdAt) || Date.now(),
                  note: r.note ? String(r.note) : "",
                  imageBlob: imageBlob instanceof Blob ? imageBlob : thumbBlob,
                  thumbBlob: thumbBlob instanceof Blob ? thumbBlob : imageBlob,
                };
              })
              .filter(Boolean);

            hongbuDebugLog("INFO", `📋 정규화된 메모: ${normalizedNotes.length}개`);
            hongbuDebugLog("INFO", `📷 정규화된 포토메모: ${normalizedPhotos.length}개 (스킵 ${skippedPhotoCount}개)`);

            if (!normalizedNotes.length && !normalizedPhotos.length) {
              hongbuDebugLog("WARN", "❌ 복원할 유효한 메모/포토메모 데이터가 없습니다.");
              hongbuDebugToast("❌ 복원할 메모가 없습니다.", 3000);
              return;
            }

            // 4) apartmentNotes put - 배치 처리로 메모리 부담 줄임
            hongbuDebugLog("INFO", "🗃️ apartmentNotes 저장 중... (배치 처리)");
            const BATCH_SIZE = 100; // 100개씩 처리
            let totalNoteOk = 0,
              totalNoteFail = 0;
            let totalPhotoOk = 0,
              totalPhotoFail = 0;

            for (let i = 0; i < normalizedNotes.length; i += BATCH_SIZE) {
              const batch = normalizedNotes.slice(i, i + BATCH_SIZE);

              await new Promise((resolvePromise, rejectPromise) => {
                const request = indexedDB.open("hongbuMemo", HONGBU_MEMO_DB_VERSION);

                request.onsuccess = function (e) {
                  const db = e.target.result;
                  const tx = db.transaction(["apartmentNotes"], "readwrite");
                  const store = tx.objectStore("apartmentNotes");

                  let batchOk = 0,
                    batchFail = 0;

                  batch.forEach((item) => {
                    const putReq = store.put(item);
                    putReq.onsuccess = () => batchOk++;
                    putReq.onerror = (err) => {
                      batchFail++;
                      hongbuDebugLog("WARN", `put 실패: ${item.id}`, err?.target?.error?.message);
                    };
                  });

                  tx.oncomplete = () => {
                    totalNoteOk += batchOk;
                    totalNoteFail += batchFail;
                    hongbuDebugLog(
                      "INFO",
                      `메모 배치 ${Math.floor(i / BATCH_SIZE) + 1}/${Math.ceil(normalizedNotes.length / BATCH_SIZE)} 완료`,
                    );
                    db.close();
                    resolvePromise();
                  };

                  tx.onerror = (err) => {
                    hongbuDebugLog("ERR", "❌ 배치 트랜잭션 오류", err?.target?.error?.message);
                    db.close();
                    rejectPromise(err);
                  };
                };

                request.onerror = function (err) {
                  hongbuDebugLog("ERR", "❌ DB 열기 실패", err?.target?.error?.message);
                  rejectPromise(err);
                };
              });

              // 배치 간 짧은 지연으로 메모리 정리 시간 제공
              await new Promise((r) => setTimeout(r, 50));
            }

            // 5) photoMemos 복원
            if (normalizedPhotos.length > 0) {
              hongbuDebugLog("INFO", "🗃️ photoMemos 저장 중... (배치 처리)");
              for (let i = 0; i < normalizedPhotos.length; i += BATCH_SIZE) {
                const batch = normalizedPhotos.slice(i, i + BATCH_SIZE);

                await new Promise((resolvePromise, rejectPromise) => {
                  const request = indexedDB.open("hongbuMemo", HONGBU_MEMO_DB_VERSION);

                  request.onsuccess = function (e) {
                    const db = e.target.result;
                    const tx = db.transaction(["photoMemos"], "readwrite");
                    const store = tx.objectStore("photoMemos");

                    let batchOk = 0,
                      batchFail = 0;

                    batch.forEach((item) => {
                      const putReq = store.put(item);
                      putReq.onsuccess = () => batchOk++;
                      putReq.onerror = (err) => {
                        batchFail++;
                        hongbuDebugLog("WARN", `photo put 실패: ${item.id}`, err?.target?.error?.message);
                      };
                    });

                    tx.oncomplete = () => {
                      totalPhotoOk += batchOk;
                      totalPhotoFail += batchFail;
                      hongbuDebugLog(
                        "INFO",
                        `포토 배치 ${Math.floor(i / BATCH_SIZE) + 1}/${Math.ceil(normalizedPhotos.length / BATCH_SIZE)} 완료`,
                      );
                      db.close();
                      resolvePromise();
                    };

                    tx.onerror = (err) => {
                      hongbuDebugLog("ERR", "❌ 포토 트랜잭션 오류", err?.target?.error?.message);
                      db.close();
                      rejectPromise(err);
                    };
                  };

                  request.onerror = function (err) {
                    hongbuDebugLog("ERR", "❌ DB 열기 실패(photo)", err?.target?.error?.message);
                    rejectPromise(err);
                  };
                });

                await new Promise((r) => setTimeout(r, 50));
              }
            }

            hongbuDebugLog("INFO", `✅ 메모 복원 완료: 성공 ${totalNoteOk} / 실패 ${totalNoteFail}`);
            hongbuDebugLog(
              "INFO",
              `✅ 포토 복원 완료: 성공 ${totalPhotoOk} / 실패 ${totalPhotoFail} / 스킵 ${skippedPhotoCount}`,
            );
            if (skippedPhotoCount > 0) {
              hongbuDebugLog("WARN", "일부 포토메모는 이미지 데이터가 없어 복원에서 제외됨");
            }
            hongbuDebugToast(`✅ 복원 완료! 메모 ${totalNoteOk}개, 포토 ${totalPhotoOk}개`, 5000);

            hongbuDebugLog("INFO", "⏳ 2초 후 마커 새로고침...");

            // 2초 지연 후 마커 새로고침 (메모리 정리 시간 제공)
            setTimeout(() => {
              hongbuDebugLog("INFO", "🔄 마커 새로고침 시작...");
              refreshApartmentMarkers();
              try {
                window.__photoMemoIndexLoaded = false;
                loadPhotoMemoIndexOnce()
                  .then(() => {

                  })
                  .catch(console.warn);
              } catch (e) {}
              hongbuDebugLog("INFO", "🔄 마커 새로고침 완료");
            }, 2000);
          } catch (err) {
            hongbuDebugLog("ERR", "❌ 복원 중 예외", err.message);
            hongbuDebugToast("❌ 오류 발생: " + err.message, 5000);
          }
        };

        input.click();
      }

      let inguData = [];

      function updateSigunguSelect(preferredSigungu) {
        const selectedSido = document.getElementById("sidoSelect").value;
        const sigunguSet = new Set(
          inguData
            .filter((d) => d.시도 === selectedSido)
            .map((d) => d.시군구)
            .filter(Boolean),
        );
        const sigunguSelect = document.getElementById("sigunguSelect");
        sigunguSelect.innerHTML = [...sigunguSet]
          .map((s) => {
            const isSel = (preferredSigungu && s === preferredSigungu) || (!preferredSigungu && s === "종로구");
            return `<option value="${s}" ${isSel ? "selected" : ""}>${s}</option>`;
          })
          .join("");
        // ✅ 저장된 시군구가 옵션에 있으면 선택값을 강제로 맞춤
        if (preferredSigungu && [...sigunguSelect.options].some((o) => o.value === preferredSigungu)) {
          sigunguSelect.value = preferredSigungu;
        }
      }

      function updateTable() {
        const sido = document.getElementById("sidoSelect").value;
        const sigungu = document.getElementById("sigunguSelect").value;
        let filtered = inguData.filter((d) => (!sido || d.시도 === sido) && (!sigungu || d.시군구 === sigungu));

        // 정렬 적용
        if (currentSort.key) {
          filtered.sort((a, b) => {
            let valA = a[currentSort.key] || "";
            let valB = b[currentSort.key] || "";
            if (!isNaN(valA.replace(/,/g, "")) && !isNaN(valB.replace(/,/g, ""))) {
              valA = parseFloat(valA.replace(/,/g, ""));
              valB = parseFloat(valB.replace(/,/g, ""));
            }
            return currentSort.asc ? (valA > valB ? 1 : -1) : valA < valB ? 1 : -1;
          });
        }

        const tbody = document.querySelector("#inguTable tbody");
        tbody.innerHTML = filtered
          .map(
            (d) => `
    <tr>
      <td>${d.시도}</td><td>${d.시군구 || ""}</td><td>${d.읍면동 || ""}</td>
      <td style="text-align:right">${d.총인구수}</td><td style="text-align:right">${d.세대수}</td><td style="text-align:right">${d.세대당인구}</td>
    </tr>
  `,
          )
          .join("");

        updateHeaderArrows(); // 🔽 or ▲▼ 표시
      }

      function sortTable(key) {
        if (currentSort.key === key) {
          currentSort.asc = !currentSort.asc;
        } else {
          currentSort.key = key;
          currentSort.asc = true;
        }
        updateTable();
        updateHeaderArrows();
      }

      function updateHeaderArrows() {
        const headerRow = document.getElementById("inguHeaderRow");
        const headers = headerRow.querySelectorAll("th");
        const keys = ["시도", "시군구", "읍면동", "총인구수", "세대수", "세대당인구"];

        headers.forEach((th, i) => {
          const key = keys[i];
          let arrow = "⇅"; // 기본 기호
          if (currentSort.key === key) {
            arrow = currentSort.asc ? "⬆" : "⬇"; // 정렬 중인 열이면 단일 기호
          }
          th.innerHTML = `${key} ${arrow}`;
          th.onclick = () => sortTable(key); // 클릭 이벤트 유지
        });
      }

      // ▼ 필터 셀렉트 참조

      async function restoreRegionFiltersFromUIState() {
        const { sidoSel } = getFilterEls();
        if (!sidoSel) return;

        let saved = null;
        try {
          saved = await getHongbuSetting(UI_STATE_KEY);
        } catch (e) {
          saved = null;
        }
        if (!saved || typeof saved !== "object") return;

        const savedSido = (saved["sidoFilter"] ?? saved["sidoSelect"] ?? "").toString().trim();
        const savedSigunguCodes = Array.isArray(saved["sigunguSelectedCodes"]) ? saved["sigunguSelectedCodes"] : [];

        // 1) 시도 복원
        if (savedSido && Array.from(sidoSel.options).some((o) => o.value === savedSido)) {
          sidoSel.value = savedSido;
          // 시도 기준으로 시군구 체크박스 재생성
          buildRegionFiltersFromApartments();
        }

        // 2) 시군구 다중 선택 복원
        if (savedSigunguCodes.length > 0) {
          const sigunguFilter = document.getElementById("sigunguFilter");
          if (sigunguFilter) {
            selectedSigunguSet.clear();
            savedSigunguCodes.forEach((code) => {
              const cb = sigunguFilter.querySelector(`input[value="${CSS.escape(code)}"]`);
              if (cb) {
                cb.checked = true;
                selectedSigunguSet.add(code);
              }
            });
            // 전체 체크박스 상태 조정
            const allCb = sigunguFilter.querySelector('input[value="__ALL__"]');
            if (allCb) allCb.checked = selectedSigunguSet.size === 0;
            _updateSigunguDisplay();
          }
        }

        // 3) 지도/마커에 즉시 반영
        applyRegionFilterUpdate();
      }

      function getFilterEls() {
        return {
          sidoSel: document.getElementById("sidoFilter"),
        };
      }

      // ▼ 옵션 채우기 유틸
      // ▼ 옵션 채우기 유틸 (items: string | {value, label})
      function fillOptions(selectEl, items) {
        const prev = selectEl.value;
        selectEl.innerHTML = "";

        // 첫 옵션: 전체(빈값)
        const optAll = document.createElement("option");
        optAll.value = "";
        optAll.textContent = "전체";
        selectEl.appendChild(optAll);

        (items || []).forEach((item) => {
          const opt = document.createElement("option");
          if (typeof item === "string") {
            // 문자열만 온 경우: value/label 동일
            opt.value = item;
            opt.textContent = item;
          } else {
            // { value: 코드값, label: 화면표시이름 }
            opt.value = item.value;
            opt.textContent = item.label;
          }
          selectEl.appendChild(opt);
        });

        // 이전 선택 유지(가능하면)
        if ([...selectEl.options].some((o) => o.value === prev)) {
          selectEl.value = prev;
        } else {
          selectEl.value = "";
        }
      }

      // 선택된 시군구 코드 Set (비어있으면 전체)
      let selectedSigunguSet = new Set();
      let _sigunguDropdownExpanded = false;
      let _bySidoCache = new Map();

      // ▼ 시군구 체크박스 목록 업데이트
      function buildSigunguCheckboxes() {
        const sigunguFilter = document.getElementById("sigunguFilter");
        if (!sigunguFilter) return;
        sigunguFilter.innerHTML = "";
        selectedSigunguSet.clear();

        const sidoSel = document.getElementById("sidoFilter");
        const selectedSidoCode = (sidoSel ? sidoSel.value : "").trim();

        if (!selectedSidoCode || !_bySidoCache.has(selectedSidoCode)) {
          const msgDiv = document.createElement("div");
          msgDiv.style.cssText = "color:#999;padding:4px 0;white-space:nowrap;font-size:13px;";
          msgDiv.textContent = "시도를 선택하세요";
          sigunguFilter.appendChild(msgDiv);
          _updateSigunguDisplay();
          return;
        }

        const sigunguMap = _bySidoCache.get(selectedSidoCode).sigungu;
        const sigunguArray = Array.from(sigunguMap.entries())
          .map(([code, name]) => ({ code, name }))
          .sort((a, b) => a.name.localeCompare(b.name, "ko"));

        // 전체 체크박스
        const allLabel = document.createElement("label");
        allLabel.style.cssText = "display:block;padding:2px 0;cursor:pointer;margin:0;line-height:1.4;font-size:13px;";
        allLabel.innerHTML = `<input type="checkbox" value="__ALL__" style="accent-color:blue;"> 전체`;
        sigunguFilter.appendChild(allLabel);
        const allCheckbox = allLabel.querySelector("input");

        allCheckbox.addEventListener("change", function () {
          selectedSigunguSet.clear();
          sigunguFilter.querySelectorAll('input:not([value="__ALL__"])').forEach((cb) => {
            cb.checked = false;
          });
          allCheckbox.checked = true;
          _updateSigunguDisplay();
          window.__suppressAutoFocusRegion = false; // 사용자 직접 선택 → 지역 포커싱 허용
          applyRegionFilterUpdate();
        });

        // 개별 시군구 체크박스
        sigunguArray.forEach(({ code, name }) => {
          const label = document.createElement("label");
          label.style.cssText = "display:block;padding:2px 0;cursor:pointer;margin:0;line-height:1.4;font-size:13px;";
          label.innerHTML = `<input type="checkbox" value="${code}" style="accent-color:orange;"> ${name}`;
          sigunguFilter.appendChild(label);
          const cb = label.querySelector("input");

          cb.addEventListener("change", function () {
            if (this.checked) selectedSigunguSet.add(code);
            else selectedSigunguSet.delete(code);

            const allCb = sigunguFilter.querySelector('input[value="__ALL__"]');
            if (selectedSigunguSet.size === sigunguArray.length) {
              selectedSigunguSet.clear();
              allCb.checked = true;
              sigunguFilter.querySelectorAll('input:not([value="__ALL__"])').forEach((c) => {
                c.checked = false;
              });
            } else if (selectedSigunguSet.size === 0) {
              allCb.checked = true;
              sigunguFilter.querySelectorAll('input:not([value="__ALL__"])').forEach((c) => {
                c.checked = false;
              });
            } else {
              allCb.checked = false;
            }
            _updateSigunguDisplay();
            saveUIStateDebounced();
            window.__suppressAutoFocusRegion = false; // 사용자 직접 선택 → 지역 포커싱 허용
            applyRegionFilterUpdate();
          });
        });

        // 초기: 전체 체크
        allCheckbox.checked = true;
        _updateSigunguDisplay();
      }

      function _updateSigunguDisplay() {
        const txt = document.getElementById("sigunguDisplayText");
        if (!txt) return;
        if (selectedSigunguSet.size === 0) {
          txt.textContent = "전체";
        } else {
          txt.textContent = selectedSigunguSet.size + "개 선택";
        }
      }

      // ▼ 시도/시군구 옵션 구성 (apartmentData 기반)
      function buildRegionFiltersFromApartments() {
        const sidoSel = document.getElementById("sidoFilter");
        if (!sidoSel || !Array.isArray(apartmentData)) return;

        // 시도코드 -> { name: 시도명, sigungu: Map(시군구코드 -> 시군구명) }
        _bySidoCache = new Map();
        apartmentData.forEach((a) => {
          const sc = String(a.sido || "").trim();
          const sn = String(a.sidoNm || "").trim();
          const gc = String(a.sigungu || "").trim();
          const gn = String(a.sigunguNm || "").trim();
          if (!sc) return;
          if (!_bySidoCache.has(sc)) _bySidoCache.set(sc, { name: sn || sc, sigungu: new Map() });
          if (gc) _bySidoCache.get(sc).sigungu.set(gc, gn || gc);
        });

        // 시도 옵션: value=코드, label=이름
        const sidoItems = Array.from(_bySidoCache.entries())
          .map(([code, obj]) => ({ value: code, label: obj.name }))
          .sort((a, b) => a.label.localeCompare(b.label, "ko"));
        fillOptions(sidoSel, sidoItems);

        // 시군구 체크박스 생성
        buildSigunguCheckboxes();
      }

      // ▼ 필터 변경 이벤트
      function applyRegionFilterUpdate() {
        // 시도/시군구 필터가 바뀌면: 기존 마커(캐시)를 즉시 제거하고, 현재 bounds로 다시 그림
        if (window.apartmentMarkers) {
          Object.values(window.apartmentMarkers).forEach((m) => {
            try {
              if (m && typeof m.setMap === "function") m.setMap(null);
            } catch (e) {}
          });
          window.apartmentMarkers = {};
        }
        try {
          if (window.markerCluster && typeof window.markerCluster.setMarkers === "function") {
            window.markerCluster.setMarkers([]);
          }
        } catch (e) {}

        // 선택된 지역으로 지도 이동(가능하면)
        // ✅ mapPosition 복원 직후(초기 로딩)에는 region filter가 센터를 덮어쓰지 않게 보호
        try {
          if (!window.__suppressAutoFocusRegion) focusMapToSelectedRegion(15);
        } catch (e) {}

        if (window.map && window.map.getBounds) {
          updateMarkers(window.map.getBounds());
        }
      }

      // ▼ 필터 변경 이벤트 (1회만 호출할 것)
      function attachRegionFilterEvents() {
        if (window.__regionFilterEventsAttached) return;
        window.__regionFilterEventsAttached = true;

        const { sidoSel } = getFilterEls();
        if (!sidoSel) return;

        // 시도 변경시: 시군구 체크박스 재구성 + 즉시 반영
        sidoSel.addEventListener("change", (e) => {
          if (e && e.isTrusted) window.__suppressAutoFocusRegion = false;
          buildSigunguCheckboxes();
          // 드롭다운 닫기
          _sigunguDropdownExpanded = false;
          document.getElementById("sigunguFilter")?.classList.remove("expanded");
          const btn = document.getElementById("sigunguToggleBtn");
          if (btn) btn.textContent = "▼";
          applyRegionFilterUpdate();
        });

        // 시군구 드롭다운 토글
        // stopPropagation 없이 wrapper.contains() 로만 제어 → 상태 꼬임 방지
        const display = document.getElementById("sigunguFilterDisplay");
        if (display) {
          display.addEventListener("click", function () {
            const sf = document.getElementById("sigunguFilter");
            const btn = document.getElementById("sigunguToggleBtn");
            if (!sf || !btn) return;
            _sigunguDropdownExpanded = !_sigunguDropdownExpanded;
            sf.classList.toggle("expanded", _sigunguDropdownExpanded);
            btn.textContent = _sigunguDropdownExpanded ? "▲" : "▼";
          });
        }

        // 외부 클릭 시 닫기 (wrapper 밖이면 닫음, 안이면 무시)
        document.addEventListener("click", function (e) {
          const wrapper = document.getElementById("sigunguFilterWrapper");
          if (!wrapper || wrapper.contains(e.target)) return;
          _sigunguDropdownExpanded = false;
          document.getElementById("sigunguFilter")?.classList.remove("expanded");
          const btn = document.getElementById("sigunguToggleBtn");
          if (btn) btn.textContent = "▼";
        });
      }

      function getFilterEls() {
        return {
          sidoSel: document.getElementById("sidoFilter"),
        };
      }

      // ✅ 선택된 시군구/시도의 "첫 번째 아파트" 좌표로 지도 이동
      function focusMapToSelectedRegion(zoomLevel = 15) {
        if (!window.map || !Array.isArray(apartmentData)) return;
        const { sidoSel } = getFilterEls();
        const siCode = (sidoSel?.value || "").trim();

        let target = null;
        // 시군구 단일 선택일 때만 해당 시군구로 이동 (다중 선택 시 이동 안 함)
        if (selectedSigunguSet.size === 1) {
          const firstCode = [...selectedSigunguSet][0];
          target = apartmentData.find((a) => String(a.sigungu).trim() === firstCode);
        }
        // 시군구 미선택(전체)이고 시도만 선택된 경우 시도로 이동
        if (!target && selectedSigunguSet.size === 0 && siCode) {
          target = apartmentData.find((a) => String(a.sido).trim() === siCode);
        }
        if (!target) return;

        const center = new naver.maps.LatLng(parseFloat(target.lat), parseFloat(target.lng));
        window.map.setCenter(center);
        if (window.map.getZoom() < zoomLevel) {
          window.map.setZoom(zoomLevel);
        }
      }
      document.getElementById("unitFilter").addEventListener("input", () => updateMarkers(window.map.getBounds()));
    </script>
    <script>
      // 🔹 네이티브 전체화면은 전혀 쓰지 않고,
      //    pseudoFullscreenActive + toggleFullscreen() 조합만 사용
      let pseudoFullscreenActive = false;

      function injectMaximizeButton() {
        const mapEl = document.getElementById("map");
        if (!mapEl) return;

        /* 1) 전체화면(최대화) 버튼 */
        if (!mapEl.querySelector("#mapMaxBtn")) {
          const maxBtn = document.createElement("button");
          maxBtn.id = "mapMaxBtn";
          maxBtn.className = "map-float-btn";
          maxBtn.title = "전체화면";
          maxBtn.setAttribute("aria-label", "지도 전체화면");
          // 네이티브는 안 쓰므로 pseudoFullscreenActive만 기준
          maxBtn.textContent = "⛶";
          mapEl.appendChild(maxBtn);

          maxBtn.addEventListener("click", () => {
            // 이미 가짜 전체화면이면 → 해제
            if (pseudoFullscreenActive) {
              if (typeof toggleFullscreen === "function") {
                try {
                  toggleFullscreen();
                } catch (e) {
                  console.warn(e);
                }
              }
              onExitPseudoFullscreen();
              return;
            }

            // 평상시 → 가짜 전체화면 진입
            if (typeof toggleFullscreen === "function") {
              try {
                toggleFullscreen();
              } catch (e) {
                console.warn(e);
              }
            }
            onEnterPseudoFullscreen();
          });
        }

        // ✅ 직전 전체화면 상태 복원 (앱 전환/새로고침 대비)
        // injectMaximizeButton()은 여러 번 불릴 수 있으므로 1회만 수행
        if (!window.__hongbuFullscreenRestored) {
          window.__hongbuFullscreenRestored = true;
          try {
            getHongbuSetting(MAP_FULLSCREEN_KEY)
              .then((v) => {
                if (v === true && !pseudoFullscreenActive) {
                  // (선택) 기존 로직 유지: toggleFullscreen이 있다면 함께 호출
                  if (typeof toggleFullscreen === "function") {
                    try {
                      toggleFullscreen();
                    } catch (e) {
                      console.warn(e);
                    }
                  }
                  onEnterPseudoFullscreen();
                }
              })
              .catch(console.warn);
          } catch (e) {
            console.warn(e);
          }
        }

        /* 2) 현재 위치 버튼 */
        if (!mapEl.querySelector("#mapLocateBtn")) {
          const locBtn = document.createElement("button");
          locBtn.id = "mapLocateBtn";
          locBtn.className = "map-locate-btn";
          locBtn.title = "현재 위치";
          locBtn.setAttribute("aria-label", "현재 위치 찾기");
          locBtn.textContent = "📍";

          mapEl.appendChild(locBtn);
          locBtn.addEventListener("click", () => {
            if (typeof clickLocationButton === "function") clickLocationButton();
          });
        }

        /* 2-1) ✅ 사진 메모 모드(카메라) 버튼: 누르고 → 지도 클릭으로 위치 선택 */
        if (!mapEl.querySelector("#mapPhotoBtn")) {
          const camBtn = document.createElement("button");
          camBtn.id = "mapPhotoBtn";
          camBtn.className = "map-photo-btn map-locate-btn";
          camBtn.title = "사진 메모 추가";
          camBtn.setAttribute("aria-label", "사진 메모 추가");
          camBtn.innerHTML = '<span class="map-photo-icon" aria-hidden="true">📷</span>';
          mapEl.appendChild(camBtn);
          const onPhotoBtnPress = async (ev) => {
            try {
              ev?.preventDefault?.();
              ev?.stopPropagation?.();
            } catch (e) {}

            const now = Date.now();
            if (camBtn.__photoMemoPressAt && now - camBtn.__photoMemoPressAt < 350) return;
            camBtn.__photoMemoPressAt = now;

            if (__shouldCancelPhotoMemoAddFlow()) {
              __cancelPhotoMemoAddFlow();
              return;
            }

            try {
              await loadPhotoMemosOnce();
            } catch (e) {}
            setPhotoMemoAddMode(true);
          };

          camBtn.addEventListener("click", onPhotoBtnPress);
          camBtn.addEventListener("touchend", onPhotoBtnPress, { passive: false });
          camBtn.addEventListener("pointerup", (ev) => {
            if (ev.pointerType === "touch") onPhotoBtnPress(ev);
          });
        }

        /* 3) 위치 추적 중지 버튼 */
        if (!mapEl.querySelector("#mapStopBtn")) {
          const stopBtn = document.createElement("button");
          stopBtn.id = "mapStopBtn";
          stopBtn.className = "map-stoptrack-btn";
          stopBtn.title = "위치 추적 중지";
          stopBtn.setAttribute("aria-label", "위치 추적 중지");
          stopBtn.textContent = "🛑";

          mapEl.appendChild(stopBtn);
          stopBtn.addEventListener("click", () => {
            if (typeof stopTracking === "function") stopTracking();
          });
        }
      }

      // ✅ 가짜 전체화면 진입/해제 시 UI 상태만 관리
      function onEnterPseudoFullscreen() {
        pseudoFullscreenActive = true;
        document.body.classList.add("fullscreen-active"); // 이미 CSS에서 이 클래스를 쓰고 있으므로 유지
        const btn = document.getElementById("mapMaxBtn");
        if (btn) btn.textContent = "⛶";
        resizeMapToContainer();

        // ✅ 전체화면 상태 저장(앱 전환/새로고침 복원용)
        try {
          setHongbuSetting(MAP_FULLSCREEN_KEY, true);
        } catch (e) {
          console.warn(e);
        }
      }

      function onExitPseudoFullscreen() {
        pseudoFullscreenActive = false;
        document.body.classList.remove("fullscreen-active");
        const btn = document.getElementById("mapMaxBtn");
        if (btn) btn.textContent = "⛶";
        resizeMapToContainer();

        // ✅ 전체화면 상태 저장(앱 전환/새로고침 복원용)
        try {
          setHongbuSetting(MAP_FULLSCREEN_KEY, false);
        } catch (e) {
          console.warn(e);
        }
      }

      function resizeMapToContainer() {
        const mapEl = document.getElementById("map");
        if (mapEl && window.map) {
          // inline style로 이상하게 커지는 것 방지
          mapEl.style.height = "calc(100svh - 150px)";
          mapEl.style.maxHeight = "calc(100svh - 150px)";

          setTimeout(() => {
            try {
              window.map.setSize(new naver.maps.Size(mapEl.clientWidth, mapEl.clientHeight));
            } catch (e) {
              console.warn(e);
            }
          }, 150);
        }
      }

      window.addEventListener("orientationchange", resizeMapToContainer);
      window.addEventListener("resize", resizeMapToContainer);

      function onEnterPseudoFullscreen() {
        pseudoFullscreenActive = true;
        document.body.classList.add("fullscreen-active");
        const btn = document.getElementById("mapMaxBtn");
        if (btn) btn.textContent = "⛶";
        resizeMapToContainer();

        // ✅ 전체화면 상태 저장(앱 전환/새로고침 복원용)
        try {
          setHongbuSetting(MAP_FULLSCREEN_KEY, true);
        } catch (e) {
          console.warn(e);
        }
      }
      function onExitPseudoFullscreen() {
        pseudoFullscreenActive = false;
        document.body.classList.remove("fullscreen-active");
        const btn = document.getElementById("mapMaxBtn");
        if (btn) btn.textContent = "⛶";
        resizeMapToContainer();

        // ✅ 전체화면 상태 저장(앱 전환/새로고침 복원용)
        try {
          setHongbuSetting(MAP_FULLSCREEN_KEY, false);
        } catch (e) {
          console.warn(e);
        }
      }
      function resizeMapToContainer() {
        const mapEl = document.getElementById("map");
        if (mapEl && window.map) {
          // inline style로 커지는 걸 방지
          mapEl.style.height = "calc(100svh - 150px)";
          mapEl.style.maxHeight = "calc(100svh - 150px)";

          setTimeout(() => {
            try {
              window.map.setSize(new naver.maps.Size(mapEl.clientWidth, mapEl.clientHeight));
            } catch (e) {}
          }, 150);
        }
      }

      window.addEventListener("orientationchange", resizeMapToContainer);
      window.addEventListener("resize", resizeMapToContainer);

      // ===== EMD label position blend: polylabel + centroid (override) =====
      function _emd_lerp(a, b, t) {
        return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
      }
      function _emd_ringCentroidLngLat(ring) {
        let area = 0,
          cx = 0,
          cy = 0;
        const n = ring.length;
        if (n < 3) return null;
        for (let i = 0; i < n; i++) {
          const [x1, y1] = ring[i];
          const [x2, y2] = ring[(i + 1) % n];
          const a = x1 * y2 - x2 * y1;
          area += a;
          cx += (x1 + x2) * a;
          cy += (y1 + y2) * a;
        }
        area *= 0.5;
        if (Math.abs(area) < 1e-12) return null;
        return [cx / (6 * area), cy / (6 * area)];
      }

      // New function used by redraw (same name as before to override)
      function getLabelLatLngByPolylabel(geometry, bbox) {
        const polys = geometry.type === "MultiPolygon" ? geometry.coordinates : [geometry.coordinates];
        let bestPoly = polys[0],
          bestArea = -1;
        for (const p of polys) {
          const ring = p[0];
          let a = 0;
          for (let i = 0; i < ring.length; i++) {
            const [x1, y1] = ring[i],
              [x2, y2] = ring[(i + 1) % ring.length];
            a += x1 * y2 - x2 * y1;
          }
          a = Math.abs(a * 0.5);
          if (a > bestArea) {
            bestArea = a;
            bestPoly = p;
          }
        }
        const p = _emd_polylabel(bestPoly, 1e-5);
        const c = _emd_ringCentroidLngLat(bestPoly[0]);
        let lnglat = p;
        if (p && c) {
          const t = 0.35; // blend factor
          lnglat = _emd_lerp(p, c, t);
        }
        if (!lnglat && bbox) {
          const [minLng, minLat, maxLng, maxLat] = bbox;
          lnglat = [(minLng + maxLng) / 2, (minLat + maxLat) / 2];
        }
        if (!lnglat) return null;
        return new naver.maps.LatLng(lnglat[1], lnglat[0]);
      }
