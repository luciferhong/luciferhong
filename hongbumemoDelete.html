<!doctype html>
<html lang="ko">
<head>
  <meta name="robots" content="noindex, nofollow">
  <meta name="Yeti" content="noindex, nofollow">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>hongbuMemo DB 존재 여부 확인</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      margin: 20px;
    }
    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
      font-weight: 700;
    }
    pre {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: #0b0b0b;
      color: #e5e5e5;
      border: 1px solid #333;
      white-space: pre-wrap;
    }
    .ok { color: #7CFF7C; }
    .warn { color: #FFB020; }
    .err { color: #FF6B6B; }
  </style>
</head>
<body>

<h2>hongbuMemo IndexedDB 존재 여부 확인</h2>

<button id="btnCheck">🔍 hongbuMemo 검사</button>

<pre id="result">(검사 전)</pre>

<script>
(() => {
  const DB_NAME = "hongbuMemo";
  const $out = document.getElementById("result");
  const $btn = document.getElementById("btnCheck");

  function log(msg, cls="") {
    $out.innerHTML += (cls ? `<span class="${cls}">${msg}</span>` : msg) + "\n";
    console.log(msg);
  }

  async function checkHongbuMemo() {
    $out.textContent = "";
    log(`▶ 검사 시작: ${DB_NAME}\n`);

    // iOS에서는 indexedDB.databases() 거의 미지원
    if (typeof indexedDB.databases === "function") {
      try {
        const dbs = await indexedDB.databases();
        const found = dbs.find(d => d.name === DB_NAME);
        if (found) {
          log(`✅ indexedDB.databases(): ${DB_NAME} 발견 (ver=${found.version})`, "ok");
        } else {
          log(`ℹ️ indexedDB.databases(): ${DB_NAME} 없음`, "warn");
        }
      } catch (e) {
        log(`ℹ️ indexedDB.databases() 실패 (iOS일 가능성)`, "warn");
      }
    } else {
      log(`ℹ️ indexedDB.databases() 미지원 (iOS WebKit)`, "warn");
    }

    // 🔑 iOS에서 가장 신뢰 가능한 방법: open + onupgradeneeded 여부
    await new Promise(resolve => {
      const req = indexedDB.open(DB_NAME);
      let existed = true;

      req.onupgradeneeded = () => {
        existed = false;
        log(`❌ ${DB_NAME} 없음 → onupgradeneeded 발생(새 DB 생성 시도)`, "err");
        try { req.transaction.abort(); } catch {}
      };

      req.onsuccess = () => {
        const db = req.result;
        if (existed) {
          log(`✅ ${DB_NAME} 존재함`, "ok");
          log(`   - version: ${db.version}`);
          log(`   - objectStores: [${Array.from(db.objectStoreNames).join(", ") || "(없음)"}]`);
        } else {
          log(`❌ ${DB_NAME} 실제로는 없음(생성 시도만 됨)`, "err");
        }
        db.close();
        resolve();
      };

      req.onerror = () => {
        log(`❌ open 실패: ${req.error?.message || req.error}`, "err");
        resolve();
      };
    });

    log(`\n▶ 검사 완료`);
  }

  $btn.addEventListener("click", checkHongbuMemo);
})();
</script>

</body>
</html>
