<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>[루시퍼홍] 시세 리더</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --primary-light: #ede9fe;
      --accent: #0ea5e9;
      --success: #10b981;
      --danger: #ef4444;
      --warn: #f59e0b;
      --bg: #f1f5f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      padding: 16px;
      max-width: 960px;
      margin: 0 auto;
      color: var(--text);
    }

    .app-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
    }
    .app-header .icon { font-size: 28px; }
    .app-header h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .app-header p  { margin: 2px 0 0; font-size: 12px; opacity: 0.85; }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    input, select, button {
      font-size: 15px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      padding: 9px 12px;
      outline: none;
      transition: border-color .18s, box-shadow .18s;
      background: var(--surface);
      color: var(--text);
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }
    input[type=text] { flex: 1; min-width: 220px; }

    button {
      cursor: pointer;
      font-weight: 600;
      border: none;
      white-space: nowrap;
      transition: background .18s, transform .1s, box-shadow .18s;
    }
    button:active { transform: scale(.97); }

    #btnLoad {
      background: var(--primary);
      color: #fff;
      padding: 9px 18px;
      box-shadow: 0 2px 8px rgba(79,70,229,.3);
    }
    #btnLoad:hover { background: var(--primary-dark); }

    #btnSpeakText {
      background: linear-gradient(135deg,#7c3aed,#4f46e5);
      color: #fff;
      box-shadow: 0 2px 8px rgba(124,58,237,.35);
    }
    #btnSpeakText:hover { filter: brightness(1.1); }

    #btnSpeakSelected {
      background: linear-gradient(135deg, var(--success), #059669);
      color: #fff;
      box-shadow: 0 2px 8px rgba(16,185,129,.35);
    }
    #btnSpeakSelected:hover { filter: brightness(1.1); }

    #btnPause {
      background: linear-gradient(135deg, var(--warn), #d97706);
      color: #fff;
      box-shadow: 0 2px 8px rgba(245,158,11,.3);
    }
    #btnPause:hover { filter: brightness(1.1); }

    #btnResume {
      background: linear-gradient(135deg, var(--accent), #0284c7);
      color: #fff;
      box-shadow: 0 2px 8px rgba(14,165,233,.3);
    }
    #btnResume:hover { filter: brightness(1.1); }

    #btnStop {
      background: linear-gradient(135deg, var(--danger), #dc2626);
      color: #fff;
      box-shadow: 0 2px 8px rgba(239,68,68,.3);
    }
    #btnStop:hover { filter: brightness(1.1); }

    #btnApplyFilter {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 8px rgba(79,70,229,.25);
    }
    #btnApplyFilter:hover { background: var(--primary-dark); }

    #btnClearFilter {
      background: #f1f5f9;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    #btnClearFilter:hover { background: #e2e8f0; }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .filter-group {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: nowrap;
    }
    .filter-group label {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 600;
      min-width: fit-content;
    }
    .filter-group select { flex: 1; min-width: 0; font-size: 14px; padding: 8px 8px; }
    .filter-group input[type=number] { flex: 1; min-width: 0; width: 0; font-size: 14px; padding: 8px 8px; }
    .filter-group .sep { font-size: 13px; color: var(--muted); }
    .filter-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .filter-actions button { flex: 1; min-width: 80px; }

    .chk-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      background: var(--primary-light);
      border-radius: 8px;
      padding: 7px 12px;
      border: 1.5px solid #c4b5fd;
    }
    .chk-label input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--primary); }

    .stat-badge {
      display: inline-flex;
      align-items: center;
      background: var(--primary-light);
      color: var(--primary-dark);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 700;
    }

    .box {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .list { max-height: 400px; overflow: auto; padding: 4px 0; }
    .item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 8px;
      border-radius: 8px;
      border-bottom: 1px solid #f1f5f9;
      transition: background .15s;
    }
    .item:last-child { border-bottom: none; }
    .item:hover { background: #f8faff; }
    .item input[type=checkbox] { margin-top: 3px; transform: scale(1.2); accent-color: var(--primary); }
    .item .txt { white-space: pre-wrap; word-break: break-word; line-height: 1.55; font-size: 14px; }

    .small { font-size: 13px; color: var(--muted); font-weight: 600; }
    .eok-label { font-size: 13px; color: var(--primary); font-weight: 700; }
    #loadStatus { font-size: 13px; font-weight: 600; }
    #filterStat { color: var(--primary); }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <div class="app-header">
    <span class="icon">🏠</span>
    <div>
      <h2>[루시퍼홍] 시세 리더</h2>
    </div>
  </div>

  <div class="card">
    <div class="section-label">📋 구글시트 연결</div>
    <div class="row">
      <input id="sheetUrl" type="text" placeholder="구글시트 URL (…/d/시트ID/edit#gid=…)" />
      <button id="btnLoad">불러오기</button>
    </div>
    <div class="row" style="margin-top:8px;">
      <label class="small">최대 항목 수</label>
      <select id="maxSel">
        <option value="20">20개</option>
        <option value="40">40개</option>
        <option value="60">60개</option>
        <option value="100">100개</option>
        <option value="200">200개</option>
        <option value="500" selected>500개</option>
      </select>
      <span id="loadStatus"></span>
    </div>
  </div>

  <div class="card">
    <div class="section-label">🔍 필터</div>
    <div class="filter-row">
      <div class="filter-group">
        <label>도시</label>
        <select id="filterCity">
          <option value="">전체</option>
          <option value="수도권">수도권</option>
          <option value="광역시">광역시</option>
          <option value="50만↑도시">50만↑도시</option>
        </select>
        <label>시군구</label>
        <select id="filterRegion"><option value="">전체</option></select>
      </div>
      <div class="filter-group">
        <label>전용(㎡)</label>
        <input type="number" id="filterAreaMin" placeholder="최소" min="0" step="1">
        <span class="sep">~</span>
        <input type="number" id="filterAreaMax" placeholder="최대" min="0" step="1">
      </div>
      <div class="filter-group">
        <label>매매가(억)</label>
        <input type="number" id="filterMin" placeholder="최소" min="0" step="0.1">
        <span class="sep">~</span>
        <input type="number" id="filterMax" placeholder="최대" min="0" step="0.1">
      </div>
      <div class="filter-actions">
        <button id="btnApplyFilter">필터 적용</button>
        <button id="btnClearFilter">초기화</button>
        <label class="chk-label"><input type="checkbox" id="chkRent"> 전세가 포함</label>
        <span id="filterStat" class="eok-label"></span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">🔊 음성 설정 &amp; 재생</div>
    <div class="row" style="margin-bottom:10px;">
      <label class="small">음성</label>
      <select id="voiceSel" style="max-width:240px;"></select>
      <label class="small">속도</label>
      <select id="rateSel">
        <option value="0.8">0.8×</option>
        <option value="0.9">0.9×</option>
        <option value="1.0" selected>1.0×</option>
        <option value="1.1">1.1×</option>
        <option value="1.2">1.2×</option>
        <option value="1.5">1.5×</option>
      </select>
    </div>

    <div class="row">
      <button id="btnSpeakText">🎙 텍스트 읽기</button>
      <button id="btnSpeakSelected">▶ 처음부터</button>
      <button id="btnPause">⏸ 일시정지</button>
      <button id="btnResume">▶ 재개</button>
      <button id="btnStop">⏹ 정지</button>
    </div>
  </div>

  <div class="box">
    <div class="row" style="margin:0 0 10px 0;">
      <span class="stat-badge" id="stat">0개</span>
    </div>
    <div class="list" id="list"></div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);

  // ----------------- localStorage: URL 복원 -----------------
  const LS_KEY = "sheetReaderUrl";
  const savedUrl = localStorage.getItem(LS_KEY);
  if (savedUrl) $('sheetUrl').value = savedUrl;

  // ----------------- Web Speech TTS -----------------

  // =========================================================
  const voiceSel = $("voiceSel");
  let wsStopped  = false;
  let wsPaused   = false;

  function bestKoVoice(voices) {
    const ko = voices.filter(v => (v.lang||"").toLowerCase().startsWith("ko"));
    const pool = ko.length ? ko : voices;
    // 우선순위: Enhanced(향상됨/Siri급) > Online > Google > 기타
    return pool.find(v => /enhanced/i.test(v.name))
        || pool.find(v => /online/i.test(v.name))
        || pool.find(v => /google/i.test(v.name))
        || pool[0]
        || null;
  }

  function loadVoices() {
    const voices = speechSynthesis.getVoices();
    if (!voices.length) return;
    const prev = voiceSel.value;
    voiceSel.innerHTML = "";

    const ko = voices.filter(v => {
      if (!(v.lang||"").toLowerCase().startsWith("ko")) return false;
      const name = v.name.toLowerCase();
      if (name.includes("india") || name.includes("konkani") || name.includes("kokani") || name.includes("코카니")) return false;
      return true;
    });

    const best = bestKoVoice(voices);
    let selected = false;

    for (const v of ko) {
      const opt = document.createElement("option");
      opt.value = v.name;
      opt.textContent = `${v.name} (${v.lang})`;
      if (prev ? v.name === prev : (best && v.name === best.name)) {
        opt.selected = true;
        selected = true;
      }
      voiceSel.appendChild(opt);
    }

    if (!selected && best) {
      const found = [...voiceSel.options].find(o => o.value === best.name);
      if (found) found.selected = true;
    }
  }
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

  // ----------------- Wake Lock -----------------
  let wakeLock = null;
  async function acquireWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    document.addEventListener('visibilitychange', reacquireWakeLock);
  }
  async function reacquireWakeLock() {
    if (document.visibilityState === 'visible' && !wsStopped) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    }
  }
  function releaseWakeLock() {
    document.removeEventListener('visibilitychange', reacquireWakeLock);
    if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
  }

  function speakQueue(queue, voice, rate) {
    if (wsStopped) { releaseWakeLock(); return; }
    if (!queue.length) { releaseWakeLock(); return; }
    const text = queue.shift();
    const u = new SpeechSynthesisUtterance(text);
    u.lang  = "ko-KR";
    if (voice) u.voice = voice;
    u.rate  = rate;
    u.pitch = 1.0;
    u.volume = 1.0;
    // iOS는 onend 직후 즉시 다음 utterance를 이어붙이는 버그 → 딜레이로 줄 사이 끊김 확보
    const delay = isIOS ? 400 : 0;
    u.onend  = () => { if (!wsStopped && !wsPaused) setTimeout(() => speakQueue(queue, voice, rate), delay); };
    u.onerror = () => { if (!wsStopped) setTimeout(() => speakQueue(queue, voice, rate), delay); };
    speechSynthesis.speak(u);
  }

  function speakLines(lines) {
    if (!lines.length) return;
    speechSynthesis.cancel();
    wsStopped = false;
    wsPaused  = false;
    acquireWakeLock();
    const voices = speechSynthesis.getVoices();
    const voice  = voices.find(v => v.name === voiceSel.value) || null;
    const rate   = Number($('rateSel').value || 1.0);
    speakQueue(lines.slice(), voice, rate);
  }

  $("btnPause").onclick  = () => { wsPaused = true;  speechSynthesis.pause(); };
  $("btnResume").onclick = () => { wsPaused = false; speechSynthesis.resume(); };
  $("btnStop").onclick   = () => { wsStopped = true; speechSynthesis.cancel(); releaseWakeLock(); };

  $("btnSpeakText").onclick = () => {
    if (!currentLines.length) return alert("불러온 항목이 없어요.");
    speakLines(currentLines.map(l => l.speak));
  };

  // ----------------- Sheets URL -> CSV -----------------
  function parseSheetUrl(url) {
    const m = url.match(/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
    if (!m) throw new Error("시트 ID를 찾을 수 없어요. (spreadsheets/d/...)");
    const sheetId = m[1];
    let gid = "0";
    const gidMatch = url.match(/[#&?]gid=(\d+)/);
    if (gidMatch) gid = gidMatch[1];
    return { sheetId, gid };
  }
  const TARGET_SHEET = "세로버전";
  function csvExportUrl(sheetId, gid) {
    return `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(TARGET_SHEET)}`;
  }

  // ----------------- CSV parser -----------------
  function parseCSV(text) {
    const rows = [];
    let row = [], cur = "", inQuotes = false;
    for (let i=0; i<text.length; i++) {
      const c = text[i];
      const n = text[i+1];
      if (c === '"') {
        if (inQuotes && n === '"') { cur += '"'; i++; }
        else { inQuotes = !inQuotes; }
      } else if (c === ',' && !inQuotes) {
        row.push(cur); cur = "";
      } else if ((c === '\n' || c === '\r') && !inQuotes) {
        if (c === '\r' && n === '\n') i++;
        row.push(cur); rows.push(row);
        row = []; cur = "";
      } else {
        cur += c;
      }
    }
    if (cur.length || row.length) { row.push(cur); rows.push(row); }
    return rows.filter(r => r.some(cell => (cell||"").trim() !== ""));
  }

  // ----------------- Value format helpers -----------------
  function toIntSafe(x) {
    if (x == null) return null;
    const s = String(x).replace(/[, ]/g, "").trim();
    if (!s) return null;
    const n = Number(s);
    return Number.isFinite(n) ? Math.trunc(n) : null;
  }

  function formatMoneyManwonToEok(x) {
    const s0 = String(x || "").trim();
    if (!s0 || s0.toUpperCase() === "N") return "";
    if (/%$/.test(s0)) return s0.replace(/\s+/g, "");
    const n = toIntSafe(s0);
    if (n == null) return s0;

    const eok = Math.floor(n / 10000);
    const manwonR = n % 10000;
    const cheon = Math.floor(manwonR / 1000);

    if (eok <= 0) {
      if (cheon > 0) return `${cheon}천`;
      return `${Math.floor(manwonR/100)}백`;
    }
    if (cheon > 0) return `${eok}억${cheon}천`;
    return `${eok}억`;
  }

  // ----------------- Your sheet -> speak lines -----------------
  function detectHeaderRow(rows) {
    const limit = Math.min(rows.length, 5);
    for (let i = 0; i < limit; i++) {
      const joined = rows[i].join(",");
      if (joined.includes("단지명") || joined.includes("매매가")) return i;
    }
    return 0;
  }

  function rowsToSpeakableLines(rows, opts) {
    const { minEok=null, maxEok=null, areaMin=null, areaMax=null, city="", regionFilter="", showRent=true } = opts || {};
    if (rows.length < 2) return [];
    const hi = detectHeaderRow(rows);
    const header = rows[hi].map(h => (h||"").trim());

    const findIdx = (candidates) => {
      for (let i=0; i<header.length; i++) {
        const h = header[i] || "";
        for (const c of candidates) if (h === c) return i;
      }
      for (let i=0; i<header.length; i++) {
        const h = header[i] || "";
        for (const c of candidates) if (h.includes(c)) return i;
      }
      return -1;
    };

    const iCity   = findIdx(["도시"]);
    const iRegion = findIdx(["지역(시군구)"]);
    const iName   = findIdx(["단지명"]);
    const iAreaEx = findIdx(["전용 면적","전용면적"]);
    const iSale   = findIdx(["매매가","매매"]);
    const iRent   = findIdx(["전세가","전세"]);

    const maxN = Number($("maxSel").value || 500);

    const minManwon = (minEok != null) ? Math.round(minEok * 10000) : null;
    const maxManwon = (maxEok != null) ? Math.round(maxEok * 10000) : null;

    const items = [];
    for (const r of rows.slice(hi + 1)) {
      const name    = iName>=0   ? (r[iName]  ||"").trim() : "";
      const cityVal = iCity>=0   ? (r[iCity]  ||"").trim() : "";
      const region  = iRegion>=0 ? (r[iRegion]||"").trim() : "";
      const areaVal = iAreaEx>=0 ? (r[iAreaEx]||"").trim() : "";
      const saleRaw = iSale>=0   ? (r[iSale]  ||"").trim() : "";
      const rentRaw = iRent>=0   ? (r[iRent]  ||"").trim() : "";

      if (!name) continue;
      if (!saleRaw && !rentRaw) continue;

      if (city && cityVal !== city) continue;
      if (regionFilter && !region.includes(regionFilter)) continue;

      if (areaMin != null || areaMax != null) {
        const areaNum = parseFloat(areaVal);
        if (isNaN(areaNum)) continue;
        if (areaMin != null && areaNum < areaMin) continue;
        if (areaMax != null && areaNum > areaMax) continue;
      }

      const saleNum = toIntSafe(saleRaw);
      if (saleRaw && saleNum === 0) continue; // 매매가 0 제외
      if (minManwon != null && (saleNum == null || saleNum < minManwon)) continue;
      if (maxManwon != null && (saleNum == null || saleNum > maxManwon)) continue;

      items.push({ name, region, areaVal, saleRaw, rentRaw, saleNum: saleNum || 0 });
    }

    items.sort((a, b) => b.saleNum - a.saleNum);

    // 면적 숫자를 자리별 한글로 (59→오구, 84→팔사, 114→일일사)
    const DIGIT_KO = ["공","일","이","삼","사","오","육","칠","팔","구"];
    function areaToKorean(str) {
      return str.replace(/\d+/, n => n.split('').map(d => DIGIT_KO[+d]).join(''));
    }

    const lines = [];
    for (const { name, region, areaVal, saleRaw, rentRaw } of items) {
      const sale = formatMoneyManwonToEok(saleRaw);
      const rent = formatMoneyManwonToEok(rentRaw);
      const areaRaw   = areaVal ? areaVal.replace("㎡", "").trim() : ""; // 표시용: 59
      const areaSpeak = areaRaw ? areaToKorean(areaRaw) : "";            // 발음용: 오구

      const hideArea = (areaMin != null && areaMax != null && areaMin === areaMax);

      const displayParts = [];
      const speakParts   = [];
      if (region && !regionFilter) { displayParts.push(region); speakParts.push(region); }
      displayParts.push(name); speakParts.push(name);
      if (areaRaw && !hideArea)   displayParts.push(areaRaw);
      if (areaSpeak && !hideArea) speakParts.push(areaSpeak);
      if (sale) { displayParts.push(showRent ? `매매 ${sale}` : sale); speakParts.push(showRent ? `매매 ${sale}` : sale); }
      if (rent && showRent) { displayParts.push(`전세 ${rent}`); speakParts.push(`전세 ${rent}`); }

      lines.push({ display: displayParts.join(", ") + ".", speak: speakParts.join(", ") + "." });
      if (lines.length >= maxN) break;
    }
    return lines;
  }

  // ----------------- List UI -----------------
  const listEl = $("list");
  let currentLines = [];
  let allRows = null;

  function getFilterValues() {
    const minVal     = $('filterMin').value.trim();
    const maxVal     = $('filterMax').value.trim();
    const areaMinVal = $('filterAreaMin').value.trim();
    const areaMaxVal = $('filterAreaMax').value.trim();
    const minEok        = minVal     !== '' ? parseFloat(minVal)     : null;
    const maxEok        = maxVal     !== '' ? parseFloat(maxVal)     : null;
    const areaMin       = areaMinVal !== '' ? parseFloat(areaMinVal) : null;
    const areaMax       = areaMaxVal !== '' ? parseFloat(areaMaxVal) : null;
    const city          = $('filterCity').value;
    const regionFilter  = $('filterRegion').value;
    const showRent      = $('chkRent').checked;
    return { minEok, maxEok, areaMin, areaMax, city, regionFilter, showRent };
  }

  function applyAndRender() {
    if (!allRows) {
      $("filterStat").textContent = "⚠ 먼저 '불러오기'를 눌러주세요.";
      $("filterStat").style.color = "#c00";
      return;
    }
    const { minEok, maxEok, areaMin, areaMax, city, regionFilter, showRent } = getFilterValues();

    const lines = rowsToSpeakableLines(allRows, { minEok, maxEok, areaMin, areaMax, city, regionFilter, showRent });

    const parts = [];
    if (city) parts.push(city);
    if (regionFilter) parts.push(regionFilter);
    if (areaMin != null || areaMax != null) {
      const a1 = areaMin != null ? `${areaMin}㎡` : "";
      const a2 = areaMax != null ? `${areaMax}㎡` : "";
      parts.push(a1 && a2 ? `전용 ${a1}~${a2}` : a1 ? `전용 ${a1}이상` : `전용 ${a2}이하`);
    }
    if (minEok != null) parts.push(`매매 ${minEok}억 이상`);
    if (maxEok != null) parts.push(`매매 ${maxEok}억 이하`);
    const statEl = $("filterStat");
    statEl.style.color = lines.length ? "#0070c0" : "#c00";
    statEl.textContent = parts.length ? `[${parts.join(", ")}] → ${lines.length}개` : `총 ${lines.length}개`;

    renderChecklist(lines);
  }

  function updateStat() {
    $('stat').textContent = `${currentLines.length}개`;
  }

  function renderChecklist(lines) {
    currentLines = lines.slice();
    listEl.innerHTML = '';

    if (!lines.length) {
      listEl.innerHTML = '<div style="padding:12px;color:#999;font-size:14px;">표시할 항목이 없습니다.</div>';
      updateStat();
      return;
    }

    lines.forEach((line) => {
      const row = document.createElement('div');
      row.className = 'item';
      const txt = document.createElement('div');
      txt.className = 'txt';
      txt.textContent = line.display;
      row.appendChild(txt);
      listEl.appendChild(row);
    });

    updateStat();
  }

  function populateRegionDropdown(rows, cityFilter) {
    const hi = detectHeaderRow(rows);
    const header = rows[hi].map(h => (h||"").trim());
    const iCity   = header.findIndex(h => h === "도시" || h.includes("도시"));
    const iRegion = header.findIndex(h => h === "지역(시군구)" || h.includes("시군구"));
    if (iRegion < 0) return;

    const regionSet = new Set();
    for (const r of rows.slice(hi + 1)) {
      const city   = iCity >= 0   ? (r[iCity]  ||"").trim() : "";
      const region = iRegion >= 0 ? (r[iRegion]||"").trim() : "";
      if (!region) continue;
      if (cityFilter && city !== cityFilter) continue;
      regionSet.add(region);
    }

    const sel = $("filterRegion");
    const prev = sel.value;
    sel.innerHTML = "<option value=''>전체</option>";
    [...regionSet].sort().forEach(v => {
      const opt = document.createElement("option");
      opt.value = v; opt.textContent = v;
      if (v === prev) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  $("btnApplyFilter").onclick = applyAndRender;
  $('chkRent').onchange = applyAndRender;

  $("filterCity").onchange = () => {
    if (allRows) populateRegionDropdown(allRows, $("filterCity").value);
    applyAndRender();
  };

  $("btnClearFilter").onclick = () => {
    $("filterMin").value     = "";
    $("filterMax").value     = "";
    $("filterAreaMin").value = "";
    $("filterAreaMax").value = "";
    $("filterCity").value    = "";
    $("filterRegion").value  = "";
    applyAndRender();
  };

  $("btnSpeakSelected").onclick = () => {
    if (!currentLines.length) return alert("불러온 항목이 없어요.");
    speakLines(currentLines.map(l => l.speak));
  };

  // ----------------- Load from sheet -----------------
  $("btnLoad").onclick = async () => {
    const btn = $("btnLoad");
    const status = $("loadStatus");
    try {
      const url = $("sheetUrl").value.trim();
      if (!url) return alert("구글시트 URL을 입력해줘요.");
      localStorage.setItem(LS_KEY, url);

      const { sheetId, gid } = parseSheetUrl(url);
      const exportUrl = csvExportUrl(sheetId, gid);

      btn.disabled = true;
      btn.textContent = "불러오는 중…";
      status.textContent = "";

      let res;
      try {
        res = await fetch(exportUrl, { cache: "no-store" });
      } catch (fetchErr) {
        throw new Error("네트워크 오류: " + (fetchErr.message || fetchErr));
      }

      if (!res.ok) {
        if (res.status === 404 || res.status === 403) {
          throw new Error(`HTTP ${res.status} — 시트가 "링크가 있는 모든 사용자" 공개 설정인지 확인해주세요.`);
        }
        throw new Error(`불러오기 실패: HTTP ${res.status}`);
      }

      const csv = await res.text();

      // 권한/로그인 페이지가 HTML로 내려오는 경우 방지
      if (csv.includes("<!DOCTYPE html") || csv.includes("<html")) {
        throw new Error('시트가 공개(링크 보기) 설정이 아니거나, 로그인 페이지가 내려왔습니다. "링크가 있는 사용자: 보기"로 공개 후 다시 시도해주세요.');
      }

      const rows = parseCSV(csv);

      if (rows.length < 2) {
        renderChecklist([]);
        status.textContent = "⚠ 데이터 행이 없거나 권한/탭(gid)이 맞지 않을 수 있어요.";
        status.style.color = "#ef4444";
        return;
      }

      allRows = rows;

      $("filterMin").value     = "";
      $("filterMax").value     = "";
      $("filterAreaMin").value = "";
      $("filterAreaMax").value = "";
      $("filterCity").value    = "";
      $("filterRegion").value  = "";
      populateRegionDropdown(rows, "");
      applyAndRender();

      if (!currentLines.length) {
        status.textContent = "⚠ 단지 데이터를 인식하지 못했어요. 헤더 행(단지명·매매가)을 확인해주세요.";
        status.style.color = "#ef4444";
        return;
      }

      status.textContent = `✓ ${currentLines.length}개 항목 불러옴`;
      status.style.color = "#10b981";

    } catch (e) {
      status.textContent = "오류: " + (e.message || String(e));
      status.style.color = "#ef4444";
    } finally {
      btn.disabled = false;
      btn.textContent = "불러오기";
    }
  };
</script>
</body>
</html>
