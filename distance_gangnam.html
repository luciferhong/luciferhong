<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강남 거리 지도</title>
  <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=9t8y33hyq8"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%; overflow: hidden;
      font-family: 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ─── 모바일: 스크롤 레이아웃 ─── */
    @media (max-width: 768px) {
      html, body {
        height: auto;
        overflow: auto;
      }
      body {
        height: auto;
        min-height: 100vh;
      }
      #map {
        height: 75vmax !important;
        min-height: 400px !important;
        flex: none !important;
      }
      #distanceSummary {
        flex-wrap: wrap;
        gap: 4px 12px;
      }
      /* 거리재기+반경재기 뺄 줄: 지점3 다음줄에 가로로 나란히 */
      #measureBtns {
        width: 100%;
        flex-direction: row;
      }
    }

    /* ─── 상단 패널 ─── */
    #panel {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      box-shadow: 0 2px 6px rgba(0,0,0,.08);
    }

    #panel h2 {
      width: 100%;
      margin: 0 0 4px;
      font-size: 17px;
      color: #1a1a2e;
    }

    /* 아파트 선택 카드 */
    .apt-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #f9f9f9;
      border: 2px solid #ccc;
      border-radius: 10px;
      padding: 10px 14px;
      min-width: 240px;
      max-width: 320px;
      flex: 1;
      position: relative;
    }
    .apt-card.apt1 { border-color: #2D5DA7; }
    .apt-card.apt2 { border-color: #E97132; }
    .apt-card.apt3 { border-color: #e91e8c; }

    .apt-card-label {
      font-size: 13px;
      font-weight: 700;
      color: #555;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .color-dot {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .apt-card.apt1 .apt-card-label { color: #2D5DA7; }
    .apt-card.apt2 .apt-card-label { color: #E97132; }
    .apt-card.apt3 .apt-card-label { color: #e91e8c; }

    .apt-card input[type=text] {
      width: 100%;
      height: 32px;
      padding: 4px 8px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 14px;
    }
    .apt-card input[type=text]:focus { outline: none; border-color: #2D5DA7; }

    /* 선택된 아파트 표시 */
    .apt-selected {
      font-size: 13px;
      font-weight: 600;
      color: #222;
      min-height: 18px;
    }
    .apt-selected .apt-dist {
      display: inline-block;
      margin-left: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #e67e22;
    }

    .apt-clear-btn {
      position: absolute;
      top: 8px;
      right: 10px;
      background: #e74c3c;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 22px; height: 22px;
      font-size: 13px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .apt-card.has-selection .apt-clear-btn { display: flex; }

    /* ─── 검색 드롭다운 ─── */
    .search-results {
      position: fixed;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      max-height: 280px;
      overflow-y: auto;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      z-index: 99999;
      width: 340px;
      display: none;
    }

    .search-result-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .search-result-item:hover { background: #eef4ff; }
    .search-result-item strong { color: #1a1a2e; font-size: 14px; }
    .search-result-meta {
      color: #888;
      font-size: 12px;
      margin-top: 2px;
    }
    .search-result-meta span { margin-right: 8px; }
    .highlight { background: #fff176; border-radius: 2px; }

    /* ─── 거리 요약 배너 ─── */
    #distanceSummary {
      display: none;
      align-items: center;
      gap: 20px;
      padding: 8px 16px;
      background: linear-gradient(90deg, #1a1a2e, #2D5DA7);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      flex-wrap: wrap;
    }
    #distanceSummary .ds-item { display: flex; align-items: center; gap: 6px; }
    #distanceSummary .ds-val { font-size: 18px; font-weight: 800; color: #ffe066; }

    /* ─── 지도 ─── */
    #map { width: 100%; flex: 1 1 0; min-height: 0; }

    /* ─── 아파트 마커 (hongbutest 스타일) ─── */
    .apartment-marker-container {
      display: inline-block;
      width: max-content;
      border-radius: 6px;
      border: 2px solid #000;
      box-shadow: 2px 2px 5px rgba(0,0,0,.3);
      white-space: nowrap;
      text-align: center;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }
    .apartment-name-marker {
      background: #fff;
      color: #000;
      font-size: 12px;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 3px 3px 0 0;
      white-space: nowrap;
    }
    .apartment-details-marker {
      font-size: 12px;
      padding: 2px 8px;
      white-space: nowrap;
      border-radius: 0 0 3px 3px;
    }

    /* 강남역 마커 */
    .gangnam-marker {
      background: #f0c000;
      color: #000;
      font-size: 13px;
      font-weight: 800;
      padding: 6px 12px;
      border-radius: 20px;
      border: 2px solid #c9a000;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      white-space: nowrap;
      cursor: default;
    }

    /* ─── 우클릭 컨텍스트 메뉴 ─── */
    #mapContextMenu {
      position: fixed;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,.22);
      z-index: 999999;
      display: none;
      min-width: 190px;
      overflow: hidden;
      user-select: none;
    }
    .ctx-menu-header {
      padding: 8px 14px;
      background: #1a1a2e;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .3px;
    }
    .ctx-menu-coords {
      padding: 5px 14px;
      font-size: 11px;
      color: #888;
      background: #f8f8f8;
      border-bottom: 1px solid #eee;
    }
    .ctx-menu-item {
      padding: 11px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .12s;
    }
    .ctx-menu-item:last-child { border-bottom: none; }
    .ctx-menu-item:hover { background: #eef4ff; }
    .ctx-menu-item.ctx-apt1 { color: #2D5DA7; }
    .ctx-menu-item.ctx-apt2 { color: #E97132; }
    .ctx-menu-subheader {
      padding: 6px 14px 3px;
      font-size: 11px;
      font-weight: 700;
      color: #aaa;
      letter-spacing: .5px;
      text-transform: uppercase;
      background: #fafafa;
    }
    /* 체크박스 항목 */
    .ctx-dest-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px 7px 12px;
      cursor: pointer;
      font-size: 13px;
      color: #1a6e3c;
      border-bottom: 1px solid #f4f4f4;
    }
    .ctx-dest-item:last-of-type { border-bottom: none; }
    .ctx-dest-item:hover { background: #e8f8ee; }
    .ctx-dest-item input[type=checkbox] {
      width: 15px; height: 15px;
      accent-color: #fff;
      cursor: pointer;
      flex-shrink: 0;
    }
    .ctx-dest-item label { cursor: pointer; user-select: none; }
    /* 길찾기 푸터 버튼 */
    .ctx-fw-footer {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      background: #f9f9f9;
      border-top: 1px solid #e8e8e8;
    }
    .ctx-fw-btn {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .ctx-fw-btn-go     { background: #27ae60; color: #fff; }
    .ctx-fw-btn-go:hover { background: #1e8449; }
    .ctx-fw-btn-all    { background: #eee; color: #333; }
    .ctx-fw-btn-all:hover { background: #ddd; }

    /* 토스트 메시지 */
    #fwToast {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(30,30,30,.88);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 10px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 9999999;
      opacity: 0;
      transition: opacity .2s;
    }
    #fwToast.show { opacity: 1; }

    /* ─── 이의의 오버레이 (iframe) ─── */
    #findwayOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,.75);
      z-index: 9999999;
      display: none;
      justify-content: center;
      align-items: center;
    }
    #findwayClose {
      position: absolute;
      top: 8px; right: 14px;
      background: #e74c3c;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      z-index: 1;
    }
    #findwayIframe {
      width: calc(100% - 40px);
      height: calc(100% - 20px);
      border: none;
      border-radius: 8px;
    }

    /* 지도 선택 핀 마커 */
    .map-pin-marker {
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }
    .map-pin-label {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      padding: 3px 8px;
      border-radius: 10px;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
      pointer-events: auto;
      cursor: text;
    }
    .map-pin-arrow {
      width: 0; height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
    }

    /* ─── 거리재기 ─── */
    #rulerBtn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 2px solid #888;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      color: #444;
      cursor: pointer;
      white-space: nowrap;
      align-self: center;
      transition: background .15s, color .15s, border-color .15s;
    }
    #rulerBtn.active {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
    }
    #rulerClearAll {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 2px solid #c0392b;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      color: #c0392b;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, color .15s;
    }
    #rulerClearAll:hover {
      background: #c0392b;
      color: #fff;
    }
    /* ─── 반경재기 ─── */
    #radiusBtn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 2px solid #888;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      color: #444;
      cursor: pointer;
      white-space: nowrap;
      align-self: center;
      transition: background .15s, color .15s, border-color .15s;
    }
    #radiusBtn.active {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
    }
    #radiusClearAll {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 2px solid #c0392b;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      color: #c0392b;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, color .15s;
    }
    #radiusClearAll:hover { background: #c0392b; color: #fff; }
    body.radius-mode #map { cursor: crosshair !important; }
    .radius-pin {
      width: 10px; height: 10px;
      background: #4CAF50;
      border: 2px solid #388E3C;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(76,175,80,.35);
    }
    /* 반경 색상 선택 팝업 */
    #circleColorPicker {
      display: none;
      position: fixed;
      z-index: 3000;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
      padding: 10px;
      flex-direction: column;
      gap: 8px;
    }
    .circle-color-row { display: flex; gap: 6px; }
    .circle-color-swatch {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(0,0,0,.15);
      transition: transform .1s, box-shadow .1s;
    }
    .circle-color-swatch:hover { transform: scale(1.2); box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    #circleColorCustom {
      width: 100%; height: 28px;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      padding: 0 2px;
    }
    /* 지도 커서: 거리재기 모드 */
    body.ruler-mode #map { cursor: crosshair !important; }
    .ruler-pin {
      width: 10px; height: 10px;
      background: #f0c000;
      border: 2px solid #c9a000;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(240,192,0,.35);
    }
  </style>
</head>
<body>

<!-- 상단 패널 -->
<div id="panel">
  <h2>🏠 강남 거리 지도</h2>

  <!-- 지점 1 -->
  <div class="apt-card apt1" id="card1">
    <span class="apt-card-label">🔵 지점 1</span>
    <input type="text" id="search1" placeholder="아파트명 검색...">
    <div class="apt-selected" id="selected1">선택 안 됨</div>
    <button class="apt-clear-btn" id="clear1" title="초기화">✕</button>
  </div>

  <!-- 지점 2 -->
  <div class="apt-card apt2" id="card2">
    <span class="apt-card-label">🟠 지점 2</span>
    <input type="text" id="search2" placeholder="아파트명 검색...">
    <div class="apt-selected" id="selected2">선택 안 됨</div>
    <button class="apt-clear-btn" id="clear2" title="초기화">✕</button>
  </div>

  <!-- 지점 3 -->
  <div class="apt-card apt3" id="card3">
    <span class="apt-card-label">🔴 지점 3</span>
    <input type="text" id="search3" placeholder="아파트명 검색...">
    <div class="apt-selected" id="selected3">선택 안 됨</div>
    <button class="apt-clear-btn" id="clear3" title="초기화">✕</button>
  </div>

  <!-- 거리재기 + 반경재기 버튼 그룹 -->
  <div id="measureBtns" style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
    <div style="display:flex;gap:6px;align-items:center;">
      <button id="rulerBtn" title="클릭으로 두 지점 사이 직선거리 측정">📏 거리재기</button>
      <button id="rulerClearAll" title="모든 거리재기 삭제">🗑 거리재기 일괄 삭제</button>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <button id="radiusBtn" title="클릭으로 중심점 선택 → 반경 측정 (우클릭으로 색상 변경)">⭕ 반경재기</button>
      <button id="radiusClearAll" title="모든 반경 삭제">🗑 반경재기 일괄 삭제</button>
    </div>
  </div>
</div>

<!-- 거리 요약 배너 -->
<div id="distanceSummary">
  <div class="ds-item" id="ds1">🔵 지점 1: <span class="ds-val" id="dsVal1">-</span> km</div>
  <div class="ds-item" id="ds2">🟠 지점 2: <span class="ds-val" id="dsVal2">-</span> km</div>
  <div class="ds-item" id="ds3">🔴 지점 3: <span class="ds-val" id="dsVal3">-</span> km</div>
  <div class="ds-item" id="dsDiff" style="color:#ffd6d6;">차이 최대: <span class="ds-val" id="dsValDiff" style="color:#ffd6d6;">-</span> km</div>
</div>

<!-- 검색 드롭다운 (공용, body에 append) -->
<div class="search-results" id="searchResults1"></div>
<div class="search-results" id="searchResults2"></div>
<div class="search-results" id="searchResults3"></div>

<!-- 우클릭 컨텍스트 메뉴 -->
<div id="mapContextMenu">
  <div class="ctx-menu-header">📍 시작지점 등록</div>
  <div class="ctx-menu-coords" id="ctxCoords"></div>
  <div class="ctx-menu-item ctx-apt1" id="ctxApt1">🔵 지점 1로 등록</div>
  <div class="ctx-menu-item ctx-apt2" id="ctxApt2">🟠 지점 2로 등록</div>
  <div class="ctx-menu-item" id="ctxApt3" style="color:#e91e8c;font-weight:700;padding:11px 14px;cursor:pointer;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;">🔴 지점 3로 등록</div>
  <div class="ctx-menu-divider" style="height:1px;background:#e8e8e8;margin:2px 0"></div>
  <div class="ctx-menu-subheader">🗺️ 업무지구 길찾기</div>
  <div class="ctx-dest-item"><input type="checkbox" id="fw_chk1" checked><label for="fw_chk1">강남역 2호선</label></div>
  <div class="ctx-dest-item"><input type="checkbox" id="fw_chk2" checked><label for="fw_chk2">서울시청역 2호선</label></div>
  <div class="ctx-dest-item"><input type="checkbox" id="fw_chk3" checked><label for="fw_chk3">여의도역 5호선</label></div>
  <div class="ctx-dest-item"><input type="checkbox" id="fw_chk9"><label for="fw_chk9">광화문역 5호선</label></div>
  <div class="ctx-dest-item"><input type="checkbox" id="fw_chk4"><label for="fw_chk4">가산디지털단지역 1호선</label></div>
  <div class="ctx-dest-item"><input type="checkbox" id="fw_chk8"><label for="fw_chk8">구로디지털단지역 2호선</label></div>
  <div class="ctx-dest-item"><input type="checkbox" id="fw_chk5"><label for="fw_chk5">판교역 신분당선</label></div>
  <div class="ctx-dest-item"><input type="checkbox" id="fw_chk6"><label for="fw_chk6">마과역 5호선</label></div>
  <div class="ctx-dest-item"><input type="checkbox" id="fw_chk7"><label for="fw_chk7">DMC역 6호선</label></div>
  <div class="ctx-fw-footer">
    <button class="ctx-fw-btn ctx-fw-btn-all" id="fwAllToggle">전체 토글</button>
    <button class="ctx-fw-btn ctx-fw-btn-go" id="fwGoBtn">🗺️ 길찾기</button>
  </div>
</div>

<!-- 토스트 -->
<div id="fwToast">성능을 위해 최대 3개 업무지구만 선택이 가능합니다</div>

<!-- 길찾기 결과 오버레이 -->
<div id="findwayOverlay">
  <button id="findwayClose">✕ 닫기</button>
  <iframe id="findwayIframe" src=""></iframe>
</div>

<!-- 반경 색상 선택 팝업 -->
<div id="circleColorPicker">
  <div class="circle-color-row">
    <div class="circle-color-swatch" data-color="#2196F3" style="background:#2196F3" title="파랑"></div>
    <div class="circle-color-swatch" data-color="#4CAF50" style="background:#4CAF50" title="초록"></div>
    <div class="circle-color-swatch" data-color="#F44336" style="background:#F44336" title="빨강"></div>
    <div class="circle-color-swatch" data-color="#FF9800" style="background:#FF9800" title="주황"></div>

<div id="map"></div>

<script>
// ─── 강남역 좌표 ───
const GANGNAM = { lat: 37.49796, lng: 127.02762, name: '강남역' };

// ─── 전역 상태 ───
let apartmentData = [];
let map;
let gangnamMarker;
let selectedApt = [null, null, null]; // [apt1, apt2, apt3]
let aptMarkers = [null, null, null];
let polylines = [null, null, null];
let distanceLabels = [null, null, null];
const LABEL_PREFIXES = ['🔵 ', '🟠 ', '🟣 '];
let customLabels = ['지점 1', '지점 2', '지점 3'];

// ─── 색상 (apt1=파랑, apt2=빨강, apt3=보라) ───
const COLORS = ['#2D5DA7', '#E97132', '#e91e8c'];

// ─── Haversine 직선거리(km) ───
function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ─── 연도 → 마커 배경색 (hongbutest 스타일) ───
function yearToBg(yearStr) {
  const y = parseInt((yearStr || '').slice(-2), 10);
  if (isNaN(y)) return '#FFFA00';
  if (y > 50) return '#5C6267';
  if (y >= 20) return '#3E24D7';
  if (y >= 10) return '#EE1A24';
  return '#FFFA00';
}
function yearToFg(yearStr) {
  const y = parseInt((yearStr || '').slice(-2), 10);
  return (!isNaN(y) && y >= 0 && y < 10) ? '#000' : '#fff';
}

// ─── 마커 DOM 생성 (hongbutest 스타일) ───
function createAptMarkerEl(apt, idx) {
  const bg = COLORS[idx];

  // 지도 클릭으로 등록된 커스텀 핀
  if (apt.isCustom) {
    const wrap = document.createElement('div');
    wrap.className = 'map-pin-marker';
    const label = document.createElement('div');
    label.className = 'map-pin-label';
    label.style.backgroundColor = bg;
    label.style.display = 'flex';
    label.style.alignItems = 'center';
    label.style.gap = '2px';

    // 고정 이모지/닷 (삭제 불가)
    const prefix = document.createElement('span');
    if (idx === 0) {
      prefix.textContent = '\uD83D\uDD35 ';
    } else {
      prefix.style.display = 'inline-block';
      prefix.style.width = '10px';
      prefix.style.height = '10px';
      prefix.style.borderRadius = '50%';
      prefix.style.background = 'rgba(255,255,255,0.9)';
      prefix.style.border = '2px solid rgba(255,255,255,0.5)';
      prefix.style.flexShrink = '0';
      prefix.style.marginRight = '2px';
    }
    prefix.style.userSelect = 'none';
    prefix.style.flexShrink = '0';
    prefix.contentEditable = 'false';

    // 수정 가능한 텍스트
    const editSpan = document.createElement('span');
    editSpan.contentEditable = 'true';
    editSpan.style.outline = 'none';
    editSpan.style.minWidth = '20px';
    editSpan.textContent = customLabels[idx];

    ['mousedown','mouseup','click','dblclick'].forEach(ev =>
      label.addEventListener(ev, e => e.stopPropagation()));
    editSpan.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); editSpan.blur(); }
      e.stopPropagation();
    });
    editSpan.addEventListener('blur', () => {
      const newText = editSpan.textContent.trim();
      if (newText) {
        customLabels[idx] = newText;
        if (selectedApt[idx]) selectedApt[idx].name = LABEL_PREFIXES[idx] + newText;
        // 텍스트 길이가 바뀌면 anchor가 틀려지므로 마커 재생성
        setTimeout(() => updateMapForApt(idx), 0);
      } else {
        editSpan.textContent = customLabels[idx];
      }
    });

    label.appendChild(prefix);
    label.appendChild(editSpan);
    const arrow = document.createElement('div');
    arrow.className = 'map-pin-arrow';
    arrow.style.borderTopColor = bg;
    arrow.style.borderTop = `8px solid ${bg}`;
    wrap.appendChild(label);
    wrap.appendChild(arrow);
    return wrap;
  }

  const container = document.createElement('div');
  container.className = 'apartment-marker-container';
  container.style.backgroundColor = bg;
  container.style.borderColor = bg;

  const nameEl = document.createElement('div');
  nameEl.className = 'apartment-name-marker';
  nameEl.textContent = apt.name;

  const detailEl = document.createElement('div');
  detailEl.className = 'apartment-details-marker';
  detailEl.style.color = '#fff';
  detailEl.textContent = `${(apt.year||'').slice(-5)} ${apt.units}세대`;

  container.appendChild(nameEl);
  container.appendChild(detailEl);
  return container;
}

// ─── 선택된 아파트 마커/선/라벨 업데이트 ───
function updateMapForApt(idx) {
  // 기존 마커/선/라벨 제거
  if (aptMarkers[idx]) { aptMarkers[idx].setMap(null); aptMarkers[idx] = null; }
  if (polylines[idx])  { polylines[idx].setMap(null);  polylines[idx] = null; }
  if (distanceLabels[idx]) { distanceLabels[idx].setMap(null); distanceLabels[idx] = null; }

  const apt = selectedApt[idx];
  if (!apt) { updateSummary(); return; }

  const latlng = new naver.maps.LatLng(apt.lat, apt.lng);
  const el = createAptMarkerEl(apt, idx);

  // 커스텀 핀은 화살표 끝(하단 중앙)을 anchor로 측정
  let anchor;
  if (apt.isCustom) {
    el.style.position = 'absolute';
    el.style.visibility = 'hidden';
    document.body.appendChild(el);
    const w = el.offsetWidth;
    const h = el.offsetHeight;
    document.body.removeChild(el);
    el.style.position = '';
    el.style.visibility = '';
    anchor = new naver.maps.Point(Math.round(w / 2), h);
  } else {
    // 일반 아파트 마커: DOM 크기 측정 후 상단 중앙을 anchor로
    el.style.position = 'absolute';
    el.style.visibility = 'hidden';
    document.body.appendChild(el);
    const w2 = el.offsetWidth;
    document.body.removeChild(el);
    el.style.position = '';
    el.style.visibility = '';
    anchor = new naver.maps.Point(Math.round(w2 / 2), 0);
  }

  aptMarkers[idx] = new naver.maps.Marker({
    position: latlng,
    map: map,
    icon: { content: el, anchor }
  });

  // 강남역까지 선 그리기
  const gangnamLatLng = new naver.maps.LatLng(GANGNAM.lat, GANGNAM.lng);
  polylines[idx] = new naver.maps.Polyline({
    map: map,
    path: [latlng, gangnamLatLng],
    strokeColor: COLORS[idx],
    strokeWeight: 3,
    strokeOpacity: 0.85,
    strokeStyle: 'shortdash'
  });

  // 거리 라벨 (선 중간)
  const midLat = (apt.lat + GANGNAM.lat) / 2;
  const midLng = (apt.lng + GANGNAM.lng) / 2;
  const distKm = haversineKm(apt.lat, apt.lng, GANGNAM.lat, GANGNAM.lng).toFixed(2);

  const labelEl = document.createElement('div');
  labelEl.style.cssText = `
    background:${COLORS[idx]};color:#fff;font-size:13px;font-weight:700;
    padding:3px 8px;border-radius:12px;white-space:nowrap;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
    border:2px solid rgba(255,255,255,.6);
  `;
  labelEl.textContent = `${distKm} km`;

  distanceLabels[idx] = new naver.maps.Marker({
    position: new naver.maps.LatLng(midLat, midLng),
    map: map,
    icon: { content: labelEl, anchor: new naver.maps.Point(0, 0) }
  });

  fitMapBounds();
  updateSummary();
}

// ─── 지도 범위 자동 조정 ───
function fitMapBounds() {
  const points = [new naver.maps.LatLng(GANGNAM.lat, GANGNAM.lng)];
  selectedApt.forEach(a => { if (a) points.push(new naver.maps.LatLng(a.lat, a.lng)); });
  if (points.length === 1) return;
  const bounds = new naver.maps.LatLngBounds();
  points.forEach(p => bounds.extend(p));
  map.fitBounds(bounds, { padding: { top: 80, right: 80, bottom: 80, left: 80 } });
}

// ─── 거리 요약 배너 ───
function updateSummary() {
  const banner = document.getElementById('distanceSummary');
  const apts = selectedApt;
  const any = apts.some(a => a);
  if (!any) { banner.style.display = 'none'; return; }
  banner.style.display = 'flex';

  const labels = ['🔵 지점 1', '🟠 지점 2', '🟣 지점 3'];
  const dists = apts.map((a, i) => {
    const dsEl = document.getElementById(`ds${i+1}`);
    if (!a) { dsEl.style.display = 'none'; return null; }
    const d = haversineKm(a.lat, a.lng, GANGNAM.lat, GANGNAM.lng);
    document.getElementById(`dsVal${i+1}`).textContent = d.toFixed(2);
    dsEl.style.display = 'flex';
    return d;
  });

  const valid = dists.filter(d => d !== null);
  const dsDiff = document.getElementById('dsDiff');
  if (valid.length >= 2) {
    const diff = Math.max(...valid) - Math.min(...valid);
    document.getElementById('dsValDiff').textContent = diff.toFixed(2);
    dsDiff.style.display = 'flex';
  } else {
    dsDiff.style.display = 'none';
  }
}

// ─── 아파트 검색 & 드롭다운 ───
function highlight(text, query) {
  if (!query) return text;
  const terms = query.trim().split(/\s+/).filter(Boolean);
  let result = text;
  terms.forEach(term => {
    const re = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    result = result.replace(re, '<span class="highlight">$1</span>');
  });
  return result;
}

function searchApts(query) {
  const terms = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
  const filtered = apartmentData.filter(apt => {
    const hay = `${apt.name} ${apt.sidoNm||''} ${apt.sigunguNm||''}`.toLowerCase();
    return terms.every(t => hay.includes(t));
  });

  // 지도 현재 중심 기준 거리순 정렬
  if (map) {
    const center = map.getCenter();
    const cLat = center.lat(), cLng = center.lng();
    filtered.sort((a, b) =>
      haversineKm(cLat, cLng, a.lat, a.lng) - haversineKm(cLat, cLng, b.lat, b.lng)
    );
  }

  return filtered.slice(0, 50);
}

function setupSearch(idx) {
  const inputId  = `search${idx+1}`;
  const dropId   = `searchResults${idx+1}`;
  const cardId   = `card${idx+1}`;
  const selId    = `selected${idx+1}`;
  const clearId  = `clear${idx+1}`;

  const input   = document.getElementById(inputId);
  const drop    = document.getElementById(dropId);
  const card    = document.getElementById(cardId);
  const selDiv  = document.getElementById(selId);
  const clearBtn= document.getElementById(clearId);

  function positionDrop() {
    const r = input.getBoundingClientRect();
    drop.style.left = r.left + 'px';
    drop.style.top  = (r.bottom + 4) + 'px';
  }

  function closeDrop() { drop.style.display = 'none'; drop.innerHTML = ''; }

  function selectApt(apt) {
    selectedApt[idx] = apt;
    const dist = haversineKm(apt.lat, apt.lng, GANGNAM.lat, GANGNAM.lng).toFixed(2);
    selDiv.innerHTML = `<span>${apt.name}</span><span class="apt-dist">📍 ${dist} km</span>`;
    input.value = '';
    card.classList.add('has-selection');
    closeDrop();
    updateMapForApt(idx);
  }

  input.addEventListener('input', () => {
    const q = input.value.trim();
    if (!q) { closeDrop(); return; }
    const results = searchApts(q);
    if (!results.length) {
      drop.innerHTML = '<div class="search-result-item" style="color:#999">검색 결과 없음</div>';
    } else {
      drop.innerHTML = results.map(apt => `
        <div class="search-result-item" data-id="${apt.id}">
          <strong>${highlight(apt.name, q)}</strong>
          <div class="search-result-meta">
            <span>${apt.sidoNm||''}</span>
            <span>${apt.sigunguNm||''}</span>
            <span>준공 ${apt.year||''}</span>
            <span>${apt.units}세대</span>
          </div>
        </div>
      `).join('');
    }
    drop.style.display = 'block';
    positionDrop();

    drop.querySelectorAll('.search-result-item[data-id]').forEach(item => {
      item.addEventListener('click', () => {
        const apt = apartmentData.find(a => String(a.id) === item.dataset.id);
        if (apt) selectApt(apt);
      });
    });
  });

  input.addEventListener('focus', () => { if (drop.innerHTML) { drop.style.display='block'; positionDrop(); } });

  clearBtn.addEventListener('click', () => {
    selectedApt[idx] = null;
    selDiv.textContent = '선택 안 됨';
    card.classList.remove('has-selection');
    updateMapForApt(idx);
  });

  document.addEventListener('click', e => {
    if (!input.contains(e.target) && !drop.contains(e.target)) closeDrop();
  });
  window.addEventListener('resize', positionDrop);
  window.addEventListener('scroll', positionDrop);
}

// ─── 아파트 데이터 로드 ───
async function loadApartments() {
  try {
    const res = await fetch(`apt.json?t=${Date.now()}`, { cache: 'no-store' });
    const data = await res.json();
    apartmentData = data.map(apt => ({
      id: apt.id,
      name: apt.name,
      year: apt.year,
      units: parseInt(apt.units, 10),
      lat: parseFloat(apt.lat),
      lng: parseFloat(apt.lng),
      sidoNm: apt.sidoNm || '',
      sigunguNm: apt.sigunguNm || ''
    }));
  } catch (e) {
    console.error('아파트 데이터 로드 실패:', e);
  }
}

// ─── 강남역 마커 ───
function addGangnamMarker() {
  const el = document.createElement('div');
  el.className = 'gangnam-marker';
  el.textContent = '🚇 강남역';

  // DOM 크기 측정 후 중앙을 anchor로

  gangnamMarker = new naver.maps.Marker({

// ─── 업무지구 목적지 목록 ───
// ─── 업무지구 ID 목록 ───
const FW_IDS = ['chk1','chk2','chk3','chk9','chk4','chk8','chk5','chk6','chk7'];

// ─── 거리재기 ───
function setupRuler() {
  let rulerActive = false;
  let rulerStep = 0; // 0: 대기, 1: 첫 지점 찍음
  let rulerPtA = null;
  let rulerMarkerA = null;
  let rulerClickListener = null;
  let rulerMoveListeners = [];
  let previewLine = null;
  let previewLabel = null;

  // 완료된 측정들을 모두 보관
  const rulerHistory = []; // [{ markerA, markerB, line, midLabel }]

  const btn = document.getElementById('rulerBtn');
  const clearAllBtn = document.getElementById('rulerClearAll');

  function updateClearAllBtn() {
    clearAllBtn.style.display = rulerHistory.length > 0 ? 'flex' : 'none';
  }

  function makePinEl() {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;pointer-events:none;';
    const dot = document.createElement('div');
    dot.className = 'ruler-pin';
    wrap.appendChild(dot);
    return wrap;
  }

  function clearPreview() {
    if (previewLine)  { previewLine.setMap(null);  previewLine = null; }
    if (previewLabel) { previewLabel.setMap(null); previewLabel = null; }
  }

  function clearMoveListeners() {
    rulerMoveListeners.forEach(l => naver.maps.Event.removeListener(l));
    rulerMoveListeners = [];
  }

  function removeMeasurement(m) {
    if (m.markerA)  m.markerA.setMap(null);
    if (m.markerB)  m.markerB.setMap(null);
    if (m.line)     m.line.setMap(null);
    if (m.midLabel) m.midLabel.setMap(null);
    const idx = rulerHistory.indexOf(m);
    if (idx !== -1) rulerHistory.splice(idx, 1);
    updateClearAllBtn();
  }

  function deactivate() {
    rulerActive = false;
    btn.classList.remove('active');
    document.body.classList.remove('ruler-mode');
    clearPreview();
    clearMoveListeners();
    if (rulerClickListener) {
      naver.maps.Event.removeListener(rulerClickListener);
      rulerClickListener = null;
    }
  }

  function activate() {
    rulerActive = true;
    btn.classList.add('active');
    document.body.classList.add('ruler-mode');
    // 진행 중이던 A 마커만 초기화 (완료된 측정은 유지)
    if (rulerMarkerA) { rulerMarkerA.setMap(null); rulerMarkerA = null; }
    rulerStep = 0; rulerPtA = null;

    rulerClickListener = naver.maps.Event.addListener(map, 'click', (e) => {
      const latlng = e.coord;
      if (rulerStep === 0) {
        rulerPtA = latlng;
        rulerMarkerA = new naver.maps.Marker({
          position: latlng, map,
          icon: { content: makePinEl(), anchor: new naver.maps.Point(5, 5) },
          clickable: false
        });
        rulerStep = 1;

        // 마우스 이동 시 실시간 미리보기
        // map + 기존 완료된 선/마커 위에서도 mousemove 받기 위해 모두 등록
        const moveHandler = ev => {
          const pos = ev.coord;
          const dist = haversineKm(rulerPtA.lat(), rulerPtA.lng(), pos.lat(), pos.lng());
          const distStr = dist >= 1 ? `${dist.toFixed(2)} km` : `${Math.round(dist * 1000)} m`;

          if (!previewLine) {
            previewLine = new naver.maps.Polyline({
              map, path: [rulerPtA, pos],
              strokeColor: '#f0c000', strokeWeight: 2,
              strokeOpacity: 0.6, strokeStyle: 'shortdash',
              clickable: false
            });
            const pvEl = document.createElement('div');
            pvEl.style.cssText = 'background:rgba(240,192,0,0.9);color:#000;font-size:12px;font-weight:700;padding:2px 8px;border-radius:8px;white-space:nowrap;pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.2);';
            pvEl.id = '_rulerPvLabel';
            previewLabel = new naver.maps.Marker({
              position: pos, map,
              icon: { content: pvEl, anchor: new naver.maps.Point(-10, 20) },
              clickable: false
            });
          } else {
            previewLine.setPath([rulerPtA, pos]);
            previewLabel.setPosition(pos);
          }
          const pvEl = document.getElementById('_rulerPvLabel');
          if (pvEl) pvEl.textContent = distStr;
        };

        rulerMoveListeners.push(naver.maps.Event.addListener(map, 'mousemove', moveHandler));
        rulerHistory.forEach(m => {
          if (m.line) rulerMoveListeners.push(naver.maps.Event.addListener(m.line, 'mousemove', moveHandler));
        });

      } else {
        clearPreview();
        clearMoveListeners();

        const markerB = new naver.maps.Marker({
          position: latlng, map,
          icon: { content: makePinEl(), anchor: new naver.maps.Point(5, 5) },
          clickable: false
        });

        // 선 그리기
        const line = new naver.maps.Polyline({
          map,
          path: [rulerPtA, latlng],
          strokeColor: '#f0c000',
          strokeWeight: 3,
          strokeOpacity: 0.9,
          strokeStyle: 'solid',
          clickable: false
        });

        // 거리 계산
        const dist = haversineKm(rulerPtA.lat(), rulerPtA.lng(), latlng.lat(), latlng.lng());
        const distStr = dist >= 1
          ? `${dist.toFixed(2)} km`
          : `${Math.round(dist * 1000)} m`;

        // 중간 라벨 (호버 시 ✕ 삭제 버튼 표시)
        const midLat = (rulerPtA.lat() + latlng.lat()) / 2;
        const midLng = (rulerPtA.lng() + latlng.lng()) / 2;
        const midEl = document.createElement('div');
        midEl.style.cssText = 'display:inline-flex;align-items:center;gap:4px;background:#f0c000;color:#000;font-size:12px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap;border:2px solid #c9a000;box-shadow:0 2px 6px rgba(0,0,0,.25);cursor:default;';
        const textSpan = document.createElement('span');
        textSpan.textContent = distStr;
        const delBtn = document.createElement('span');
        delBtn.textContent = '✕';
        delBtn.style.cssText = 'display:none;cursor:pointer;font-size:10px;opacity:0.65;line-height:1;';
        delBtn.title = '이 측정 삭제';
        midEl.appendChild(textSpan);
        midEl.appendChild(delBtn);
        midEl.addEventListener('mouseenter', () => { delBtn.style.display = 'inline'; });
        midEl.addEventListener('mouseleave', () => { delBtn.style.display = 'none'; });

        const midLabel = new naver.maps.Marker({
          position: new naver.maps.LatLng(midLat, midLng),
          map,
          icon: { content: midEl, anchor: new naver.maps.Point(0, 0) },
          clickable: false
        });

        // 히스토리에 저장 (measurement 객체를 closure로 참조)
        const measurement = { markerA: rulerMarkerA, markerB, line, midLabel };
        rulerHistory.push(measurement);
        rulerMarkerA = null;
        updateClearAllBtn();

        delBtn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          removeMeasurement(measurement);
        });

        // 측정 완료 → 모드 종료
        deactivate();
      }
    });
  }

  btn.addEventListener('click', () => {
    if (rulerActive) {
      deactivate();
      // 진행 중인 A 마커만 제거 (완료된 측정 유지)
      if (rulerMarkerA) { rulerMarkerA.setMap(null); rulerMarkerA = null; }
      rulerStep = 0; rulerPtA = null;
    } else {
      activate();
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && rulerActive) {
      deactivate();
      if (rulerMarkerA) { rulerMarkerA.setMap(null); rulerMarkerA = null; }
      rulerStep = 0; rulerPtA = null;
    }
  });

  clearAllBtn.addEventListener('click', () => {
    if (rulerActive) {
      deactivate();
      if (rulerMarkerA) { rulerMarkerA.setMap(null); rulerMarkerA = null; }
      rulerStep = 0; rulerPtA = null;
    }
    rulerHistory.forEach(m => {
      if (m.markerA)  m.markerA.setMap(null);
      if (m.markerB)  m.markerB.setMap(null);
      if (m.line)     m.line.setMap(null);
      if (m.midLabel) m.midLabel.setMap(null);
    });
    rulerHistory.length = 0;
    updateClearAllBtn();
  });
}

// ─── 반경재기 ───
function setupRadius() {
  let radiusActive = false;
  let radiusStep = 0;
  let radiusPtCenter = null;
  let radiusCenterMarker = null;
  let radiusClickListener = null;
  let radiusMoveListeners = []; // map + 기존 원 모두에 등록
  let previewCircle = null;
  let previewLabel = null;
  const radiusHistory = []; // { centerMarker, circle, label, labelEl, fillColor }
  let colorTarget = null;

  const btn         = document.getElementById('radiusBtn');
  const clearAllBtn = document.getElementById('radiusClearAll');
  const colorPicker = document.getElementById('circleColorPicker');

  function updateClearAllBtn() {
    clearAllBtn.style.display = radiusHistory.length > 0 ? 'flex' : 'none';
  }

  function makePinEl() {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;pointer-events:none;';
    const dot = document.createElement('div');
    dot.className = 'radius-pin';
    wrap.appendChild(dot);
    return wrap;
  }

  function removeRadius(r) {
    if (r.centerMarker) r.centerMarker.setMap(null);
    if (r.circle)       r.circle.setMap(null);
    if (r.label)        r.label.setMap(null);
    const idx = radiusHistory.indexOf(r);
    if (idx !== -1) radiusHistory.splice(idx, 1);
    updateClearAllBtn();
  }

  function applyColor(color, keepOpen) {
    if (!colorTarget) return;
    colorTarget.fillColor = color;
    colorTarget.circle.setOptions({ fillColor: color, strokeColor: color });
    if (colorTarget.labelEl) {
      colorTarget.labelEl.style.background = color;
      colorTarget.labelEl.style.borderColor = color;
    }
    if (!keepOpen) colorPicker.style.display = 'none';
  }

  colorPicker.querySelectorAll('.circle-color-swatch').forEach(sw => {
    sw.addEventListener('click', e => { e.stopPropagation(); applyColor(sw.dataset.color, false); });
  });
  const customInput = document.getElementById('circleColorCustom');
  customInput.addEventListener('input', e => { e.stopPropagation(); applyColor(customInput.value, true); });
  customInput.addEventListener('click', e => e.stopPropagation());

  document.addEventListener('click', () => { colorPicker.style.display = 'none'; });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') colorPicker.style.display = 'none'; });

  // Esc → 반경재기 취소
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && radiusActive) {
      deactivate();
      if (radiusCenterMarker) { radiusCenterMarker.setMap(null); radiusCenterMarker = null; }
      radiusStep = 0; radiusPtCenter = null;
    }
  });

  function clearPreview() {
    if (previewCircle) { previewCircle.setMap(null); previewCircle = null; }
    if (previewLabel)  { previewLabel.setMap(null);  previewLabel = null; }
  }

  function clearMoveListeners() {
    radiusMoveListeners.forEach(l => naver.maps.Event.removeListener(l));
    radiusMoveListeners = [];
  }

  function deactivate() {
    radiusActive = false;
    btn.classList.remove('active');
    document.body.classList.remove('radius-mode');
    clearPreview();
    clearMoveListeners();
    if (radiusClickListener) { naver.maps.Event.removeListener(radiusClickListener); radiusClickListener = null; }
  }

  // 실제 원 확정 생성
  function finalizeCircle(latlng) {
    clearPreview();
    clearMoveListeners();

    const distKm = haversineKm(radiusPtCenter.lat(), radiusPtCenter.lng(), latlng.lat(), latlng.lng());
    const radiusM = distKm * 1000;
    const distStr = distKm >= 1 ? `${distKm.toFixed(2)} km` : `${Math.round(radiusM)} m`;
    const DEFAULT_COLOR = '#2196F3';

    const circle = new naver.maps.Circle({
      map,
      center: radiusPtCenter,
      radius: radiusM,
      fillColor: DEFAULT_COLOR,
      fillOpacity: 0.15,
      strokeColor: DEFAULT_COLOR,
      strokeWeight: 2,
      strokeOpacity: 0.8,
      clickable: true
    });

    const labelEl = document.createElement('div');
    labelEl.style.cssText = `display:inline-flex;align-items:center;gap:4px;background:${DEFAULT_COLOR};color:#fff;font-size:12px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap;border:2px solid ${DEFAULT_COLOR};box-shadow:0 2px 6px rgba(0,0,0,.25);cursor:default;`;
    const textSpan = document.createElement('span');
    textSpan.textContent = `반경 ${distStr}`;
    const delBtn = document.createElement('span');
    delBtn.textContent = '✕';
    delBtn.style.cssText = 'display:none;cursor:pointer;font-size:10px;opacity:0.65;line-height:1;';
    delBtn.title = '이 반경 삭제';
    labelEl.appendChild(textSpan);
    labelEl.appendChild(delBtn);
    labelEl.addEventListener('mouseenter', () => { delBtn.style.display = 'inline'; });
    labelEl.addEventListener('mouseleave', () => { delBtn.style.display = 'none'; });

    const label = new naver.maps.Marker({
      position: radiusPtCenter, map,
      icon: { content: labelEl, anchor: new naver.maps.Point(0, 0) }
    });

    const m = { centerMarker: radiusCenterMarker, circle, label, labelEl, fillColor: DEFAULT_COLOR };
    radiusHistory.push(m);
    radiusCenterMarker = null;
    updateClearAllBtn();

    delBtn.addEventListener('click', ev => { ev.stopPropagation(); removeRadius(m); });

    // 원 클릭 → 반경재기 모드일 때 새 클릭으로 처리 (기존 원 위에서도 클릭 가능)
    naver.maps.Event.addListener(circle, 'click', ev => {
      if (radiusActive) handleClick(ev.coord);
    });

    // 우클릭 → 색상 선택
    naver.maps.Event.addListener(circle, 'rightclick', ev => {
      const pe = ev.pointerEvent || ev.domEvent;
      if (pe) pe.preventDefault();
      colorTarget = m;
      customInput.value = m.fillColor || DEFAULT_COLOR;
      const x = pe ? pe.clientX : 200;
      const y = pe ? pe.clientY : 200;
      colorPicker.style.left = x + 'px';
      colorPicker.style.top  = y + 'px';
      colorPicker.style.display = 'flex';
    });

    deactivate();
  }

  // 클릭 처리 (map click, circle click 공용)
  function handleClick(latlng) {
    if (!radiusActive) return;
    if (radiusStep === 0) {
      radiusPtCenter = latlng;
      radiusCenterMarker = new naver.maps.Marker({
        position: latlng, map,
        icon: { content: makePinEl(), anchor: new naver.maps.Point(5, 5) }
      });
      radiusStep = 1;

      // 마우스 이동 시 실시간 미리보기
      // map + 기존 원 전체에 등록 (원 위에서도 mousemove 받기 위해)
      const moveHandler = ev => {
        const pos = ev.coord;
        const dKm = haversineKm(radiusPtCenter.lat(), radiusPtCenter.lng(), pos.lat(), pos.lng());
        const dM  = dKm * 1000;
        const dStr = dKm >= 1 ? `${dKm.toFixed(2)} km` : `${Math.round(dM)} m`;

        if (!previewCircle) {
          previewCircle = new naver.maps.Circle({
            map, center: radiusPtCenter, radius: dM,
            fillColor: '#2196F3', fillOpacity: 0.08,
            strokeColor: '#2196F3', strokeWeight: 2,
            strokeOpacity: 0.6, strokeStyle: 'shortdash',
            clickable: false
          });
          const pvEl = document.createElement('div');
          pvEl.style.cssText = 'background:rgba(33,150,243,0.85);color:#fff;font-size:12px;font-weight:700;padding:2px 8px;border-radius:8px;white-space:nowrap;pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.2);';
          pvEl.id = '_pvLabel';
          previewLabel = new naver.maps.Marker({
            position: pos, map,
            icon: { content: pvEl, anchor: new naver.maps.Point(-10, 20) },
            clickable: false
          });
        } else {
          previewCircle.setOptions({ radius: dM });
          previewLabel.setPosition(pos);
        }
        const pvEl = document.getElementById('_pvLabel');
        if (pvEl) pvEl.textContent = `반경 ${dStr}`;
      };

      radiusMoveListeners.push(naver.maps.Event.addListener(map, 'mousemove', moveHandler));
      radiusHistory.forEach(r => {
        radiusMoveListeners.push(naver.maps.Event.addListener(r.circle, 'mousemove', moveHandler));
      });
    } else {
      finalizeCircle(latlng);
    }
  }

  function activate() {
    radiusActive = true;
    btn.classList.add('active');
    document.body.classList.add('radius-mode');
    if (radiusCenterMarker) { radiusCenterMarker.setMap(null); radiusCenterMarker = null; }
    radiusStep = 0; radiusPtCenter = null;

    radiusClickListener = naver.maps.Event.addListener(map, 'click', e => handleClick(e.coord));
  }

  btn.addEventListener('click', () => {
    if (radiusActive) {
      deactivate();
      if (radiusCenterMarker) { radiusCenterMarker.setMap(null); radiusCenterMarker = null; }
      radiusStep = 0; radiusPtCenter = null;
    } else {
      activate();
    }
  });

  clearAllBtn.addEventListener('click', () => {
    if (radiusActive) {
      deactivate();
      if (radiusCenterMarker) { radiusCenterMarker.setMap(null); radiusCenterMarker = null; }
      radiusStep = 0; radiusPtCenter = null;
    }
    [...radiusHistory].forEach(r => removeRadius(r));
  });
}

// ─── 우클릭 → 시작지점 등록 ───
function setupMapRightClick() {
  const menu    = document.getElementById('mapContextMenu');
  const coords  = document.getElementById('ctxCoords');
  const overlay = document.getElementById('findwayOverlay');
  const iframe  = document.getElementById('findwayIframe');
  const closeBtn= document.getElementById('findwayClose');
  let pendingLatLng = null;

  // 오버레이 닫기
  closeBtn.addEventListener('click', () => { overlay.style.display = 'none'; iframe.src = ''; });

  const FW_MAX = 3;
  let fwToastTimer = null;

  function showFwToast() {
    const toast = document.getElementById('fwToast');
    toast.classList.add('show');
    clearTimeout(fwToastTimer);
    fwToastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function updateFwCheckboxStates() {
    const cbs = FW_IDS.map(id => document.getElementById('fw_' + id));
    const checkedCount = cbs.filter(cb => cb.checked).length;
    cbs.forEach(cb => {
      if (!cb.checked) cb.disabled = checkedCount >= FW_MAX;
    });
  }

  // 전체 토글 → 3개까지만 체크 (버튼 클릭 시 메뉴 닫히지 않도록 stopPropagation)
  document.getElementById('fwAllToggle').addEventListener('click', (e) => {
    e.stopPropagation();
    const cbs = FW_IDS.map(id => document.getElementById('fw_' + id));
    const checkedCount = cbs.filter(cb => cb.checked).length;
    if (checkedCount > 0) {
      // 하나라도 체크돼 있으면 전체 해제
      cbs.forEach(cb => { cb.checked = false; cb.disabled = false; });
    } else {
      // 전체 해제 상태면 처음 3개 체크
      cbs.forEach((cb, i) => { cb.checked = i < FW_MAX; cb.disabled = false; });
    }
    updateFwCheckboxStates();
  });

  // 각 체크박스 변경 시 3개 제한 적용
  FW_IDS.forEach(id => {
    const cb = document.getElementById('fw_' + id);
    cb.addEventListener('change', (e) => {
      e.stopPropagation();
      updateFwCheckboxStates();
    });
    // disabled 상태에서 클릭 시 토스트
    cb.parentElement.addEventListener('click', (e) => {
      e.stopPropagation();
      if (cb.disabled) showFwToast();
    });
  });

  // 길찾기 실행
  document.getElementById('fwGoBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    if (!pendingLatLng) return;
    const selected = FW_IDS.filter(id => document.getElementById('fw_' + id)?.checked);
    if (!selected.length) { alert('적어도 하나의 목적지를 선택하세요.'); return; }
    const url = `https://luciferhong.github.io/luciferhong/public3.html?startX=${pendingLatLng.lng()}&startY=${pendingLatLng.lat()}&selected=${selected.join(',')}`;
    //const url = `http://localhost:8000/public3.html?startX=${pendingLatLng.lng()}&startY=${pendingLatLng.lat()}&selected=${selected.join(',')}`;
    iframe.src = url;
    overlay.style.display = 'flex';
    menu.style.display = 'none';
    pendingLatLng = null;
  });

  // 체크박스 행 클릭 시 메뉴 닫히지 않게
  document.querySelectorAll('.ctx-dest-item').forEach(item => {
    item.addEventListener('click', (e) => e.stopPropagation());
  });

  // 초기 상태 적용
  updateFwCheckboxStates();

  naver.maps.Event.addListener(map, 'rightclick', (e) => {
    pendingLatLng = e.latlng;
    const lat = pendingLatLng.lat().toFixed(5);
    const lng = pendingLatLng.lng().toFixed(5);
    coords.textContent = `위도 ${lat}  경도 ${lng}`;

    const me = e.domEvent || e;
    let x = me.clientX + 6, y = me.clientY;
    menu.style.display = 'block';
    const mr = menu.getBoundingClientRect();
    if (x + mr.width  > window.innerWidth)  x = me.clientX - mr.width - 6;
    if (y + mr.height > window.innerHeight) y = window.innerHeight - mr.height - 4;
    menu.style.left = x + 'px';
    menu.style.top  = y + 'px';
  });

  function registerFromMap(idx) {
    if (!pendingLatLng) return;
    const lat  = pendingLatLng.lat();
    const lng  = pendingLatLng.lng();
    const dist = haversineKm(lat, lng, GANGNAM.lat, GANGNAM.lng).toFixed(2);
    customLabels[idx] = ['지점 1', '지점 2', '지점 3'][idx];
    const apt = {
      id: `map_${idx}_${Date.now()}`,
      name: LABEL_PREFIXES[idx] + customLabels[idx],
      lat, lng, year: '', units: '', sidoNm: '', sigunguNm: '', isCustom: true
    };
    selectedApt[idx] = apt;
    const selDiv = document.getElementById(`selected${idx + 1}`);
    const card   = document.getElementById(`card${idx + 1}`);
    selDiv.innerHTML = `<span>지도 선택 위치</span><span class="apt-dist">📍 ${dist} km</span>`;
    card.classList.add('has-selection');
    updateMapForApt(idx);
    menu.style.display = 'none';
    pendingLatLng = null;
  }

  document.getElementById('ctxApt1').addEventListener('click', () => registerFromMap(0));
  document.getElementById('ctxApt2').addEventListener('click', () => registerFromMap(1));
  document.getElementById('ctxApt3').addEventListener('click', () => registerFromMap(2));

  // 메뉴 닫기
  document.addEventListener('click', (e) => {
    if (!menu.contains(e.target)) menu.style.display = 'none';
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') menu.style.display = 'none';
  });
}

// ─── 초기화 ───
async function init() {
  map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(37.52, 127.03),
    zoom: 12,
    mapTypeId: naver.maps.MapTypeId.NORMAL
  });

  addGangnamMarker();
  setupMapRightClick();
  setupRuler();
  setupRadius();
  await loadApartments();
  setupSearch(0);
  setupSearch(1);
  setupSearch(2);
}

init();
</script>
