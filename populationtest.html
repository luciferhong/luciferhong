<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인구 지도</title>
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=9t8y33hyq8"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
  <style>
    :root {
      --bg: #f3f5f9;
      --panel: #ffffff;
      --line: #d8deea;
      --text: #162033;
      --muted: #5f6b82;
      --accent: #2459c6;
      --shadow: 0 8px 20px rgba(14, 28, 58, 0.14);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 8px rgba(20, 35, 64, 0.06);
      z-index: 2;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .filter-label {
      font-size: 12px;
      color: #304160;
      font-weight: 600;
      white-space: nowrap;
    }

    .filter-select {
      height: 34px;
      border: 1px solid #c7d3ea;
      border-radius: 8px;
      background: #fff;
      color: #162033;
      padding: 0 10px;
      font-size: 13px;
      min-width: 124px;
      outline: none;
      cursor: pointer;
    }

    .filter-select:focus {
      border-color: #2459c6;
      box-shadow: 0 0 0 3px rgba(36, 89, 198, 0.15);
    }

    #sigunguFilterWrapper {
      position: relative;
      min-width: 170px;
    }

    #sigunguFilterDisplay {
      height: 34px;
      border: 1px solid #c7d3ea;
      border-radius: 8px;
      background: #fff;
      color: #162033;
      padding: 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      user-select: none;
    }

    #sigunguFilterDisplay:hover {
      border-color: #9fb4e2;
    }

    #sigunguDisplayText {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 130px;
    }

    #sigunguToggleBtn {
      color: #526b9e;
      font-size: 12px;
      flex: 0 0 auto;
    }

    #sigunguFilterPanel {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 220px;
      max-height: 280px;
      overflow: auto;
      background: #fff;
      border: 1px solid #c7d3ea;
      border-radius: 10px;
      box-shadow: 0 10px 20px rgba(19, 36, 68, 0.18);
      padding: 8px;
      z-index: 30;
    }

    #sigunguFilterPanel.open {
      display: block;
    }

    .sigungu-option {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #243656;
      padding: 4px 2px;
      white-space: nowrap;
    }

    .sigungu-all-option {
      font-weight: 700;
      border-bottom: 1px solid #dde5f5;
      margin-bottom: 4px;
      padding-bottom: 6px;
    }

    .mode-btn {
      border: 1px solid #b8c6e5;
      background: #eef3ff;
      color: #1f3f88;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }

    .mode-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 4px 10px rgba(36, 89, 198, 0.3);
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
    }

    .label-control-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .label-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .label-slider-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .label-slider {
      width: 120px;
      height: 4px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .slider-value {
      font-size: 12px;
      color: var(--text);
      min-width: 32px;
      font-weight: 600;
    }

    .table-btn {
      border: 1px solid #b8c6e5;
      background: #eef3ff;
      color: #1f3f88;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }

    .table-btn:hover {
      background: #e0e8f5;
      border-color: #9fb4e2;
    }

    .chart-btn {
      border: 1px solid #b8c6e5;
      background: #eef3ff;
      color: #1f3f88;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }

    .chart-btn:hover {
      background: #e0e8f5;
      border-color: #9fb4e2;
    }

    .table-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 100;
    }

    .table-modal-overlay.open {
      display: block;
    }

    .table-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(14, 28, 58, 0.2);
      z-index: 101;
      height: 500px;
      width: 800px;
      flex-direction: column;
      resize: both;
      overflow: hidden;
      min-height: 300px;
      min-width: 400px;
    }

    .table-modal.open {
      display: flex;
    }

    .table-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .table-modal-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }

    .table-download-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--muted);
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .table-download-btn:hover {
      color: var(--accent);
    }

    .table-modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--muted);
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .table-modal-close:hover {
      color: var(--text);
    }

    .table-modal-content {
      overflow: auto;
      flex: 1;
      padding: 16px 20px;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .data-table thead {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 2px solid var(--accent);
    }

    .data-table th {
      padding: 10px 12px;
      text-align: left;
      font-weight: 700;
      color: var(--text);
      word-break: keep-all;
      min-width: 80px;
    }

    .data-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--text);
    }

    .data-table tbody tr:hover {
      background: rgba(36, 89, 198, 0.05);
    }

    .age-chart-modal {
      width: min(98vw, 1600px);
      height: min(88vh, 820px);
      min-width: 700px;
      min-height: 420px;
    }

    .age-chart-content {
      flex: 1;
      min-height: 0;
      padding: 8px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .age-chart-status {
      font-size: 12px;
      color: #4f5f7b;
      min-height: 18px;
    }

    .age-chart-tabs-bar {
      display: flex;
      gap: 0;
      flex-shrink: 0;
      border-bottom: 2px solid var(--line);
      margin-bottom: 8px;
    }

    .age-chart-tab-btn {
      padding: 6px 20px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      background: none;
      color: #8090a8;
      cursor: pointer;
      border-radius: 4px 4px 0 0;
      transition: color 0.15s, border-color 0.15s;
    }

    .age-chart-tab-btn:hover {
      color: var(--text);
    }

    .age-chart-tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .age-chart-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .age-chart-panel {
      flex: 1;
      min-height: 0;
      display: flex;
    }

    #ageChartPanel {
      position: relative;
    }

    .age-chart-wrap {
      position: absolute;
      inset: 0;
    }

    #agePopulationChart {
      width: 100%;
      height: 100%;
    }

    #ageTablePanel {
      flex-direction: row;
      gap: 12px;
    }

    .age-table-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .age-table-title {
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .age-table-scroll {
      overflow: auto;
      flex: 1;
      min-height: 0;
    }

    .age-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      white-space: nowrap;
    }

    .age-table thead {
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 1;
    }

    .age-table th {
      padding: 5px 7px;
      text-align: right;
      font-weight: 700;
      color: var(--text);
      border-bottom: 2px solid var(--accent);
    }

    .age-table th:first-child {
      text-align: left;
    }

    .age-table td {
      padding: 4px 7px;
      text-align: right;
      border-bottom: 1px solid var(--line);
      color: var(--text);
    }

    .age-table td:first-child {
      text-align: left;
      font-weight: 600;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .age-table tbody tr:nth-child(1) td {
      background: rgba(36,89,198,0.07);
      font-weight: 700;
    }

    .age-table tbody tr:hover td {
      background: rgba(36,89,198,0.04);
    }

    .map-wrap {
      position: relative;
      min-height: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .legend {
      position: absolute;
      right: 12px;
      bottom: 12px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 10px;
      width: 190px;
      z-index: 3;
    }

    .legend-title {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
      font-size: 12px;
      color: #32405f;
    }

    .legend-swatch {
      width: 18px;
      height: 12px;
      border: 1px solid rgba(0, 0, 0, 0.18);
      border-radius: 2px;
      flex: 0 0 auto;
    }

    .info {
      position: absolute;
      left: 12px;
      bottom: 12px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 10px 12px;
      width: min(280px, calc(100vw - 24px));
      z-index: 3;
      font-size: 13px;
      line-height: 1.45;
    }

    .info-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .info-line {
      color: #314265;
      margin: 2px 0;
    }

    .loading {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 4;
      background: rgba(22, 32, 51, 0.86);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    @media (max-width: 700px) {
      html, body {
        height: auto;
        min-height: 100%;
        overflow-y: auto;
      }

      #app {
        height: auto;
        min-height: 100dvh;
        grid-template-rows: auto auto;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        padding: 10px 12px;
      }

      .title {
        font-size: 15px;
        line-height: 1.25;
        white-space: normal;
      }

      .controls {
        width: 100%;
        gap: 8px;
        align-items: stretch;
      }

      .table-btn,
      .chart-btn,
      .mode-btn {
        flex: 1 1 calc(50% - 4px);
        min-width: 0;
        padding: 9px 10px;
        font-size: 13px;
        text-align: center;
      }

      .filter-group {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .filter-label {
        flex: 0 0 56px;
        font-size: 11px;
      }

      .filter-select {
        flex: 1 1 auto;
        min-width: 0;
        height: 40px;
        font-size: 16px;
      }

      #sigunguFilterWrapper {
        flex: 1 1 auto;
        min-width: 0;
      }

      #sigunguFilterDisplay {
        height: 40px;
        font-size: 16px;
      }

      #sigunguFilterPanel {
        min-width: 100%;
        max-width: calc(100vw - 24px);
        max-height: min(280px, 46vh);
      }

      #sigunguDisplayText {
        max-width: none;
      }

      .label-control-group {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .label-slider-wrapper {
        flex: 1 1 160px;
        min-width: 0;
      }

      .label-slider {
        width: 100%;
      }

      .hint {
        width: 100%;
        font-size: 11px;
        line-height: 1.35;
      }

      .legend {
        display: none;
      }

      .info {
        display: none;
      }

      .map-wrap {
        min-height: 100dvh;
      }

      #map {
        height: 100dvh;
      }

      .table-modal {
        width: calc(100vw - 12px);
        min-width: 0;
        max-width: calc(100vw - 12px);
        min-height: 240px;
        resize: none;
      }

      .table-modal-header {
        padding: 12px 14px;
      }

      .table-modal-content {
        padding: 10px 12px;
      }

      .age-chart-modal {
        width: calc(100vw - 12px);
        height: min(90vh, 720px);
        min-width: 0;
        min-height: 320px;
      }

      .age-chart-content {
        padding: 8px 10px 10px;
      }

      .age-chart-tabs-bar {
        gap: 0;
      }

      .age-chart-tab-btn {
        flex: 1;
        padding: 8px 4px;
        font-size: 12px;
      }

      #ageChartPanel {
        position: relative;
      }

      .age-chart-wrap {
        position: absolute;
        inset: 0;
      }

      #ageTablePanel {
        flex-direction: row;
        gap: 8px;
      }

      .age-table-section {
        flex: 1;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="title">[루시퍼홍] 인구 지도</div>
      <div class="controls">
        <button id="btnTableView" class="table-btn" type="button">테이블 보기</button>
        <button id="btnAgeChartView" class="chart-btn" type="button">연령 차트 보기</button>
        <button id="btnEmd" class="mode-btn active" type="button">법정동</button>
        <button id="btnAdm" class="mode-btn" type="button">행정동</button>
        <span class="filter-group">
          <span class="filter-label">시도</span>
          <select id="sidoFilter" class="filter-select"></select>
        </span>
        <span class="filter-group">
          <span class="filter-label">시군구</span>
          <div id="sigunguFilterWrapper">
            <div id="sigunguFilterDisplay">
              <span id="sigunguDisplayText">전체</span>
              <span id="sigunguToggleBtn">▼</span>
            </div>
            <div id="sigunguFilterPanel"></div>
          </div>
        </span>
        <span class="label-control-group">
          <input type="checkbox" id="alwaysShowLabelsCheckbox" class="label-checkbox" checked />
          <span class="filter-label">동이름 항상 표시</span>
        </span>
        <span class="label-control-group">
          <span class="filter-label">라벨 크기</span>
          <div class="label-slider-wrapper">
            <input type="range" id="labelScaleSlider" class="label-slider" min="20" max="300" value="100" />
            <span class="slider-value"><span id="sliderValueText">100</span>%</span>
          </div>
        </span>
        <span class="label-control-group">
          <span class="filter-label">배경 투명도</span>
          <div class="label-slider-wrapper">
            <input type="range" id="fillOpacitySlider" class="label-slider" min="0" max="100" value="74" />
            <span class="slider-value"><span id="fillOpacityValueText">74</span>%</span>
          </div>
        </span>
        <div id="status" class="hint">법정동 로딩 준비</div>
      </div>
    </div>

    <div class="map-wrap">
      <div id="map"></div>
      <div id="loading" class="loading">데이터 로딩 중...</div>
      <div id="legend" class="legend"></div>
      <div id="info" class="info">
        <div class="info-title">지역을 선택하세요</div>
        <div class="info-line">지도에서 동 경계를 클릭하면 상세 인구 정보를 보여줍니다.</div>
      </div>
    </div>

    <div id="tableModalOverlay" class="table-modal-overlay"></div>
    <div id="tableModal" class="table-modal">
      <div class="table-modal-header">
        <div class="table-modal-title">동별 인구 데이터</div>
        <button id="tableDownloadBtn" class="table-download-btn" type="button" title="엑셀로 다운로드">📥</button>
        <button id="tableModalClose" class="table-modal-close" type="button">×</button>
      </div>
      <div class="table-modal-content">
        <table class="data-table" id="dataTable">
          <thead>
            <tr>
              <th>시도</th>
              <th>시군구</th>
              <th>동이름</th>
              <th>인구수</th>
              <th>세대당 인구</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <div id="ageChartModalOverlay" class="table-modal-overlay"></div>
    <div id="ageChartModal" class="table-modal age-chart-modal">
      <div class="table-modal-header">
        <div class="table-modal-title" id="ageChartModalTitle">법정동 연령별 인구 차트</div>
        <button id="ageChartModalClose" class="table-modal-close" type="button">×</button>
      </div>
      <div class="age-chart-content">
        <div id="ageChartStatus" class="age-chart-status"></div>
        <div class="age-chart-tabs-bar">
          <button class="age-chart-tab-btn active" id="ageTabChart" data-tab="chart" type="button">차트</button>
          <button class="age-chart-tab-btn" id="ageTabTable" data-tab="table" type="button">테이블</button>
          <button id="ageTableDownloadBtn" class="table-download-btn" type="button" title="엑셀로 다운로드" style="margin-left:auto;display:none;">&#128229;</button>
        </div>
        <div class="age-chart-body">
          <div class="age-chart-panel" id="ageChartPanel">
            <div class="age-chart-wrap">
              <canvas id="agePopulationChart"></canvas>
            </div>
          </div>
          <div class="age-chart-panel" id="ageTablePanel" style="display:none;">
            <div class="age-table-section">
              <div class="age-table-title">비율 (%)</div>
              <div class="age-table-scroll">
                <table class="age-table" id="agePercentTable"><tbody></tbody></table>
              </div>
            </div>
            <div class="age-table-section">
              <div class="age-table-title">인구수 (명)</div>
              <div class="age-table-scroll">
                <table class="age-table" id="ageCountTable"><tbody></tbody></table>
              </div>
            </div>

  <script>

    // 저 -> 고 백분위: 채도는 살리고 톤은 정돈한 팔레트

    const SIDO_NAME_BY_CODE = {

    const state = {

    function setLoading(on, message) {
      const el = document.getElementById("loading");
      el.textContent = message || "데이터 로딩 중...";

    function isMobileViewport() {

    }

    function syncResponsiveMapControls() {
      if (!state.map || typeof state.map.setOptions !== "function") return;
      state.map.setOptions({

      });
    }

    function formatNumber(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n.toLocaleString("ko-KR") : "-";
    }

    function syncTableModalHeightToMap() {
      const modal = document.getElementById("tableModal");
      const mapEl = document.getElementById("map");
      if (!modal) return;

      const mapHeight = mapEl ? mapEl.clientHeight : 0;
      const viewportMax = Math.max(300, window.innerHeight - 80);
      const target = mapHeight > 0 ? Math.round(mapHeight * 0.8) : Math.round(window.innerHeight * 0.8);
      const clamped = Math.min(viewportMax, Math.max(300, target));

      modal.style.height = `${clamped}px`;
    }

    function showTableModal() {
      const overlay = document.getElementById("tableModalOverlay");
      const modal = document.getElementById("tableModal");
      syncTableModalHeightToMap();
      if (overlay) overlay.classList.add("open");
      if (modal) modal.classList.add("open");
      renderTableData();
      initTableModal();  // 테이블 헤더 클릭 및 리사이징 이벤트 초기화
    }

    function hideTableModal() {
      const overlay = document.getElementById("tableModalOverlay");
      const modal = document.getElementById("tableModal");
      if (overlay) overlay.classList.remove("open");
      if (modal) modal.classList.remove("open");
    }

    function setAgeChartStatus(text) {
      const el = document.getElementById("ageChartStatus");
      if (el) el.textContent = text || "";
    }

    function showAgeChartModal() {
      const overlay = document.getElementById("ageChartModalOverlay");
      const modal = document.getElementById("ageChartModal");
      if (overlay) overlay.classList.add("open");
      if (modal) modal.classList.add("open");
      // 현재 모드에 맞게 제목 업데이트
      const titleEl = document.getElementById("ageChartModalTitle");
      if (titleEl) titleEl.textContent = state.mode === MODE.ADM ? "행정동 연령별 인구 차트" : "법정동 연령별 인구 차트";
      // 차트 탭으로 초기화
      switchAgeChartTab("chart");
      void renderAgeChartFromExcel();
    }

    function switchAgeChartTab(tab) {
      const chartPanel = document.getElementById("ageChartPanel");
      const tablePanel = document.getElementById("ageTablePanel");
      const btnChart = document.getElementById("ageTabChart");
      const btnTable = document.getElementById("ageTabTable");
      const dlBtn = document.getElementById("ageTableDownloadBtn");
      if (!chartPanel || !tablePanel) return;
      const isChart = tab === "chart";
      chartPanel.style.display = isChart ? "" : "none";
      tablePanel.style.display = isChart ? "none" : "";
      if (dlBtn) dlBtn.style.display = isChart ? "none" : "";
      if (btnChart) btnChart.classList.toggle("active", isChart);
      if (btnTable) btnTable.classList.toggle("active", !isChart);
      // Chart.js resize 트리거
      if (isChart && state.ageChart) {
        requestAnimationFrame(() => state.ageChart.resize());
      }
    }

    function hideAgeChartModal() {
      const overlay = document.getElementById("ageChartModalOverlay");
      const modal = document.getElementById("ageChartModal");
      if (overlay) overlay.classList.remove("open");
      if (modal) modal.classList.remove("open");
    }

    function toNumberSafe(v) {
      if (typeof v === "number") return Number.isFinite(v) ? v : 0;
      const n = Number(String(v == null ? "" : v).replace(/[,%\s]/g, ""));
      return Number.isFinite(n) ? n : 0;
    }

    function normalizeHeaderName(v) {
      return String(v == null ? "" : v).replace(/\s+/g, "").replace(/~/g, "-").trim();
    }

    function resolveAgeBandIndexes(headers) {
      const out = {
        band0: [],
        band10: [],
        band20: [],
        band30: [],
        band50: [],
        band60: []
      };

      const startsWithAge = (h, start, end) => h.startsWith(`${start}-${end}`) || h.startsWith(`${start}세${end}세`);

      headers.forEach((raw, idx) => {
        const h = normalizeHeaderName(raw);
        if (!h) return;
        if (startsWithAge(h, 0, 9) || h.includes("9세이하")) out.band0.push(idx);
        if (startsWithAge(h, 10, 19)) out.band10.push(idx);
        if (startsWithAge(h, 20, 29)) out.band20.push(idx);
        if (h.startsWith("30-49") || h.startsWith("30세49세") || startsWithAge(h, 30, 39) || startsWithAge(h, 40, 49)) out.band30.push(idx);
        if (startsWithAge(h, 50, 59)) out.band50.push(idx);
        if (
          h.includes("60세이상")
          || startsWithAge(h, 60, 69)
          || startsWithAge(h, 70, 79)
          || startsWithAge(h, 80, 89)
          || startsWithAge(h, 90, 99)
          || h.startsWith("100세이상")
          || h.startsWith("100-")
        ) out.band60.push(idx);
      });

      return out;
    }

    function pickLabelIndex(headers) {
      const preferred = ["법정동", "읍면동", "행정동", "동", "지역", "행정기관"];
      for (const key of preferred) {
        const idx = headers.findIndex((h) => String(h || "").includes(key));
        if (idx >= 0) return idx;
      }
      return 0;
    }

    async function loadAgeChartRowsOnce(mode) {
      const cacheKey = mode || MODE.EMD;
      if (Array.isArray(state.ageChartRowsCache[cacheKey])) return state.ageChartRowsCache[cacheKey];

      const isAdm = cacheKey === MODE.ADM;
      const jsonBase = isAdm ? "age_population_adm" : "age_population_emd";
      const jsonCandidates = [
        `./${jsonBase}.json`,
        `./luciferhong/${jsonBase}.json`,
        `/luciferhong/${jsonBase}.json`
      ];

      for (const p of jsonCandidates) {
        try {
          const jr = await fetch(encodeURI(p));
          if (!jr.ok) continue;
          const payload = await jr.json();
          const rows = Array.isArray(payload) ? payload : payload?.rows;
          if (Array.isArray(rows) && rows.length > 0) {
            state.ageChartRowsCache[cacheKey] = rows.map((r) => ({
              label: String(r.label || "").trim(),
              fullName: String(r.fullName || r.label || "").trim(),
              code: normalizeDigits(r.code || ""),
              values: Array.isArray(r.values) ? r.values.map((v) => toNumberSafe(v)) : [],
              total: toNumberSafe(r.total)
            })).filter((r) => r.label && r.values.length === 6 && r.total > 0);
            if (state.ageChartRowsCache[cacheKey].length > 0) return state.ageChartRowsCache[cacheKey];
          }
        } catch (_) {}
      }

      // ADM 모드는 xlsx 폴백 없음 (JSON 전용)
      if (isAdm) {
        throw new Error("행정동 연령 데이터 파일을 찾을 수 없습니다. age_population_adm.json 경로를 확인하세요.");
      }

      const xlsx = window.XLSX;
      if (!xlsx || !xlsx.utils) {
        throw new Error("연령 JSON/엑셀 파일을 불러오지 못했습니다.");
      }

      const candidates = [
        "./age_population_emd.xlsx",
        "./법정동연령별인구.xlsx",
        "./luciferhong/age_population_emd.xlsx",
        "./luciferhong/법정동연령별인구.xlsx",
        "/luciferhong/age_population_emd.xlsx",
        "/luciferhong/법정동연령별인구.xlsx"
      ];

      let res = null;
      for (const p of candidates) {
        try {
          const r = await fetch(encodeURI(p));
          if (r.ok) {
            res = r;
            break;
          }
        } catch (_) {}
      }

      if (!res) {
        throw new Error("연령 데이터 파일을 찾을 수 없습니다. age_population_emd.json 또는 xlsx 경로를 확인하세요.");
      }

      const buf = await res.arrayBuffer();
      const wb = xlsx.read(buf, { type: "array" });
      const firstSheetName = wb.SheetNames[0];
      const ws = wb.Sheets[firstSheetName];
      const aoa = xlsx.utils.sheet_to_json(ws, { header: 1, defval: "" });
      if (!aoa.length) throw new Error("엑셀 데이터가 비어 있습니다.");

      const headers = aoa[0].map((h) => String(h || "").trim());
      const labelIdx = pickLabelIndex(headers);
      const bandIdx = resolveAgeBandIndexes(headers);

      const rows = [];
      for (let i = 1; i < aoa.length; i += 1) {
        const row = aoa[i];
        const label = String(row[labelIdx] || "").trim();
        if (!label) continue;

        const sumByIndexes = (indexes) => indexes.reduce((acc, idx) => acc + toNumberSafe(row[idx]), 0);

        const v0 = sumByIndexes(bandIdx.band0);
        const v10 = sumByIndexes(bandIdx.band10);
        const v20 = sumByIndexes(bandIdx.band20);
        const v30 = sumByIndexes(bandIdx.band30);
        const v50 = sumByIndexes(bandIdx.band50);
        const v60 = sumByIndexes(bandIdx.band60);

        const total = v0 + v10 + v20 + v30 + v50 + v60;
        if (total <= 0) continue;

        rows.push({
          label,
          code: normalizeDigits(label),
          values: [v0, v10, v20, v30, v50, v60],
          total
        });
      }

      state.ageChartRowsCache[cacheKey] = rows;
      return rows;
    }

    function buildAgeChartRowsForCurrentSelection(sourceRows) {
      const cleanedSource = (sourceRows || []).filter((r) => {
        const raw = String(r?.label || "").trim();
        const code = normalizeDigits(r?.code || "");
        // 코드가 유효하면 숫자 라벨이어도 유지한다.
        if (code.length >= 5) return true;
        return raw && !/^\d+$/.test(raw);
      });

      const selectedSigunguCodes = new Set(Array.from(state.filters?.sigunguCodes || []).map((c) => String(c).trim()).filter(Boolean));
      const activeSidoCodes = getActiveSidoCodes();
      const allowedSigunguCodes = selectedSigunguCodes.size === 0 ? getAllowedSigunguCodesForCurrentFilter() : null;

      const scoped = cleanedSource.filter((r) => {
        const rowCode = normalizeDigits(r?.code || r?.label || "");
        if (!rowCode || rowCode.length < 5) return false;
        const rowSidoCode = rowCode.slice(0, 2);
        const rowSigunguCode = rowCode.slice(0, 5);

        if (selectedSigunguCodes.size > 0) return selectedSigunguCodes.has(rowSigunguCode);
        if (allowedSigunguCodes && allowedSigunguCodes.size > 0 && !allowedSigunguCodes.has(rowSigunguCode)) return false;
        if (activeSidoCodes && activeSidoCodes.size > 0) return activeSidoCodes.has(rowSidoCode);
        return true;
      });

      // 시군구가 전체(미선택)면 시군구 단위로 집계해서 표시
      if (selectedSigunguCodes.size === 0) {
        const bySigungu = new Map();
        for (const r of scoped) {
          const rowCode = normalizeDigits(r?.code || r?.label || "");
          if (rowCode.length < 5) continue;
          const sggCode = rowCode.slice(0, 5);
          const sggName = (state.sggNameByCode && state.sggNameByCode[sggCode]) || sggCode;

          if (!bySigungu.has(sggCode)) {
            bySigungu.set(sggCode, {
              label: sggCode,
              displayLabel: sggName,
              values: [0, 0, 0, 0, 0, 0],
              total: 0
            });
          }

          const acc = bySigungu.get(sggCode);
          const vals = Array.isArray(r?.values) ? r.values : [];
          for (let i = 0; i < 6; i += 1) acc.values[i] += Number(vals[i] || 0);
          acc.total += Number(r?.total || 0);
        }

        let target = Array.from(bySigungu.values());
        target.sort((a, b) => b.total - a.total);
        return target;
      }

      // 같은 동 이름이 여러 코드로 쪼개진 경우(예: 리 단위) 하나로 합산해 중복 표시를 방지
      const merged = new Map();
      for (const r of scoped) {
        const label = String(r?.label || "").trim();
        // 순수 숫자 라벨은 시군구 집계 레코드(예: 2711000000)이므로 동 단위 표시에서 제외
        if (!label || /^\d+$/.test(label)) continue;

        if (!merged.has(label)) {
          merged.set(label, {
            label,
            displayLabel: label,
            values: [0, 0, 0, 0, 0, 0],
            total: 0
          });
        }

        const acc = merged.get(label);
        const vals = Array.isArray(r?.values) ? r.values : [];
        for (let i = 0; i < 6; i += 1) acc.values[i] += Number(vals[i] || 0);
        acc.total += Number(r?.total || 0);
      }

      let target = Array.from(merged.values());
      target.sort((a, b) => b.total - a.total);
      return target;
    }

    function getCurrentSigunguDisplayName() {
      const codes = Array.from(state.filters?.sigunguCodes || []);
      if (!codes.length) return getSidoFilterLabel(state.filters?.sidoCode);
      if (codes.length === 1) {
        const code = String(codes[0]);
        return (state.sggNameByCode && state.sggNameByCode[code]) || code;
      }
      return "선택 시군구";
    }

    function prependSigunguAggregateRow(rows) {
      if (!Array.isArray(rows) || rows.length === 0) return rows;

      const sum = [0, 0, 0, 0, 0, 0];
      let total = 0;
      for (const r of rows) {
        const vals = Array.isArray(r.values) ? r.values : [];
        for (let i = 0; i < 6; i += 1) {
          sum[i] += Number(vals[i] || 0);
        }
        total += Number(r.total || 0);
      }

      if (total <= 0) return rows;

      const sigunguRow = {
        label: "sigungu-total",
        displayLabel: getCurrentSigunguDisplayName(),
        values: sum,
        total
      };

      return [sigunguRow, ...rows];
    }

    async function renderAgeChartFromExcel() {
      try {
        if (!window.Chart) {
          throw new Error("차트 라이브러리를 불러오지 못했습니다.");
        }

        setAgeChartStatus("연령 데이터를 읽는 중...");
        const currentMode = state.mode;
        const rows = await loadAgeChartRowsOnce(currentMode);
        const drawRowsRaw = buildAgeChartRowsForCurrentSelection(rows);
        const drawRows = prependSigunguAggregateRow(drawRowsRaw);
        if (!drawRows.length) {
          setAgeChartStatus("표시할 연령 데이터가 없습니다.");
          return;
        }

        const labels = drawRows.map((r) => r.displayLabel || r.label);
        const percent = (index) => drawRows.map((r) => Math.round((r.values[index] / r.total) * 1000) / 10);

        const datasets = [
          { label: "0~9세", data: percent(0), backgroundColor: "#4cc9f0", stack: "age" },
          { label: "10~19세", data: percent(1), backgroundColor: "#ff9f1c", stack: "age" },
          { label: "20~29세", data: percent(2), backgroundColor: "#2ec4b6", stack: "age" },
          { label: "30~49세", data: percent(3), backgroundColor: "#5e60ce", stack: "age" },
          { label: "50~59세", data: percent(4), backgroundColor: "#f15bb5", stack: "age" },
          { label: "60세 이상", data: percent(5), backgroundColor: "#8ac926", stack: "age" }
        ];

        const canvas = document.getElementById("agePopulationChart");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");

        if (state.ageChartInstance) {
          state.ageChartInstance.destroy();
          state.ageChartInstance = null;
        }

        const plugins = [];
        if (window.ChartDataLabels) plugins.push(window.ChartDataLabels);

        state.ageChartInstance = new Chart(ctx, {
          type: "bar",
          data: { labels, datasets },
          plugins,
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: {
              legend: {
                position: "bottom"
              },
              tooltip: {
                callbacks: {
                  label: (context) => `${context.dataset.label}: ${context.parsed.y}%`
                }
              },
              datalabels: {
                color: "#ffffff",
                clamp: true,
                formatter: (value) => (value >= 3 ? `${Math.round(value)}%` : ""),
                font: {
                  weight: "700",
                  size: 10
                },
                anchor: "center",
                align: "center"
              }
            },
            scales: {
              x: {
                stacked: true,
                ticks: {
                  maxRotation: 55,
                  minRotation: 55,
                  autoSkip: false
                },
                grid: { display: false }
              },
              y: {
                stacked: true,
                min: 0,
                max: 100,
                ticks: {
                  callback: (value) => `${value}%`
                }
              }
            }
          }
        });

        setAgeChartStatus(`총 ${drawRows.length.toLocaleString("ko-KR")}개 지역 표시`);
        renderAgeTables(drawRows);
      } catch (err) {
        console.error(err);
        setAgeChartStatus(String(err?.message || "차트를 불러오지 못했습니다."));
      }
    }

    function renderAgeTables(drawRows) {
      state.lastAgeChartDrawRows = drawRows;
      const BANDS = ["0~9세", "10~19세", "20~29세", "30~49세", "50~59세", "60세이상"];
      const headerHtml = `<thead><tr><th>지역</th>${BANDS.map(b => `<th>${b}</th>`).join("")}<th>합계</th></tr></thead>`;

      function buildRows(valueFn, totalFn) {
        return drawRows.map(r => {
          const cells = r.values.map((_, i) => `<td>${valueFn(r, i)}</td>`).join("");
          return `<tr><td title="${r.displayLabel || r.label}">${r.displayLabel || r.label}</td>${cells}<td>${totalFn(r)}</td></tr>`;
        }).join("");
      }

      const pct = (r, i) => r.total > 0 ? (r.values[i] / r.total * 100).toFixed(1) + "%" : "-";
      const pctTotal = () => "100%";
      const cnt = (r, i) => Math.round(r.values[i]).toLocaleString("ko-KR");
      const cntTotal = r => Math.round(r.total).toLocaleString("ko-KR");

      const pTbl = document.getElementById("agePercentTable");
      const cTbl = document.getElementById("ageCountTable");
      if (pTbl) pTbl.innerHTML = headerHtml + `<tbody>${buildRows(pct, pctTotal)}</tbody>`;
      if (cTbl) cTbl.innerHTML = headerHtml + `<tbody>${buildRows(cnt, cntTotal)}</tbody>`;
    }

    function renderTableData() {
      const tableBody = document.getElementById("tableBody");
      if (!tableBody) return;
      tableBody.innerHTML = "";

      if (!Array.isArray(state.labels) || state.labels.length === 0) {
        const tr = document.createElement("tr");
        tr.innerHTML = "<td colspan='5' style='text-align:center; padding:20px; color:#5f6b82;'>데이터가 없습니다</td>";
        tableBody.appendChild(tr);
        return;
      }

          default: aVal = 0; bVal = 0;
        }
        if (typeof aVal === "string") aVal = aVal.toLowerCase();
        if (typeof bVal === "string") bVal = bVal.toLowerCase();
        if (aVal < bVal) return isAsc ? -1 : 1;
        if (aVal > bVal) return isAsc ? 1 : -1;

    let tableResizeInitialized = false;

    function initTableModalResize() {
      if (tableResizeInitialized) return;
      tableResizeInitialized = true;

      const modal = document.getElementById("tableModal");
      let isResizing = false;
      let current = { x: 0, y: 0, width: 0, height: 0 };

      modal.addEventListener("mousedown", (e) => {
        const rect = modal.getBoundingClientRect();
        const edge = getResizeEdge(e, rect);
        if (!edge) return;

        isResizing = true;
        current.x = e.clientX;
        current.y = e.clientY;
        current.width = modal.offsetWidth;
        current.height = modal.offsetHeight;
        current.top = parseFloat(modal.style.top) || window.innerHeight / 2;
        current.left = parseFloat(modal.style.left) || window.innerWidth / 2;
        current.edge = edge;
        e.preventDefault();
      });

      document.addEventListener("mousemove", (e) => {
        if (!isResizing) return;
        const deltaX = e.clientX - current.x;
        const deltaY = e.clientY - current.y;
        const edge = current.edge;

        let newW = current.width;
        let newH = current.height;
        let newL = current.left;
        let newT = current.top;

        if (edge.right) newW = current.width + deltaX;
        if (edge.left) { newW = current.width - deltaX; newL = current.left + deltaX; }
        if (edge.bottom) newH = current.height + deltaY;
        if (edge.top) { newH = current.height - deltaY; newT = current.top + deltaY; }

        if (newW >= 400) {
          modal.style.width = newW + "px";
          if (edge.left) modal.style.left = newL + "px";
        }
        if (newH >= 300) {
          modal.style.height = newH + "px";
          if (edge.top) modal.style.top = newT + "px";
        }
      });

      document.addEventListener("mouseup", () => {
        isResizing = false;
      });
    }

    function getResizeEdge(e, rect) {
      const edge = { top: false, bottom: false, left: false, right: false };
      const margin = 10;

      if (e.clientY - rect.top < margin) edge.top = true;
      if (rect.bottom - e.clientY < margin) edge.bottom = true;
      if (e.clientX - rect.left < margin) edge.left = true;
      if (rect.right - e.clientX < margin) edge.right = true;

      return (edge.top || edge.bottom || edge.left || edge.right) ? edge : null;
    }

    let lastResizeEdge = null;

    function downloadCsvFallback(headers, rows, fileName) {
      const escapeCsv = (value) => {
        const s = String(value == null ? "" : value);
        if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
        return s;
      };

      const csvLines = [
        headers.map(escapeCsv).join(","),
        ...rows.map((row) => row.map(escapeCsv).join(","))
      ];

      // UTF-8 BOM을 포함하면 엑셀에서 한글이 깨지지 않음
      const csvText = "\uFEFF" + csvLines.join("\r\n");
      const blob = new Blob([csvText], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function updateModalCursor() {
      const modal = document.getElementById("tableModal");
      if (!modal) return;

      modal.addEventListener("mousemove", (e) => {
        const rect = modal.getBoundingClientRect();
        const edge = getResizeEdge(e, rect);

        if (!edge) {
          modal.style.cursor = "default";
          lastResizeEdge = null;
          return;
        }

        if (edge.top && edge.left) modal.style.cursor = "nwse-resize";
        else if (edge.top && edge.right) modal.style.cursor = "nesw-resize";
        else if (edge.bottom && edge.left) modal.style.cursor = "nesw-resize";
        else if (edge.bottom && edge.right) modal.style.cursor = "nwse-resize";
        else if (edge.top || edge.bottom) modal.style.cursor = "ns-resize";
        else if (edge.left || edge.right) modal.style.cursor = "ew-resize";

        lastResizeEdge = edge;
      });
    }

    function normalizeDigits(value) {
      return String(value == null ? "" : value).replace(/\D/g, "");
    }

    function getEmdCode(props) {
      const candidates = [
        props?.A1,
        props?.emd_cd,
        props?.EMD_CD,
        props?.code,
        props?.CODE,
        props?.dong_cd,
        props?.DONG_CD
      ];
      for (const c of candidates) {
        const d = normalizeDigits(c);
        if (d.length === 8) return d;
      }
      return "";
    }

    function getAdmCode(props) {
      const candidates = [
        props?.adm_cd2,
        props?.ADM_CD2,
        props?.adm_cd,
        props?.ADM_CD,
        props?.code,
        props?.CODE
      ];
      for (const c of candidates) {
        const d = normalizeDigits(c);
        if (d.length === 10) return d;
      }
      return "";
    }

    function getAreaCode(mode, props) {
      return mode === MODE.EMD ? getEmdCode(props) : getAdmCode(props);
    }

    function getAreaName(mode, props, popItem) {
      if (mode === MODE.EMD) {
        return props?.A2 || popItem?.name || "(이름 없음)";
      }
      const raw = props?.adm_nm || popItem?.name || "";
      const tokens = String(raw).trim().split(/\s+/).filter(Boolean);
      return tokens.length ? tokens[tokens.length - 1] : "(이름 없음)";
    }

    function getSidoCode(mode, props, areaCode) {
      if (mode === MODE.ADM) {
        const c = normalizeDigits(props?.adm_cd2 || props?.adm_cd || areaCode);
        return c.slice(0, 2);
      }
      const c = normalizeDigits(areaCode || props?.A1);
      return c.slice(0, 2);
    }

    function getSggCode(mode, props, areaCode) {
      if (mode === MODE.ADM) {
        const c = normalizeDigits(props?.adm_cd2 || props?.adm_cd || areaCode);
        return c.slice(0, 5);
      }
      const c = normalizeDigits(areaCode || props?.A1 || props?.A4);
      if (c.length >= 5) return c.slice(0, 5);
      const p = normalizeDigits(props?.A4);
      return p.length >= 5 ? p.slice(0, 5) : "";
    }

    function getSidoName(sidoCode, props) {
      return props?.sidonm || SIDO_NAME_BY_CODE[sidoCode] || sidoCode || "기타";
    }

    function getSggName(sggCode, props) {
      return props?.sggnm || (state.sggNameByCode && state.sggNameByCode[sggCode]) || sggCode || "기타";
    }

    function geometryToPathSets(geometry) {
      if (!geometry || !geometry.type || !Array.isArray(geometry.coordinates)) return [];
      const out = [];

      if (geometry.type === "Polygon") {
        const outer = geometry.coordinates[0] || [];
        if (outer.length >= 3) {
          out.push(outer.map(([lng, lat]) => new naver.maps.LatLng(lat, lng)));
        }
      } else if (geometry.type === "MultiPolygon") {
        for (const polygon of geometry.coordinates) {
          const outer = polygon && polygon[0] ? polygon[0] : [];
          if (outer.length >= 3) {
            out.push(outer.map(([lng, lat]) => new naver.maps.LatLng(lat, lng)));
          }
        }
      }

      return out;
    }

    function offsetPath(path, dLat, dLng) {
      if (!Array.isArray(path)) return [];
      return path.map((p) => new naver.maps.LatLng(p.lat() + dLat, p.lng() + dLng));
    }

    function fetchJson(url) {
      return fetch(url).then((res) => {
        if (!res.ok) throw new Error("요청 실패: " + url);
        return res.json();
      });
    }

    async function loadModeData(mode) {
      if (state.cache[mode]) return state.cache[mode];
      const cfg = MODE_CONFIG[mode];

      const [popObj, ...geoObjects] = await Promise.all([
        fetchJson(cfg.populationUrl),
        ...cfg.geoUrls.map((u) => fetchJson(u))
      ]);

      const features = [];
      for (const g of geoObjects) {
        if (Array.isArray(g?.features)) features.push(...g.features);
      }

      const populationItems = popObj?.items && typeof popObj.items === "object" ? popObj.items : {};
      const loaded = { features, populationItems };
      state.cache[mode] = loaded;
      return loaded;
    }

    async function loadSggNameMapOnce() {
      if (state.sggNameByCode && state.sggGeometryByCode) return state.sggNameByCode;
      const out = {};
      const geoMap = {};
      try {
        const sigObjects = await Promise.all(SIG_GEO_URLS.map((u) => fetchJson(u)));
        for (const g of sigObjects) {
          const feats = Array.isArray(g?.features) ? g.features : [];
          for (const f of feats) {
            const props = f?.properties || {};
            const code = normalizeDigits(props?.sgg_cd || props?.code || props?.SIG_CD);
            const rawName = String(props?.sgg_nm || props?.name || props?.SIG_KOR_NM || "").trim();
            const name = rawName.replace(/^(서울특별시|서울시|부산광역시|부산시|대구광역시|대구시|인천광역시|인천시|광주광역시|광주시|대전광역시|대전시|울산광역시|울산시|세종특별자치시|세종시|경기도|강원도|충청북도|충청남도|전라북도|전라남도|경상북도|경상남도|제주특별자치도|제주도)\s*/, "").trim();
            if (code.length === 5) {
              if (name) out[code] = name;
              const paths = geometryToPathSets(f?.geometry);
              if (paths.length > 0) geoMap[code] = paths;
            }
          }
        }
      } catch (_) {
        // no-op: fallback to codes only
      }
      state.sggNameByCode = out;
      state.sggGeometryByCode = geoMap;
      return out;
    }

    function drawSigunguBlackOutlinesIfNeeded() {
      const selected = state.filters.sigunguCodes;
      if (!selected || selected.size <= 1) return;
      const geoMap = state.sggGeometryByCode || {};

      for (const code of selected) {
        const pathSets = geoMap[code] || [];
        for (const path of pathSets) {
          if (!Array.isArray(path) || path.length < 3) continue;
          const outline = new naver.maps.Polygon({
            map: state.map,
            paths: path,
            strokeColor: "#000000",
            strokeOpacity: 1,
            strokeWeight: 3.2,
            fillOpacity: 0,
            clickable: false,
            zIndex: 8
          });
          state.overlays.push(outline);
        }
      }
    }

    function buildRows(mode, data) {
      if (data.rows) return data.rows;
      data.rows = data.features.map((feature) => {
        const props = feature?.properties || {};
        const code = getAreaCode(mode, props);
        const popItem = code ? data.populationItems[code] : null;
        const totalPopulation = Number(popItem?.totalPopulation);
        const sidoCode = getSidoCode(mode, props, code);
        const sigunguCode = getSggCode(mode, props, code);
        return {
          feature,
          code,
          popItem,
          totalPopulation,
          name: getAreaName(mode, props, popItem),
          sidoCode,
          sigunguCode,
          sidoName: getSidoName(sidoCode, props),
          sigunguName: getSggName(sigunguCode, props)
        };
      });
      return data.rows;
    }

    async function loadRegionCatalogOnce() {
      if (state.regionCatalog) return state.regionCatalog;
      const admData = await loadModeData(MODE.ADM);
      const admRows = buildRows(MODE.ADM, admData);

      const sidoMap = new Map();
      const sigunguBySido = new Map();
      const isCodeLike = (v) => /^\d+$/.test(String(v || "").trim());
      for (const r of admRows) {
        if (!r.sidoCode) continue;
        const nextSidoName = String(r.sidoName || r.sidoCode || "").trim();
        const prevSidoName = String(sidoMap.get(r.sidoCode) || "").trim();
        if (!sidoMap.has(r.sidoCode) || (isCodeLike(prevSidoName) && !isCodeLike(nextSidoName))) {
          sidoMap.set(r.sidoCode, nextSidoName || r.sidoCode);
        }
        if (!sigunguBySido.has(r.sidoCode)) sigunguBySido.set(r.sidoCode, new Map());
        if (r.sigunguCode) {
          const m = sigunguBySido.get(r.sidoCode);
          const nextSigunguName = String(r.sigunguName || r.sigunguCode || "").trim();
          const prevSigunguName = String(m.get(r.sigunguCode) || "").trim();
          if (!m.has(r.sigunguCode) || (isCodeLike(prevSigunguName) && !isCodeLike(nextSigunguName))) {
            m.set(r.sigunguCode, nextSigunguName || r.sigunguCode);
          }
        }
      }

      state.regionCatalog = { sidoMap, sigunguBySido };
      return state.regionCatalog;
    }

    function fillSelect(el, items, placeholder) {
      if (!el) return;
      const opts = [`<option value="">${placeholder || "전체"}</option>`];
      for (const item of items) {
        opts.push(`<option value="${escapeHtml(item.value)}">${escapeHtml(item.label)}</option>`);
      }
      el.innerHTML = opts.join("");
    }

    function getActiveSidoCodes() {
      const selected = String(state.filters?.sidoCode || "").trim();
      if (!selected) return null;
      if (selected === CAPITAL_SIDO_FILTER_CODE) return new Set(CAPITAL_SIDO_CODES);
      return new Set([selected]);
    }

    function getSidoFilterLabel(sidoCode) {
      if (!sidoCode) return "전국";
      if (sidoCode === CAPITAL_SIDO_FILTER_CODE) return "수도권";
      return SIDO_NAME_BY_CODE[sidoCode] || sidoCode;
    }

    function buildSigunguMapFromCatalog(catalog) {
      const activeSidoCodes = getActiveSidoCodes();
      if (!activeSidoCodes || activeSidoCodes.size === 0) return new Map();

      const out = new Map();
      for (const sidoCode of activeSidoCodes) {
        const m = catalog.sigunguBySido.get(sidoCode) || new Map();
        for (const [code, name] of m.entries()) out.set(code, name);
      }
      return out;
    }

    function getAllowedSigunguCodesForCurrentFilter() {
      const catalog = state.regionCatalog;
      if (!catalog) return null;

      const activeSidoCodes = getActiveSidoCodes();
      if (!activeSidoCodes || activeSidoCodes.size === 0) return null;

      const out = new Set();
      for (const sidoCode of activeSidoCodes) {
        const m = catalog.sigunguBySido.get(sidoCode) || new Map();
        for (const code of m.keys()) out.add(code);
      }
      return out;
    }

      if (!textEl) return;
      const selected = state.filters.sigunguCodes;
      if (!selected || selected.size === 0) {

      const panel = document.getElementById("sigunguFilterPanel");

      const selected = new Set(preselected || []);
      const list = Array.from(sigunguMap.entries())

        state.filters.sigunguCodes = new Set();

    async function rebuildFilters(rows) {

      const prevSido = state.filters.sidoCode;

    function calcPercentileBreaks(values, bins) {
      if (!values.length) return [];
      const sorted = [...values].sort((a, b) => a - b);
      const breaks = [];
      for (let i = 1; i <= bins; i++) {
        const idx = Math.min(sorted.length - 1, Math.floor((sorted.length * i) / bins) - 1);
        breaks.push(sorted[Math.max(0, idx)]);
      }
      return breaks;
    }

    function getFillColorByPercentile(value, breaks) {
      if (!Number.isFinite(value)) return NO_DATA_FILL;
      for (let i = 0; i < breaks.length; i++) {
        if (value <= breaks[i]) return COLOR_SCALE[i];
      }
      return COLOR_SCALE[COLOR_SCALE.length - 1];
    }

    function setInfoPanel(data) {

        return;
