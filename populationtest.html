    function escapeHtml(str) {
      return String(str == null ? "" : str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderLegend(breaks) {
      const el = document.getElementById("legend");
      if (!el) return;

      let html = '<div class="legend-title">백분위 구간 (현재 범위 기준)</div>';
      if (!breaks.length) {
        html += '<div class="legend-row">데이터 없음</div>';
        el.innerHTML = html;
        return;
      }

      let prev = 0;
      const bins = breaks.length;
      for (let i = 0; i < breaks.length; i++) {
        const min = i === 0 ? 0 : prev + 1;
        const max = breaks[i];
        const color = COLOR_SCALE[i];
        const p0 = Math.round((i * 100) / bins);
        const p1 = Math.round(((i + 1) * 100) / bins);
        html += ''
          + '<div class="legend-row">'
          + '  <span class="legend-swatch" style="background:' + color + '"></span>'
          + '  <span>' + p0 + '%~' + p1 + '% (' + formatNumber(min) + ' - ' + formatNumber(max) + ')</span>'
          + '</div>';
        prev = max;
      }
      html += ''
        + '<div class="legend-row">'
        + '  <span class="legend-swatch" style="background:' + NO_DATA_FILL + '"></span>'
        + '  <span>데이터 없음</span>'
        + '</div>';
      el.innerHTML = html;
    }

    function clearOverlays() {
      for (const o of state.overlays) {
        try { o.setMap(null); } catch (_) {}
      }
      for (const item of state.labels) {
        try { item?.marker?.setMap(null); } catch (_) {}
      }
      state.overlays = [];
      state.labels = [];
      state.hovered = null;
      state.selected = null;
    }

    function toMapOffset(latlng) {
      try {
        const proj = state.map?.getProjection?.();
        if (!proj || !latlng) return null;
        if (typeof proj.fromCoordToOffset === "function") return proj.fromCoordToOffset(latlng);
        if (typeof proj.fromCoordToPoint === "function") return proj.fromCoordToPoint(latlng);
      } catch (_) {}
      return null;
    }

    function polygonAreaPx(points) {
      if (!Array.isArray(points) || points.length < 3) return 0;
      let acc = 0;
      for (let i = 0; i < points.length; i++) {
        const p1 = points[i];
        const p2 = points[(i + 1) % points.length];
        acc += p1.x * p2.y - p2.x * p1.y;
      }
      return Math.abs(acc / 2);
    }

    function samplePathForLayout(path, maxPoints = 240) {
      if (!Array.isArray(path) || path.length <= maxPoints) return Array.isArray(path) ? path : [];
      const stride = Math.max(1, Math.ceil(path.length / maxPoints));
      const sampled = [];
      for (let i = 0; i < path.length; i += stride) sampled.push(path[i]);
      const last = path[path.length - 1];
      if (sampled[sampled.length - 1] !== last) sampled.push(last);
      return sampled;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function getAdaptiveGlobalLabelScale() {
      if (!Array.isArray(state.labels) || state.labels.length === 0) return 1;

      let minW = Infinity;
      let minH = Infinity;
      let minArea = Infinity;
      let any = false;

      for (const item of state.labels) {
        const path = item?.path;
        if (!Array.isArray(path) || path.length < 3) continue;
        const sampledPath = samplePathForLayout(path);
        const px = sampledPath.map((p) => toMapOffset(p)).filter(Boolean);
        if (px.length < 3) continue;

        let minX = Infinity;
        let minY = Infinity;
        let maxX = -Infinity;
        let maxY = -Infinity;
        for (const p of px) {
          if (p.x < minX) minX = p.x;
          if (p.y < minY) minY = p.y;
          if (p.x > maxX) maxX = p.x;
          if (p.y > maxY) maxY = p.y;
        }

        const w = Math.max(1, maxX - minX);
        const h = Math.max(1, maxY - minY);
        const area = Math.max(1, polygonAreaPx(px));

        minW = Math.min(minW, w);
        minH = Math.min(minH, h);
        minArea = Math.min(minArea, area);
        any = true;
      }

      if (!any) return 1;

      // 기준 라벨(3줄) 예상 크기
      const baseW = 98;
      const baseH = 62;

      // 가장 작은 동에 맞춰 가능한 최대 배율 계산
      const byW = (minW * 0.88) / baseW;
      const byH = (minH * 0.86) / baseH;
      const byArea = Math.sqrt((minArea * 0.62) / (baseW * baseH));
      const scale = Math.min(byW, byH, byArea);

      // 지나친 확대/축소 방지
      return Math.round(clamp(scale, 0.78, 2.25) * 100) / 100;
    }

    function buildLabelHtml(row, scale) {
      const pph = row.popItem?.personsPerHousehold;
      const pphText = Number.isFinite(Number(pph)) ? Number(pph).toFixed(2) : "-";
      const finalScale = scale * state.userLabelScale;
      const titlePx = Math.round(13 * finalScale);
      const linePx = Math.round(11 * finalScale);
      const padY = Math.round(4 * finalScale);
      const padX = Math.round(7 * finalScale);
      const radius = Math.round(8 * finalScale);

      return ""
        + `<div style="transform:translate(-50%,-50%); padding:${padY}px ${padX}px; border-radius:${radius}px; background:linear-gradient(180deg, rgba(255,255,255,0.96), rgba(245,248,255,0.94)); border:1px solid rgba(17,17,17,0.22); box-shadow:0 2px 5px rgba(0,0,0,0.2); text-align:center; line-height:1.22; white-space:nowrap;">`
        + `  <div style="font-size:${titlePx}px; font-weight:700; color:#0f203e;">${escapeHtml(row.name || "-")}</div>`
        + `  <div style="font-size:${linePx}px; color:#173b72;">인구 ${formatNumber(row.totalPopulation)}</div>`
        + `  <div style="font-size:${linePx}px; color:#355885;">세대당 ${pphText}</div>`
        + "</div>";
    }

    function updateLabelPlacement() {
      if (!state.map || !Array.isArray(state.labels) || state.labels.length === 0) return;
      state.labelScale = getAdaptiveGlobalLabelScale();

      for (const item of state.labels) {
        const marker = item?.marker;
        const path = item?.path;
        const row = item?.row;
        if (!marker || !Array.isArray(path) || path.length < 3) continue;

        const sampledPath = samplePathForLayout(path);
        const px = sampledPath.map((p) => toMapOffset(p)).filter(Boolean);
        if (px.length < 3) {
          marker.setVisible(false);
          continue;
        }

        // 위치: 최초 계산된 값 재사용 (lat/lng은 줌과 무관)
        if (item.__cachedInterior) {
          marker.setPosition(item.__cachedInterior);
        }

        // 스케일 변경 시만 아이콘 갱신
        const nextScale = state.labelScale || 1;
        const nextUserScale = state.userLabelScale;
        if (marker.__labelScale !== nextScale || marker.__userLabelScale !== nextUserScale) {
          marker.setIcon({
            content: buildLabelHtml(row, nextScale),
            anchor: new naver.maps.Point(0, 0)
          });
          marker.__labelScale = nextScale;
          marker.__userLabelScale = nextUserScale;
        }
      }
    }

    function updateLabelVisibility() {
      if (!Array.isArray(state.labels)) return;
      for (const item of state.labels) {
        const marker = item?.marker;
        if (!marker) continue;
        marker.setVisible(state.alwaysShowLabels);
        marker.__isHovered = false;  // 호버 상태 리셋
      }
    }

    function resetUserLabelScaleToAuto() {
      state.userLabelScale = 1;
      const labelScaleSlider = document.getElementById("labelScaleSlider");
      const sliderValueText = document.getElementById("sliderValueText");
      if (labelScaleSlider) labelScaleSlider.value = "100";
      if (sliderValueText) sliderValueText.textContent = "100";
    }

    function pointInPolygon(pt, polygon) {
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const xi = polygon[i].x;
        const yi = polygon[i].y;
        const xj = polygon[j].x;
        const yj = polygon[j].y;
        const intersect = ((yi > pt.y) !== (yj > pt.y))
          && (pt.x < ((xj - xi) * (pt.y - yi)) / ((yj - yi) || 1e-12) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function polygonCentroid(points) {
      let areaAcc = 0;
      let cx = 0;
      let cy = 0;
      for (let i = 0; i < points.length; i++) {
        const p1 = points[i];
        const p2 = points[(i + 1) % points.length];
        const cross = p1.x * p2.y - p2.x * p1.y;
        areaAcc += cross;
        cx += (p1.x + p2.x) * cross;
        cy += (p1.y + p2.y) * cross;
      }
      const area = areaAcc / 2;
      if (Math.abs(area) < 1e-12) return null;
      return { x: cx / (6 * area), y: cy / (6 * area) };
    }

    function distancePointToSegment(pt, a, b) {
      const vx = b.x - a.x;
      const vy = b.y - a.y;
      const wx = pt.x - a.x;
      const wy = pt.y - a.y;
      const c1 = vx * wx + vy * wy;
      if (c1 <= 0) return Math.hypot(pt.x - a.x, pt.y - a.y);
      const c2 = vx * vx + vy * vy;
      if (c2 <= c1) return Math.hypot(pt.x - b.x, pt.y - b.y);
      const t = c1 / c2;
      const px = a.x + t * vx;
      const py = a.y + t * vy;
      return Math.hypot(pt.x - px, pt.y - py);
    }

    function getInteriorPoint(path) {
      if (!Array.isArray(path) || path.length < 3) return null;
      const polygon = path.map((p) => ({ x: p.lng(), y: p.lat() }));

      const centroid = polygonCentroid(polygon);
      if (centroid && pointInPolygon(centroid, polygon)) {
        return new naver.maps.LatLng(centroid.y, centroid.x);
      }

      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;
      for (const p of polygon) {
        if (p.x < minX) minX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.x > maxX) maxX = p.x;
        if (p.y > maxY) maxY = p.y;
      }

      const center = { x: (minX + maxX) / 2, y: (minY + maxY) / 2 };
      if (pointInPolygon(center, polygon)) {
        return new naver.maps.LatLng(center.y, center.x);
      }

      let bestPt = null;
      let bestScore = -1;
      const steps = 10;
      for (let iy = 1; iy < steps; iy++) {
        const y = minY + ((maxY - minY) * iy) / steps;
        for (let ix = 1; ix < steps; ix++) {
          const x = minX + ((maxX - minX) * ix) / steps;
          const pt = { x, y };
          if (!pointInPolygon(pt, polygon)) continue;

          let minDist = Infinity;
          for (let i = 0; i < polygon.length; i++) {
            const a = polygon[i];
            const b = polygon[(i + 1) % polygon.length];
            const d = distancePointToSegment(pt, a, b);
            if (d < minDist) minDist = d;
          }

          if (minDist > bestScore) {
            bestScore = minDist;
            bestPt = pt;
          }
        }
      }

      if (bestPt) return new naver.maps.LatLng(bestPt.y, bestPt.x);
      return path[0] || null;
    }

    function createRowLabelMarker(row, position) {
      if (!position || !state.map) return null;
      const scale = state.labelScale || 1;
      const content = buildLabelHtml(row, scale);

      const marker = new naver.maps.Marker({
        map: state.map,
        position,
        clickable: false,
        icon: {
          content,
          anchor: new naver.maps.Point(0, 0)
        },
        zIndex: 50
      });

      marker.__labelScale = scale;
      marker.__userLabelScale = state.userLabelScale;
      marker.__isHovered = false;  // 호버 상태 추적
      marker.setVisible(state.alwaysShowLabels);

      return marker;
    }

    function clamp01(value) {
      return Math.max(0, Math.min(1, Number(value) || 0));
    }

    function getBasePolygonFillOpacity() {
      return clamp01(state.polygonFillOpacity);
    }

    function getHoverPolygonFillOpacity() {
      return clamp01(getBasePolygonFillOpacity() + 0.08);
    }

    function getSelectedPolygonFillOpacity() {
      return clamp01(getBasePolygonFillOpacity() + 0.14);
    }

    function updatePolygonFillOpacity() {
      for (const overlay of state.overlays) {
        if (!overlay || !overlay.__isDataPolygon) continue;
        let nextOpacity = getBasePolygonFillOpacity();
        if (overlay === state.selected) nextOpacity = getSelectedPolygonFillOpacity();
        else if (overlay === state.hovered) nextOpacity = getHoverPolygonFillOpacity();
        overlay.setOptions({ fillOpacity: nextOpacity });
      }
    }

    function applyHoverStyle(poly, on) {
      if (!poly) return;
      poly.setOptions({
        strokeWeight: on ? 2.9 : 2.2,
        strokeColor: "#ffffff",
        fillOpacity: on ? getHoverPolygonFillOpacity() : getBasePolygonFillOpacity()
      });
    }

    function applySelectStyle(poly, on) {
      if (!poly) return;
      poly.setOptions({
        strokeWeight: on ? 3.3 : 2.2,
        strokeColor: "#ffffff",
        fillOpacity: on ? getSelectedPolygonFillOpacity() : getBasePolygonFillOpacity()
      });
    }

    // 시도 전체 선택 시 시군구 단위 렌더링 (동 단위보다 가벼움)
    async function drawSigunguLevel(mode, rows, shouldMove, populationItems = {}) {
      const selectedSidoCode = state.filters.sidoCode;
      const activeSidoCodes = getActiveSidoCodes();
      const geoMap = state.sggGeometryByCode || {};
      const nameMap = state.sggNameByCode || {};

      function getHouseholdsFromRow(row) {
        const direct = Number(row?.popItem?.totalHouseholds);
        if (Number.isFinite(direct) && direct > 0) return direct;

        const pop = Number(row?.totalPopulation);
        const pph = Number(row?.popItem?.personsPerHousehold);
        if (!Number.isFinite(pop) || !Number.isFinite(pph) || pph <= 0) return 0;
        return pop / pph;
      }

      // 동 단위 rows를 시군구 코드로 집계
      const sggPopMap = new Map(); // sggCode -> { total, households, sidoCode }
      for (const r of rows) {
        if (activeSidoCodes && !activeSidoCodes.has(r.sidoCode)) continue;
        const c = r.sigunguCode;
        if (!c) continue;
        const prev = sggPopMap.get(c) || { total: 0, households: 0, sidoCode: r.sidoCode };
        if (Number.isFinite(r.totalPopulation)) prev.total += r.totalPopulation;
        prev.households += getHouseholdsFromRow(r);
        if (!prev.sidoCode && r.sidoCode) prev.sidoCode = r.sidoCode;
        sggPopMap.set(c, prev);
      }

      // 시군구 상위코드(예: 1111000000) 레코드가 있으면 우선 사용
      // 모드와 무관하게 ADM 통계를 기준으로 통일해 시군구 총합 일관성을 유지
      let directSourceItems = populationItems || {};
      try {
        const admData = await loadModeData(MODE.ADM);
        if (admData && admData.populationItems) directSourceItems = admData.populationItems;
      } catch (_) {
        // fallback: 현재 mode populationItems 사용
      }

      const directSigunguMap = new Map(); // sggCode -> { total, pph }
      for (const key of Object.keys(directSourceItems || {})) {
        const d = normalizeDigits(key);
        if (d.length !== 10 || !d.endsWith("00000")) continue;
        const sggCode = d.slice(0, 5);
        if (activeSidoCodes && !activeSidoCodes.has(sggCode.slice(0, 2))) continue;

        const item = directSourceItems[key] || {};
        const total = Number(item.totalPopulation);
        const pph = Number(item.personsPerHousehold);
        if (!Number.isFinite(total) || total <= 0) continue;
        directSigunguMap.set(sggCode, {
          total,
          pph: Number.isFinite(pph) && pph > 0 ? pph : null
        });
      }

      for (const [sggCode, direct] of directSigunguMap.entries()) {
        const prev = sggPopMap.get(sggCode) || { total: 0, households: 0, sidoCode: sggCode.slice(0, 2) };
        const households = direct.pph ? (direct.total / direct.pph) : prev.households;
        sggPopMap.set(sggCode, {
          ...prev,
          total: direct.total,
          households,
          sidoCode: prev.sidoCode || sggCode.slice(0, 2)
        });
      }

      if (sggPopMap.size === 0) {
        setStatus("표시할 시군구 데이터가 없습니다.");
        return;
      }

      const allTotals = Array.from(sggPopMap.values()).map((v) => v.total).filter(Number.isFinite);
      const breaks = calcPercentileBreaks(allTotals, 5);
      renderLegend(breaks);

      let fitBounds = new naver.maps.LatLngBounds();
      let hasBounds = false;

      for (const [sggCode, agg] of sggPopMap.entries()) {
        const pathSets = geoMap[sggCode];
        if (!pathSets || pathSets.length === 0) continue;

        const name = nameMap[sggCode] || sggCode;
        const fillColor = getFillColorByPercentile(agg.total, breaks);
        const personsPerHousehold = agg.households > 0 ? agg.total / agg.households : null;

        const fakeRow = {
          name,
          code: sggCode,
          sigunguCode: sggCode,
          sidoCode: agg.sidoCode || "",
          sidoName: SIDO_NAME_BY_CODE[agg.sidoCode || ""] || agg.sidoCode || "-",
          sigunguName: name,
          totalPopulation: agg.total,
          popItem: {
            totalHouseholds: agg.households,
            personsPerHousehold
          },
          __labelMarker: null
        };

        const largestPathSgg = pathSets.reduce((best, p) => p.length > best.length ? p : best, pathSets[0]);
        const center = getInteriorPoint(largestPathSgg);
        if (center) {
          const label = createRowLabelMarker(fakeRow, center);
          if (label) {
            state.labels.push({ marker: label, path: largestPathSgg, row: fakeRow, __cachedInterior: center });
            fakeRow.__labelMarker = label;
          }
        }

        for (const path of pathSets) {
          if (!path.length) continue;
          for (const pt of path) { fitBounds.extend(pt); hasBounds = true; }

          const poly = new naver.maps.Polygon({
            map: state.map, paths: path,
            strokeColor: "#ffffff", strokeOpacity: 1, strokeWeight: 2.2,
            fillColor, fillOpacity: getBasePolygonFillOpacity(), clickable: true, zIndex: 3
          });
          poly.__isDataPolygon = true;
          poly.__row = fakeRow;
          poly.__baseStrokeColor = "#ffffff";

          naver.maps.Event.addListener(poly, "mouseover", () => {
            if (state.hovered && state.hovered !== poly && state.hovered !== state.selected) applyHoverStyle(state.hovered, false);
            state.hovered = poly;
            if (poly !== state.selected) applyHoverStyle(poly, true);
            if (fakeRow.__labelMarker && !state.alwaysShowLabels && !fakeRow.__labelMarker.__isHovered) {
              fakeRow.__labelMarker.__isHovered = true;
              fakeRow.__labelMarker.setVisible(true);
            }
          });
          naver.maps.Event.addListener(poly, "mouseout", () => {
            if (poly !== state.selected) applyHoverStyle(poly, false);
            if (state.hovered === poly) state.hovered = null;
            if (fakeRow.__labelMarker && !state.alwaysShowLabels && fakeRow.__labelMarker.__isHovered) {
              fakeRow.__labelMarker.__isHovered = false;
              fakeRow.__labelMarker.setVisible(false);
            }
          });
          naver.maps.Event.addListener(poly, "click", () => {
            if (state.selected && state.selected !== poly) applySelectStyle(state.selected, false);
            state.selected = poly;
            applySelectStyle(poly, true);
            setInfoPanel({
              name: fakeRow.name,
              code: fakeRow.code,
              totalPopulation: fakeRow.totalPopulation,
              personsPerHousehold
            });
          });

          state.overlays.push(poly);
        }
      }

      if (hasBounds && shouldMove) {
        state.map.fitBounds(fitBounds, { top: 20, right: 20, bottom: 20, left: 20 });
      }

      const sidoName = getSidoFilterLabel(selectedSidoCode);
      setStatus(`시군구 단위 표시: ${sggPopMap.size}개 (${sidoName} 전체)`);
      setInfoPanel(null);
      updateLabelPlacement();
    }

    async function drawMode(mode, opts = {}) {
      if (!state.map) return;
      const shouldMove = !!opts.moveMap;

      setLoading(true, MODE_CONFIG[mode].label + " 경계/인구 데이터를 불러오는 중...");
      setStatus(MODE_CONFIG[mode].label + " 데이터 로딩 중");

      try {
        await loadSggNameMapOnce();
        const data = await loadModeData(mode);
        clearOverlays();

        const rows = buildRows(mode, data);
        await rebuildFilters(rows);

        // 시도도 선택 안 된 경우(완전 초기 상태)에는 아무것도 그리지 않음
        if (!state.filters.sidoCode && (!state.filters.sigunguCodes || state.filters.sigunguCodes.size === 0)) {
          clearOverlays();
          renderLegend([]);
          setInfoPanel(null);
          setStatus("시도를 선택하면 지도를 표시합니다.");
          return;
        }

        // 시도 선택 + 시군구 전체 = 시군구 단위로 렌더링 (가볍게)
        const isAllSigungu = state.filters.sidoCode && (!state.filters.sigunguCodes || state.filters.sigunguCodes.size === 0);
        if (isAllSigungu) {
          await drawSigunguLevel(mode, rows, shouldMove, data.populationItems || {});
          return;
        }

        const featureRows = getFilteredRows(rows);

        if (!featureRows.length) {
          clearOverlays();
          renderLegend([]);
          setInfoPanel(null);
          setStatus("표시할 동 데이터가 없습니다.");
          return;
        }

        const values = featureRows
          .map((r) => r.totalPopulation)
          .filter((v) => Number.isFinite(v));

        const breaks = calcPercentileBreaks(values, 5);
        renderLegend(breaks);

        let fitBounds = new naver.maps.LatLngBounds();
        let hasBounds = false;

        for (const row of featureRows) {
          const pathSets = geometryToPathSets(row.feature?.geometry);
          if (!pathSets.length) continue;

          const largestPathDong = pathSets.reduce((best, p) => p.length > best.length ? p : best, pathSets[0]);
          const center = getInteriorPoint(largestPathDong);
          if (center) {
            const label = createRowLabelMarker(row, center);
            if (label) {
              const labelItem = { marker: label, path: largestPathDong, row, __cachedInterior: center };
              state.labels.push(labelItem);
              row.__labelMarker = label;  // row에 마커 저장
            }
          }

          const fillColor = getFillColorByPercentile(row.totalPopulation, breaks);
          for (const path of pathSets) {
            if (!path.length) continue;

            for (const pt of path) {
              fitBounds.extend(pt);
              hasBounds = true;
            }

            const shadowPath = offsetPath(path, PSEUDO_3D.shadowLatOffset, PSEUDO_3D.shadowLngOffset);
            const shadowPoly = new naver.maps.Polygon({
              map: state.map,
              paths: shadowPath,
              strokeColor: "#5a301f",
              strokeOpacity: 0.36,
              strokeWeight: 1.8,
              fillColor: PSEUDO_3D.shadowFill,
              fillOpacity: PSEUDO_3D.shadowOpacity,
              clickable: false,
              zIndex: 1
            });
            state.overlays.push(shadowPoly);

            const highlightPath = offsetPath(path, PSEUDO_3D.highlightLatOffset, PSEUDO_3D.highlightLngOffset);
            const highlightPoly = new naver.maps.Polygon({
              map: state.map,
              paths: highlightPath,
              strokeColor: PSEUDO_3D.highlightStroke,
              strokeOpacity: PSEUDO_3D.highlightOpacity,
              strokeWeight: 1.2,
              fillColor: "#ffffff",
              fillOpacity: 0.05,
              clickable: false,
              zIndex: 2
            });
            state.overlays.push(highlightPoly);

            const poly = new naver.maps.Polygon({
              map: state.map,
              paths: path,
              strokeColor: "#ffffff",
              strokeOpacity: 1,
              strokeWeight: 2.2,
              fillColor,
              fillOpacity: getBasePolygonFillOpacity(),
              clickable: true,
              zIndex: 3
            });
            poly.__isDataPolygon = true;
            poly.__row = row;
            poly.__baseStrokeColor = "#ffffff";

            naver.maps.Event.addListener(poly, "mouseover", () => {
              if (state.hovered && state.hovered !== poly && state.hovered !== state.selected) {
                applyHoverStyle(state.hovered, false);
              }
              state.hovered = poly;
              if (poly !== state.selected) applyHoverStyle(poly, true);
              // 라벨 마커 표시: alwaysShowLabels가 false이고 아직 hover 상태가 아닐 때만
              if (row.__labelMarker && !state.alwaysShowLabels && !row.__labelMarker.__isHovered) {
                row.__labelMarker.__isHovered = true;
                row.__labelMarker.setVisible(true);
              }
            });

            naver.maps.Event.addListener(poly, "mouseout", () => {
              if (poly !== state.selected) applyHoverStyle(poly, false);
              if (state.hovered === poly) state.hovered = null;
              // 라벨 마커 숨기기: alwaysShowLabels가 false이고 현재 hover 상태일 때만
              if (row.__labelMarker && !state.alwaysShowLabels && row.__labelMarker.__isHovered) {
                row.__labelMarker.__isHovered = false;
                row.__labelMarker.setVisible(false);
              }
            });

            naver.maps.Event.addListener(poly, "click", () => {
              if (state.selected && state.selected !== poly) {
                applySelectStyle(state.selected, false);
              }
              state.selected = poly;
              applySelectStyle(poly, true);

              const selected = poly.__row;
              setInfoPanel({
                name: selected.name,
                code: selected.code,
                totalPopulation: selected.totalPopulation,
                personsPerHousehold: selected.popItem?.personsPerHousehold
              });
            });

            state.overlays.push(poly);
          }
        }

        drawSigunguBlackOutlinesIfNeeded();

        if (hasBounds && shouldMove) {
          state.map.fitBounds(fitBounds, { top: 20, right: 20, bottom: 20, left: 20 });
        }

        const scopeText = [
          getSidoFilterLabel(state.filters.sidoCode),
          state.filters.sigunguCodes && state.filters.sigunguCodes.size > 0 ? `${state.filters.sigunguCodes.size}개 선택` : "전체"
        ].join(" / ");
        setStatus(MODE_CONFIG[mode].label + " 표시: " + state.overlays.length.toLocaleString("ko-KR") + "개 경계 (" + scopeText + ")");
        setInfoPanel(null);
        updateLabelPlacement();
      } catch (err) {
        console.error(err);
        setStatus("로딩 실패");
        setInfoPanel({
          name: "오류",
          code: "-",
          totalPopulation: "-",
          personsPerHousehold: "-"
        });
        alert("데이터 로딩 중 오류가 발생했습니다. 파일 경로를 확인하세요.");
      } finally {
        setLoading(false);
      }
    }

    function setModeButtons(mode) {
      const emdBtn = document.getElementById("btnEmd");
      const admBtn = document.getElementById("btnAdm");
      if (emdBtn) emdBtn.classList.toggle("active", mode === MODE.EMD);
      if (admBtn) admBtn.classList.toggle("active", mode === MODE.ADM);
    }

    async function switchMode(mode, opts = {}) {
      const shouldMove = !!opts.moveMap;
      if (state.mode === mode && state.overlays.length > 0) return;
      state.mode = mode;
      setModeButtons(mode);
      await drawMode(mode, { moveMap: shouldMove });
    }

    function initMap() {
      const isMobile = isMobileViewport();
      state.map = new naver.maps.Map("map", {
        center: new naver.maps.LatLng(36.35, 127.9),
        zoom: 7,
        minZoom: 6,
        mapTypeControl: true,
        zoomControl: false
      });

      const emdBtn = document.getElementById("btnEmd");
      const admBtn = document.getElementById("btnAdm");
      const sidoSelect = document.getElementById("sidoFilter");
      const sigunguWrapper = document.getElementById("sigunguFilterWrapper");
      const sigunguDisplay = document.getElementById("sigunguFilterDisplay");
      const sigunguPanel = document.getElementById("sigunguFilterPanel");

      if (emdBtn) {
        emdBtn.addEventListener("click", () => switchMode(MODE.EMD));
      }
      if (admBtn) {
        admBtn.addEventListener("click", () => switchMode(MODE.ADM));
      }
      if (sidoSelect) {
        sidoSelect.addEventListener("change", async (e) => {
          state.filters.sidoCode = (e.target?.value || "").trim();
          state.filters.sigunguCodes = new Set();
          const data = await loadModeData(state.mode);
          const rows = buildRows(state.mode, data);
          await updateSigunguFilter(rows);
          setSigunguPanelOpen(true);
          resetUserLabelScaleToAuto();
          await drawMode(state.mode, { moveMap: !!state.filters.sidoCode });
        });
      }
      if (sigunguDisplay && sigunguPanel) {
        sigunguDisplay.addEventListener("click", (e) => {
          e.stopPropagation();
          setSigunguPanelOpen(!sigunguPanel.classList.contains("open"));
        });
      }
      if (sigunguPanel) {
        sigunguPanel.addEventListener("click", (e) => {
          e.stopPropagation();
        });
        sigunguPanel.addEventListener("change", async (e) => {
          const checkbox = e.target;
          if (!checkbox || checkbox.tagName !== "INPUT") return;
          const code = String(checkbox.getAttribute("data-sigungu-code") || "").trim();
          if (!code) return;

          if (code === "__ALL__") {
            // "전체" 선택 시 모든 개별 선택 해제
            state.filters.sigunguCodes = new Set();
            sigunguPanel.querySelectorAll("input[data-sigungu-code]").forEach((cb) => {
              if (cb.getAttribute("data-sigungu-code") !== "__ALL__") cb.checked = false;
            });
            checkbox.checked = true;
          } else {
            if (checkbox.checked) state.filters.sigunguCodes.add(code);
            else state.filters.sigunguCodes.delete(code);
            // 개별 선택 변경 시 "전체" 체크박스 상태 동기화
            const allCb = sigunguPanel.querySelector("input[data-sigungu-code='__ALL__']");
            if (allCb) allCb.checked = state.filters.sigunguCodes.size === 0;
          }

          // 시군구 변경 시에는 사용자 배율을 자동(100%)으로 되돌려 영역에 맞게 재계산
          resetUserLabelScaleToAuto();
          updateSigunguDisplayText();
          await drawMode(state.mode, { moveMap: state.filters.sigunguCodes.size > 0 });
        });
      }

      document.addEventListener("click", (e) => {
        if (!sigunguWrapper) return;
        if (!sigunguWrapper.contains(e.target)) setSigunguPanelOpen(false);
      });

      if (sigunguWrapper) {
        // 초기 상태
        setSigunguPanelOpen(false);
        updateSigunguDisplayText();
      }

      // 테이블 보기 버튼
      const tableBtn = document.getElementById("btnTableView");
      const ageChartBtn = document.getElementById("btnAgeChartView");
      const tableModalOverlay = document.getElementById("tableModalOverlay");
      const tableModalClose = document.getElementById("tableModalClose");
      const tableDownloadBtn = document.getElementById("tableDownloadBtn");
      const ageChartModalOverlay = document.getElementById("ageChartModalOverlay");
      const ageChartModalClose = document.getElementById("ageChartModalClose");

      if (tableBtn) {
        tableBtn.addEventListener("click", () => {
          showTableModal();
        });
      }

      if (ageChartBtn) {
        ageChartBtn.addEventListener("click", () => {
          showAgeChartModal();
        });
      }

      if (tableDownloadBtn) {
        tableDownloadBtn.addEventListener("click", () => {
          downloadTableAsExcel();
        });
      }

      if (tableModalClose) {
        tableModalClose.addEventListener("click", () => {
          hideTableModal();
        });
      }

      if (tableModalOverlay) {
        tableModalOverlay.addEventListener("click", () => {
          hideTableModal();
        });
      }

      if (ageChartModalClose) {
        ageChartModalClose.addEventListener("click", () => {
          hideAgeChartModal();
        });
      }

      if (ageChartModalOverlay) {
        ageChartModalOverlay.addEventListener("click", () => {
          hideAgeChartModal();
        });
      }

      // 연령 차트 탭 전환
      document.querySelectorAll(".age-chart-tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          switchAgeChartTab(btn.dataset.tab);
        });
      });

      const ageTableDlBtn = document.getElementById("ageTableDownloadBtn");
      if (ageTableDlBtn) {
        ageTableDlBtn.addEventListener("click", () => {
          downloadAgeTableAsExcel();
        });
      }

      // 동이름 항상 표시 체크박스
      const alwaysShowCheckbox = document.getElementById("alwaysShowLabelsCheckbox");
      if (alwaysShowCheckbox) {
        alwaysShowCheckbox.addEventListener("change", (e) => {
          state.alwaysShowLabels = e.target.checked;
          updateLabelVisibility();  // 가시성만 업데이트
        });
      }

      // 라벨 크기 슬라이더
      const labelScaleSlider = document.getElementById("labelScaleSlider");
      const sliderValueText = document.getElementById("sliderValueText");
      if (labelScaleSlider) {
        labelScaleSlider.addEventListener("input", (e) => {
          const value = Number(e.target.value);
          state.userLabelScale = value / 100;
          if (sliderValueText) sliderValueText.textContent = String(value);
          updateLabelPlacement();
        });
      }

      const fillOpacitySlider = document.getElementById("fillOpacitySlider");
      const fillOpacityValueText = document.getElementById("fillOpacityValueText");
      if (fillOpacitySlider) {
        fillOpacitySlider.addEventListener("input", (e) => {
          const value = Number(e.target.value);
          state.polygonFillOpacity = value / 100;
          if (fillOpacityValueText) fillOpacityValueText.textContent = String(value);
          updatePolygonFillOpacity();
        });
      }

      try {
        let _labelIdleTimer = null;
        naver.maps.Event.addListener(state.map, "idle", () => {
          clearTimeout(_labelIdleTimer);
          _labelIdleTimer = setTimeout(() => updateLabelPlacement(), 80);
        });
      } catch (_) {}

      window.addEventListener("resize", syncResponsiveMapControls);

      switchMode(MODE.EMD, { moveMap: true });
    }

    window.addEventListener("load", initMap);
  </script>
</body>
</html>
