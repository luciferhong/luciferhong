<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>포토메모 지도</title>
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=9t8y33hyq8"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
#map { width: 100%; height: 100vh; }
.memo-marker {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  overflow: hidden;
  cursor: pointer;
  background: #ccc;
}
.memo-marker img { width: 100%; height: 100%; object-fit: cover; }
.popup-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 9999;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
.popup-overlay.open { display: flex; }
.popup-box {
  background: #fff;
  border-radius: 14px;
  max-width: 90vw;
  max-height: 88vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  gap: 12px;
  position: relative;
}
.popup-img {
  max-width: 80vw;
  max-height: 60vh;
  border-radius: 8px;
  object-fit: contain;
  display: block;
}
.popup-note {
  font-size: 15px;
  color: #333;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  max-width: 80vw;
  text-align: left;
  width: 100%;
}
.popup-date {
  font-size: 12px;
  color: #999;
  align-self: flex-start;
}
.popup-close {
  position: absolute;
  top: 10px; right: 14px;
  font-size: 22px;
  cursor: pointer;
  color: #666;
  line-height: 1;
  border: none;
  background: none;
}
</style>
</head>
<body>
<div id="map"></div>
<div class="popup-overlay" id="overlay" onclick="closePopup(event)">
  <div class="popup-box" id="popupBox">
    <button class="popup-close" onclick="closePopupDirect()">✕</button>
    <img class="popup-img" id="popupImg" src="" alt=""/>
    <div class="popup-note" id="popupNote"></div>
    <div class="popup-date" id="popupDate"></div>
  </div>
</div>

<script>
const MEMOS = [{"id":"13e37cd5-7d47-4ae6-b538-639f0343584c","lat":37.4862970889952,"lng":126.75453211808254,"note":"","createdAt":1774658379451},{"id":"1474b57d-08e3-4d39-ae91-a4be26c2816a","lat":37.503823298258204,"lng":126.75176525047523,"note":"","createdAt":1774060569198},{"id":"1b497e9f-28b5-4660-a878-55af8c8a3363","lat":37.50358548188346,"lng":126.76242606416666,"note":"","createdAt":1774097266690},{"id":"343a3f11-44e8-4877-b186-03e257514cd0","lat":37.51565401141918,"lng":126.75780973688751,"note":"","createdAt":1773915865405},{"id":"8e9f8f3c-a079-46c6-b887-60647ebc7a7f","lat":37.49990108797195,"lng":126.7574097917482,"note":"","createdAt":1774071636798},{"id":"96d9eba8-39b7-440e-be8b-d26a6b477f73","lat":37.46762244833256,"lng":126.82344782848101,"note":"어지간한 프랜차이즈는 다 있고 cgv도 있음","createdAt":1774757248753},{"id":"a7af5d22-3ee9-4b94-a44b-1aa2517e1ce5","lat":37.50515374248484,"lng":126.75815932787252,"note":"고가가 있다","createdAt":1774059590965},{"id":"c32aafe5-76a5-43fe-bc99-39f57207e8be","lat":37.50465589491936,"lng":126.75086958257643,"note":"유흥섞임","createdAt":1774060488579},{"id":"cbb1de4f-34c3-4d2f-b164-8d70daf5f41a","lat":37.50410975522759,"lng":126.75131977269915,"note":"한블록마다 차이가 있다. 단지 가까운 곳은 학원이 더 많아","createdAt":1774060538323},{"id":"df91af34-e2d3-436b-b26e-4dd0ea6cbef4","lat":37.46748308245263,"lng":126.82488773376254,"note":"지산 건물 4~5개 있음","createdAt":1774757479626}];

let map;
window.addEventListener("load", function() {
  // 첫 번째 메모 기준으로 초기 중심 계산
  let centerLat = 37.5665, centerLng = 126.978;
  if (MEMOS.length > 0) {
    const lats = MEMOS.map(m => m.lat);
    const lngs = MEMOS.map(m => m.lng);
    centerLat = (Math.min(...lats) + Math.max(...lats)) / 2;
    centerLng = (Math.min(...lngs) + Math.max(...lngs)) / 2;
  }

  map = new naver.maps.Map("map", {
    center: new naver.maps.LatLng(centerLat, centerLng),
    zoom: MEMOS.length === 1 ? 16 : 12,
    mapTypeId: naver.maps.MapTypeId.NORMAL
  });

  MEMOS.forEach(function(memo) {
    const container = document.createElement("div");
    container.className = "memo-marker";
    const img = document.createElement("img");
    img.src = "images/" + memo.id + "_thumb.jpg";
    img.alt = "";
    img.onerror = function() {
      container.style.background = "#888";
      container.innerHTML = "📍";
      container.style.display = "flex";
      container.style.alignItems = "center";
      container.style.justifyContent = "center";
      container.style.fontSize = "20px";
    };
    container.appendChild(img);

    const marker = new naver.maps.Marker({
      position: new naver.maps.LatLng(memo.lat, memo.lng),
      map: map,
      icon: {
        content: container,
        anchor: new naver.maps.Point(24, 24)
      }
    });

    naver.maps.Event.addListener(marker, "click", function() {
      openPopup(memo);
    });
  });
});

function openPopup(memo) {
  document.getElementById("popupImg").src = "images/" + memo.id + ".jpg";
  document.getElementById("popupNote").textContent = memo.note || "";
  const d = memo.createdAt ? new Date(memo.createdAt) : null;
  document.getElementById("popupDate").textContent = d ? d.toLocaleString("ko-KR") : "";
  document.getElementById("overlay").classList.add("open");
}

function closePopup(e) {
  if (e.target === document.getElementById("overlay")) {
    document.getElementById("overlay").classList.remove("open");
  }
}

function closePopupDirect() {
  document.getElementById("overlay").classList.remove("open");
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") document.getElementById("overlay").classList.remove("open");
});
</script>
</body>
</html>
